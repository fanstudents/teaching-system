<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員報告 — 教學簡報系統</title>
    <meta name="description" content="學員學習報告，查看成績統計與學習數據">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <link rel="stylesheet" href="styles/s79-theme.css">
    <link rel="stylesheet" href="styles/report-page.css">
</head>

<body>
    <div class="admin-main">
        <div class="admin-header">
            <div class="admin-header-title">
                學習分析
                <span id="topbarProjectName"
                    style="font-size:0.8em;font-weight:400;color:#9aa0a6;margin-left:8px;"></span>
            </div>
            <div class="admin-header-actions">
                <button class="btn" id="exportCsvBtn">
                    <span class="material-symbols-outlined">download</span>
                    匯出 CSV
                </button>
                <button class="btn btn-dark" id="generateAllBtn">
                    <span class="material-symbols-outlined">mail</span>
                    一鍵生成全部信件
                </button>
            </div>
        </div>

        <div class="container">
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-value" id="statStudents">—</div>
                    <div class="stat-label">學員人數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statChecklist">—</div>
                    <div class="stat-label">平均清單完成率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statSurvey">—</div>
                    <div class="stat-label">問卷完成率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statSubmissions">—</div>
                    <div class="stat-label">總繳交作業</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statEmailSent">—</div>
                    <div class="stat-label">已發送信件</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statEmailOpened">—</div>
                    <div class="stat-label">已開信</div>
                </div>
            </div>

            <div class="filters" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <input type="text" class="filter-input" id="searchInput" placeholder="搜尋學員姓名或 Email…"
                    style="flex:1;min-width:200px;">
                <select class="filter-select" id="filterGroup">
                    <option value="">所有組別</option>
                </select>
                <div class="view-toggle" id="viewToggle">
                    <button class="active" data-mode="list">
                        <span class="material-symbols-rounded">view_list</span> 列表
                    </button>
                    <button data-mode="card">
                        <span class="material-symbols-rounded">grid_view</span> 卡片
                    </button>
                </div>
            </div>

            <div class="batch-progress" id="batchProgress">
                <div class="batch-progress-text" id="batchProgressText">生成中...</div>
                <div class="batch-progress-bar">
                    <div class="batch-progress-fill" id="batchProgressFill"></div>
                </div>
            </div>

            <!-- Email Template Editor -->
            <div class="template-section" id="templateSection">
                <div class="template-toggle"
                    onclick="document.getElementById('templateSection').classList.toggle('open')">
                    <div class="template-toggle-left">
                        <span class="material-symbols-rounded">edit_note</span>
                        Email 模板設定
                    </div>
                    <span class="material-symbols-rounded chevron">expand_more</span>
                </div>
                <div class="template-body">
                    <textarea class="template-textarea" id="emailTemplate"></textarea>
                    <div class="template-vars" id="templateVars"></div>
                    <div class="template-actions">
                        <button class="topbar-btn" onclick="resetTemplate()">
                            <span class="material-symbols-rounded">restart_alt</span>
                            還原預設
                        </button>
                        <button class="topbar-btn primary" onclick="saveTemplate()">
                            <span class="material-symbols-rounded">save</span>
                            儲存模板
                        </button>
                    </div>
                </div>
            </div>

            <div id="studentListContainer">
                <div class="student-list-header" id="studentListHeader">
                    <span>學員</span>
                    <span>課前準備</span>
                    <span>問卷</span>
                    <span>作業</span>
                    <span>Email 狀態</span>
                    <span>操作</span>
                </div>
                <div class="student-grid list-mode" id="studentGrid">
                    <div class="loading">載入中…</div>
                </div>
            </div>

            <!-- 排程追蹤信面板 -->
            <div class="template-section" id="scheduledSection">
                <div class="template-toggle"
                    onclick="document.getElementById('scheduledSection').classList.toggle('open')">
                    <div class="template-toggle-left">
                        <span class="material-symbols-rounded">schedule_send</span>
                        排程追蹤信
                        <span id="scheduledCount" style="font-size:0.75rem;color:#80868b;font-weight:400;margin-left:4px;"></span>
                    </div>
                    <span class="material-symbols-rounded chevron">expand_more</span>
                </div>
                <div class="template-body">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
                        <label style="font-size:0.82rem;font-weight:500;color:#5f6368;">追蹤天數：</label>
                        <select id="followupDays" style="padding:6px 10px;border:1.5px solid #dadce0;border-radius:8px;font-size:0.82rem;">
                            <option value="3">3 天後</option>
                            <option value="7" selected>7 天後</option>
                            <option value="10">10 天後</option>
                            <option value="14">14 天後</option>
                            <option value="30">30 天後</option>
                        </select>
                        <button class="topbar-btn primary" id="scheduleAllBtn">
                            <span class="material-symbols-rounded">schedule_send</span>
                            為所有已發信學員排程追蹤信
                        </button>
                    </div>
                    <div id="scheduledList" style="font-size:0.82rem;color:#5f6368;"></div>
                </div>
            </div>
        </div>

        <!-- Detail Modal -->
        <div class="modal-overlay" id="detailModal">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modalStudentName">學員詳情</h3>
                    <button class="close-btn" onclick="closeModal()">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="email-draft" id="emailDraft" style="display:none;">
                    <h4 style="font-size:0.85rem;font-weight:600;color:var(--text-muted);margin-bottom:10px;">信件草稿
                    </h4>
                    <textarea class="email-textarea" id="emailContent"></textarea>
                    <div class="email-actions">
                        <button class="topbar-btn" onclick="copyEmail()">
                            <span class="material-symbols-rounded">content_copy</span>
                            複製
                        </button>
                        <button class="topbar-btn" onclick="saveEmail()">
                            <span class="material-symbols-rounded">save</span>
                            儲存草稿
                        </button>
                        <button class="topbar-btn primary" id="sendEmailBtn" onclick="sendEmail()">
                            <span class="material-symbols-rounded">send</span>
                            發送 Email
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script type="module">
            import { db, ai } from './scripts/supabase.js';
            import { showToast, showConfirm } from './scripts/ui.js';

            // ── 取得當前專案 (DB-first) ──
            async function getCurrentProject() {
                const currentId = localStorage.getItem('current_project_id');
                if (!currentId) return null;
                try {
                    const rows = await db.select('projects', { id: `eq.${currentId}` });
                    if (rows?.[0]) return { joinCode: rows[0].join_code, name: rows[0].name };
                } catch { }
                try {
                    const projects = JSON.parse(localStorage.getItem('projects_index') || '[]');
                    const proj = projects.find(p => p.id === currentId);
                    if (proj) return { joinCode: proj.joinCode, name: proj.name };
                } catch { }
                return null;
            }
            const _proj = await getCurrentProject();
            const joinCode = _proj?.joinCode || '';
            const _pnEl = document.getElementById('topbarProjectName');
            if (_pnEl) _pnEl.textContent = _proj?.name ? `— ${_proj.name}` : '';

            // ── 場次級 Email 模板 ──
            const _urlParams = new URLSearchParams(location.search);
            const _sessionId = _urlParams.get('session');
            let _sessionEmailConfig = {}; // { ai_prompt, template, signature }
            let _sessionData = null;
            if (_sessionId) {
                try {
                    const { data } = await db.select('project_sessions', {
                        filter: { id: `eq.${_sessionId}` },
                        limit: 1
                    });
                    if (data?.[0]) {
                        _sessionData = data[0];
                        _sessionEmailConfig = data[0].post_email_template || {};
                        console.log('[Report] Session email config loaded:', _sessionEmailConfig);
                    }
                } catch (e) {
                    console.warn('[Report] Failed to load session email config:', e);
                }
            }

            let allStudents = [];
            let checklistItems = [];
            let checklistProgress = [];
            let surveyQuestions = [];
            let surveyResponses = [];
            let submissions = [];
            let emailDrafts = [];
            let examResponses = [];
            let satisfactionResponses = [];
            let scheduledEmails = [];

            async function loadAll() {
                try {
                    // ── 過濾邏輯 ──
                    // 場次模式：學員/checklist/survey 用 session_code
                    //          submissions 用 joinCode（因為 stateManager 存的是 project join_code）
                    // 專案模式：全用 joinCode
                    const _sessionCode = _sessionData?.session_code;
                    const jcFilter = _sessionCode
                        ? { session_code: `eq.${_sessionCode}` }
                        : (joinCode ? { session_code: `eq.${joinCode}` } : {});
                    const studentFilter = _sessionCode
                        ? { session_code: `eq.${_sessionCode}` }
                        : (joinCode ? { project_id: `eq.${joinCode}` } : {});
                    // submissions.session_id = URL ?code= 值 = project join_code
                    const submissionFilter = joinCode
                        ? { session_id: `eq.${joinCode}` }
                        : {};

                    const results = await Promise.all([
                        db.select('students', { order: 'name.asc', filter: studentFilter }),
                        db.select('checklist_items', { filter: jcFilter }),
                        db.select('checklist_progress'),
                        db.select('survey_questions', { filter: jcFilter }),
                        db.select('survey_responses'),
                        db.select('submissions', { select: 'id,student_email,student_name,element_id,type,content,is_correct,score,submitted_at,created_at,session_id', filter: submissionFilter }),
                        db.select('email_drafts'),
                        db.select('exam_responses', { filter: studentFilter }),
                        db.select('satisfaction_responses', { filter: studentFilter })
                    ]);

                    allStudents = results[0].data || [];
                    checklistItems = results[1].data || [];
                    checklistProgress = results[2].data || [];
                    surveyQuestions = results[3].data || [];
                    surveyResponses = results[4].data || [];
                    submissions = results[5].data || [];
                    emailDrafts = results[6].data || [];
                    examResponses = results[7].data || [];
                    satisfactionResponses = results[8].data || [];

                    // Load scheduled emails
                    try {
                        const schedFilter = _sessionId ? { session_id: `eq.${_sessionId}` } : {};
                        const { data: schedData } = await db.select('scheduled_emails', { filter: schedFilter, order: 'scheduled_at.asc' });
                        scheduledEmails = schedData || [];
                    } catch (e) { scheduledEmails = []; }

                    updateStats();
                    populateFilters();
                    renderStudents();
                    renderScheduledEmails();
                    initTemplateEditor();
                } catch (err) {
                    document.getElementById('studentGrid').innerHTML =
                        `<div class="empty-msg" style="color:var(--accent-danger);">載入失敗：${err.message}</div>`;
                }
            }

            function getStudentData(email) {
                const clDone = checklistProgress.filter(p => p.student_email === email && p.completed);
                const srDone = surveyResponses.filter(r => r.student_email === email);
                const subs = submissions.filter(s => s.student_email === email);
                const draft = emailDrafts.find(d => d.student_email === email);

                return {
                    checklistDone: clDone.length,
                    checklistTotal: checklistItems.length,
                    surveyDone: srDone.length,
                    surveyTotal: surveyQuestions.length,
                    surveyResponses: srDone,
                    submissions: subs,
                    homework: subs.filter(s => ['text', 'image', 'link', 'video', 'audio'].includes(s.type)),
                    matching: subs.filter(s => s.type === 'matching'),
                    fillblank: subs.filter(s => s.type === 'fillblank'),
                    emailDraft: draft,
                    examResult: examResponses.find(e => e.student_email === email) || null,
                    satisfactionResult: satisfactionResponses.find(s => s.student_email === email) || null
                };
            }

            function updateStats() {
                document.getElementById('statStudents').textContent = allStudents.length;

                // Avg checklist completion
                if (allStudents.length > 0 && checklistItems.length > 0) {
                    const total = allStudents.reduce((sum, s) => {
                        const done = checklistProgress.filter(p => p.student_email === s.email && p.completed).length;
                        return sum + done / checklistItems.length;
                    }, 0);
                    document.getElementById('statChecklist').textContent = Math.round(total / allStudents.length * 100) + '%';
                } else {
                    document.getElementById('statChecklist').textContent = '—';
                }

                // Survey completion
                if (allStudents.length > 0 && surveyQuestions.length > 0) {
                    const completed = allStudents.filter(s => {
                        return surveyResponses.filter(r => r.student_email === s.email).length >= surveyQuestions.length;
                    }).length;
                    document.getElementById('statSurvey').textContent = `${completed}/${allStudents.length}`;
                } else {
                    document.getElementById('statSurvey').textContent = '—';
                }

                document.getElementById('statSubmissions').textContent = submissions.length;

                // Email stats
                const sentCount = emailDrafts.filter(d => d.status === 'sent').length;
                const openedCount = emailDrafts.filter(d => (d.open_count || 0) > 0).length;
                document.getElementById('statEmailSent').textContent = sentCount > 0 ? sentCount : '—';
                document.getElementById('statEmailOpened').textContent = sentCount > 0 ? `${openedCount}/${sentCount}` : '—';
            }

            // ── CSV 匯出 ──
            document.getElementById('exportCsvBtn')?.addEventListener('click', exportCsv);

            function exportCsv() {
                const rows = [['姓名', '信箱', '組別', '清單完成', '問卷完成', '作業數', '互動成績']];
                for (const s of allStudents) {
                    const d = getStudentData(s.email);
                    const clPct = d.checklistTotal ? `${d.checklistDone}/${d.checklistTotal}` : '—';
                    const svPct = d.surveyTotal ? `${d.surveyDone}/${d.surveyTotal}` : '—';
                    const scores = d.submissions
                        .filter(sub => sub.score)
                        .map(sub => `${sub.assignment_title || sub.type}:${sub.score}`)
                        .join('; ');
                    rows.push([s.name, s.email, s.group_name || '', clPct, svPct, String(d.submissions.length), scores]);
                }
                const bom = '\uFEFF';
                const csv = bom + rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `學員報告_${new Date().toISOString().slice(0, 10)}.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
            }

            function populateFilters() {
                const groups = [...new Set(allStudents.map(s => s.group_name).filter(Boolean))];
                const sel = document.getElementById('filterGroup');
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g;
                    opt.textContent = g;
                    sel.appendChild(opt);
                });
            }

            let currentViewMode = 'list';

            function renderStudents(filter = '') {
                const grid = document.getElementById('studentGrid');
                const header = document.getElementById('studentListHeader');
                const container = document.getElementById('studentListContainer');
                const search = document.getElementById('searchInput').value.toLowerCase();
                const group = document.getElementById('filterGroup').value;

                let filtered = allStudents.filter(s => {
                    if (search && !s.name.toLowerCase().includes(search) && !s.email.toLowerCase().includes(search)) return false;
                    if (group && s.group_name !== group) return false;
                    return true;
                });

                if (filtered.length === 0) {
                    grid.innerHTML = '<div class="empty-msg">沒有符合條件的學員</div>';
                    header.style.display = 'none';
                    return;
                }

                if (currentViewMode === 'list') {
                    grid.classList.add('list-mode');
                    container.classList.add('list-mode-active');
                    header.style.display = 'grid';
                    grid.innerHTML = filtered.map(s => {
                        const d = getStudentData(s.email);
                        const clPct = d.checklistTotal > 0 ? Math.round(d.checklistDone / d.checklistTotal * 100) : 0;
                        const surveyComplete = d.surveyTotal > 0 && d.surveyDone >= d.surveyTotal;
                        const hasDraft = !!d.emailDraft;
                        const clClass = clPct >= 100 ? 'done' : clPct > 0 ? 'partial' : 'none';
                        const svClass = surveyComplete ? 'done' : d.surveyDone > 0 ? 'partial' : 'none';
                        return `
                        <div class="student-list-row">
                            <div class="list-student-info">
                                <div class="list-avatar">${s.name[0]}</div>
                                <div>
                                    <div class="list-name">${s.name}</div>
                                    <div class="list-email">${s.email}${s.group_name ? ` · ${s.group_name}` : ''}</div>
                                </div>
                            </div>
                            <span class="list-status-badge ${clClass}">${clPct}%</span>
                            <span class="list-status-badge ${svClass}">${surveyComplete ? '已完成' : d.surveyDone + '/' + d.surveyTotal}</span>
                            <span>${d.homework.length} 份</span>
                            <span class="list-status-badge ${(() => {
                                if (!hasDraft) return 'none';
                                const isSent = d.emailDraft?.status === 'sent';
                                const isOpened = (d.emailDraft?.open_count || 0) > 0;
                                if (isOpened) return 'done';
                                if (isSent) return 'generated';
                                return 'partial';
                            })()}">${(() => {
                                if (!hasDraft) return '—';
                                const isSent = d.emailDraft?.status === 'sent';
                                const isOpened = (d.emailDraft?.open_count || 0) > 0;
                                const openCount = d.emailDraft?.open_count || 0;
                                if (isOpened) return `已開信 (${openCount})`;
                                if (isSent) return '已寄出';
                                return '草稿';
                            })()}</span>
                            <div class="list-actions">
                                <button class="list-action-btn" onclick="showDetail('${s.email}')">
                                    <span class="material-symbols-rounded">visibility</span>
                                </button>
                                <button class="list-action-btn ai" onclick="generateEmail('${s.email}')">
                                    <span class="material-symbols-rounded">edit_note</span>
                                </button>
                                ${hasDraft ? `<button class="list-action-btn send" onclick="sendEmailFor('${s.email}')">
                                    <span class="material-symbols-rounded">send</span>
                                </button>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    grid.classList.remove('list-mode');
                    container.classList.remove('list-mode-active');
                    header.style.display = 'none';
                    grid.innerHTML = filtered.map(s => {
                        const d = getStudentData(s.email);
                        const clPct = d.checklistTotal > 0 ? Math.round(d.checklistDone / d.checklistTotal * 100) : 0;
                        const surveyComplete = d.surveyTotal > 0 && d.surveyDone >= d.surveyTotal;
                        const avgScore = getAvgScore(d);
                        return `
                        <div class="student-card">
                            <div class="card-header">
                                <div class="avatar">${s.name[0]}</div>
                                <div>
                                    <div class="card-name">${s.name}</div>
                                    <div class="card-meta">${s.email}${s.group_name ? ` · ${s.group_name}` : ''}</div>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="metric-row">
                                    <span class="metric-label"><span class="material-symbols-rounded">task_alt</span> 課前準備</span>
                                    <span class="metric-value"><span class="progress-mini"><span class="progress-mini-fill" style="width:${clPct}%"></span></span> ${d.checklistDone}/${d.checklistTotal}</span>
                                </div>
                                <div class="metric-row">
                                    <span class="metric-label"><span class="material-symbols-rounded">quiz</span> 課前問卷</span>
                                    <span class="metric-value ${surveyComplete ? 'good' : 'warn'}">${surveyComplete ? '已完成' : d.surveyDone + '/' + d.surveyTotal}</span>
                                </div>
                                <div class="metric-row">
                                    <span class="metric-label"><span class="material-symbols-rounded">edit_note</span> 繳交作業</span>
                                    <span class="metric-value">${d.homework.length} 份</span>
                                </div>
                                <div class="metric-row">
                                    <span class="metric-label"><span class="material-symbols-rounded">sports_score</span> 互動成績</span>
                                    <span class="metric-value ${avgScore >= 80 ? 'good' : avgScore >= 50 ? 'warn' : avgScore >= 0 ? 'bad' : ''}">${avgScore >= 0 ? avgScore + ' 分' : '—'}</span>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="card-btn" onclick="showDetail('${s.email}')"><span class="material-symbols-rounded">visibility</span> 詳情</button>
                                <button class="card-btn ai" onclick="generateEmail('${s.email}')"><span class="material-symbols-rounded">edit_note</span> 生成信件</button>
                            </div>
                        </div>`;
                    }).join('');
                }
            }

            function getAvgScore(d) {
                const scored = [...d.matching, ...d.fillblank].filter(s => s.score != null);
                if (scored.length === 0) return -1;
                const sum = scored.reduce((a, s) => a + parseFloat(s.score || 0), 0);
                return Math.round(sum / scored.length);
            }

            // ── Detail Modal ──
            window.showDetail = function (email) {
                const student = allStudents.find(s => s.email === email);
                const d = getStudentData(email);
                if (!student) return;

                document.getElementById('modalStudentName').textContent = `${student.name} 的學習報告`;

                const clDoneIds = new Set(checklistProgress.filter(p => p.student_email === email && p.completed).map(p => p.checklist_item_id));
                const clDone = checklistItems.filter(i => clDoneIds.has(i.id)).length;
                const clTotal = checklistItems.length;
                const clPct = clTotal > 0 ? Math.round(clDone / clTotal * 100) : 0;
                const surveyComplete = d.surveyDone >= d.surveyTotal;
                const interactive = [...d.matching, ...d.fillblank];
                const scored = interactive.filter(s => s.score != null);
                const avgScore = scored.length > 0 ? Math.round(scored.reduce((a, s) => a + parseFloat(s.score || 0), 0) / scored.length) : -1;

                let html = '';

                // ── Stats Row ──

                const countEl = document.getElementById('scheduledCount');
                if (!container) return;

                const pending = scheduledEmails.filter(s => s.status === 'pending');
                const sent = scheduledEmails.filter(s => s.status === 'sent');
                countEl.textContent = pending.length > 0 ? `（${pending.length} 封待發送）` : '';

                if (scheduledEmails.length === 0) {
                    container.innerHTML = '<div style="color:#80868b;padding:8px 0;">尚無排程追蹤信。發送信件後會自動排程。</div>';
                    return;
                }

                const statusIcon = { pending: '⏳', sent: '✅', failed: '❌', cancelled: '🚫' };
                const statusLabel = { pending: '待發送', sent: '已發送', failed: '失敗', cancelled: '已取消' };

                container.innerHTML = `
                    <table style="width:100%;border-collapse:collapse;font-size:0.82rem;">
                        <thead>
                            <tr style="border-bottom:1.5px solid #e8eaed;">
                                <th style="text-align:left;padding:6px 0;font-weight:600;color:#5f6368;">學員</th>
                                <th style="text-align:left;padding:6px 0;font-weight:600;color:#5f6368;">類型</th>
                                <th style="text-align:left;padding:6px 0;font-weight:600;color:#5f6368;">排程時間</th>
                                <th style="text-align:left;padding:6px 0;font-weight:600;color:#5f6368;">狀態</th>
                                <th style="text-align:right;padding:6px 0;font-weight:600;color:#5f6368;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${scheduledEmails.map(s => `
                                <tr style="border-bottom:1px solid #f1f3f4;">
                                    <td style="padding:8px 0;">${s.student_name || s.student_email}</td>
                                    <td style="padding:8px 0;color:#80868b;">${s.delay_days} 天後追蹤</td>
                                    <td style="padding:8px 0;color:#80868b;">${new Date(s.scheduled_at).toLocaleString('zh-TW')}</td>
                                    <td style="padding:8px 0;">${statusIcon[s.status] || ''} ${statusLabel[s.status] || s.status}</td>
                                    <td style="padding:8px 0;text-align:right;">
                                        ${s.status === 'pending' ? `<button onclick="cancelScheduled('${s.id}')" style="background:none;border:1px solid #dadce0;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:0.78rem;color:#c5221f;">取消</button>` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            window.cancelScheduled = async function (id) {
                try {
                    await db.update('scheduled_emails', { status: 'cancelled' }, { filter: { id: `eq.${id}` } });
                    const se = scheduledEmails.find(s => s.id === id);
                    if (se) se.status = 'cancelled';
                    renderScheduledEmails();
                    showToast('已取消排程');
                } catch (err) {
                    showToast('取消失敗：' + err.message, { type: 'error' });
                }
            };

            // ── 批量排程追蹤信 ──
            document.getElementById('scheduleAllBtn')?.addEventListener('click', async () => {
                const days = parseInt(document.getElementById('followupDays').value);
                const sentDrafts = emailDrafts.filter(d => d.status === 'sent');
                if (sentDrafts.length === 0) {
                    showToast('沒有已發送的信件可排程', { type: 'error' });
                    return;
                }

                let scheduled = 0;
                for (const draft of sentDrafts) {
                    // 檢查是否已排程相同天數
                    const exists = scheduledEmails.find(se =>
                        se.student_email === draft.student_email && se.delay_days === days && se.status === 'pending'
                    );
                    if (exists) continue;

                    const student = allStudents.find(s => s.email === draft.student_email);
                    try {
                        await db.insert('scheduled_emails', {
                            session_id: _sessionId || null,
                            student_email: draft.student_email,
                            student_name: student?.name || '',
                            email_type: `followup_${days}d`,
                            delay_days: days,
                            scheduled_at: new Date((draft.sent_at ? new Date(draft.sent_at).getTime() : Date.now()) + days * 24 * 60 * 60 * 1000).toISOString(),
                            status: 'pending'
                        });
                        scheduled++;
                    } catch (e) {
                        console.warn('[Schedule] Skip', draft.student_email, e);
                    }
                }

                // Reload
                try {
                    const schedFilter = _sessionId ? { session_id: `eq.${_sessionId}` } : {};
                    const { data: sd } = await db.select('scheduled_emails', { filter: schedFilter, order: 'scheduled_at.asc' });
                    scheduledEmails = sd || [];
                } catch(e) {}
                renderScheduledEmails();
                showToast(`已為 ${scheduled} 位學員排程 ${days} 天後的追蹤信`);
            });

            // ── Filters ──
            document.getElementById('searchInput').addEventListener('input', () => renderStudents());
            document.getElementById('filterGroup').addEventListener('change', () => renderStudents());

            // ── Init ──
            loadAll();
        </script>
    </div><!-- /admin-main -->
    <script src="components/nav.js"></script>
</body>

</html>
