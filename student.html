                    // 初始化互動元件（必須在 DOM 建立後）
                    setTimeout(() => {
                        matchingGame.init();
                        fillBlank.init();
                        orderingGame.init();
                        showcase.init();
                        quizGame.init();
                        pollGame.init();
                        trueFalse.init();
                        openText.init();
                        scale.init();
                        buzzer.init();
                        wordCloud.init();
                        hotspot.init();
                        if (countdown.observeNewElements) countdown.observeNewElements();
                    }, 50);
                });
            }, 200);

            // 計數器（不需等待 DOM，立即更新）
            document.getElementById('slideCounter').textContent =
                `${(index || 0) + 1} / ${total || '—'}`;
            const pFill = document.getElementById('studentProgressFill');
            if (pFill && total > 0) pFill.style.width = `${((index + 1) / total) * 100}%`;

            // QR Code
            updateStudentQR(slide);
        }

        // ── QR Code 顯示 ──
        const interactiveTypes = ['quiz', 'poll', 'truefalse', 'opentext', 'scale', 'buzzer', 'wordcloud', 'hotspot', 'matching', 'fillblank', 'ordering', 'homework', 'copycard', 'document', 'showcase', 'assessment', 'icebreaker', 'assessmentWall'];
        function updateStudentQR(slide) {
            let qrEl = document.getElementById('studentQRCode');
            const hasInteractive = slide?.elements?.some(el => interactiveTypes.includes(el.type));
            if (!sessionCode || !hasInteractive) {
                if (qrEl) qrEl.style.display = 'none';
                return;
            }
            const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
            const audUrl = `${base}student.html?code=${sessionCode}`;
            const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(audUrl)}&bgcolor=ffffff&color=4f46e5`;
            if (!qrEl) {
                qrEl = document.createElement('div');
                qrEl.id = 'studentQRCode';
                qrEl.style.cssText = 'position:fixed;bottom:20px;left:20px;z-index:201;background:white;border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);opacity:0.85;transition:opacity 0.3s;cursor:pointer;';
                qrEl.innerHTML = `<img src="${qrSrc}" width="100" height="100" style="display:block;border-radius:6px;">
                    <div style="text-align:center;font-size:10px;color:#1a73e8;margin-top:4px;font-weight:600;">掃碼互動</div>`;
                qrEl.addEventListener('mouseenter', () => qrEl.style.opacity = '1');
                qrEl.addEventListener('mouseleave', () => qrEl.style.opacity = '0.85');
                qrEl.addEventListener('click', () => {
                    navigator.clipboard.writeText(audUrl).catch(() => { });
                });
                document.body.appendChild(qrEl);
            }
            qrEl.querySelector('img').src = qrSrc;
            qrEl.style.display = '';
        }

        // ── 工具函式：打亂陣列 ──
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ── 建立元素 DOM（與 slideManager.js 完全對齊） ──
        function createElementNode(element) {
            const el = document.createElement('div');
            // 使用與編輯器相同的 class 結構
            el.className = `editable-element ${element.type}-element`;
            el.dataset.id = element.id;
            el.dataset.type = element.type;
            el.id = element.id;

            el.style.left = `${element.x}px`;
            el.style.top = `${element.y}px`;
            el.style.width = `${element.width}px`;
            el.style.height = `${element.height}px`;
            if (element.rotation) el.style.transform = `rotate(${element.rotation}deg)`;
            if (element.zIndex) el.style.zIndex = element.zIndex;

            // 設定分數並加入分數徽章
            const interactiveTypes = ['quiz', 'truefalse', 'buzzer', 'matching', 'fillblank', 'ordering', 'hotspot', 'poll', 'opentext', 'scale', 'wordcloud', 'copycard', 'document', 'homework', 'assessment'];
            if (interactiveTypes.includes(element.type)) {
                const pts = parseInt(element.points) || defaultPts[element.type] || 0;
                el.dataset.points = pts;
                // 套用 CSS custom properties（與講師端 _applyInteractiveStyles 對齊）
                el.style.setProperty('--ia-title-fs', (element.titleFontSize || 18) + 'px');
                el.style.setProperty('--ia-option-fs', (element.optionFontSize || 15) + 'px');
                el.style.setProperty('--ia-padding', (element.interactivePadding || 16) + 'px');
                if (pts > 0) {
                    const badge = document.createElement('div');
                    badge.className = 'element-score-badge';
                    badge.innerHTML = `<span class="material-symbols-outlined" style="font-size:12px;">stars</span> 1~${pts}分`;
                    setTimeout(() => el.appendChild(badge), 0);
                }
            }

            switch (element.type) {
                case 'text':
                    el.innerHTML = element.content || '';
                    el.style.fontSize = `${element.fontSize || 18}px`;
                    el.style.color = element.color || '#2d3748';
                    el.style.fontWeight = element.bold ? 'bold' : 'normal';
                    el.style.fontStyle = element.italic ? 'italic' : 'normal';
                    el.style.textDecoration = element.underline ? 'underline' : 'none';
                    if (element.textAlign) el.style.textAlign = element.textAlign;
                    if (element.fontFamily) el.style.fontFamily = element.fontFamily;
                    if (element.lineHeight) el.style.lineHeight = element.lineHeight;
                    el.style.overflow = 'visible';
                    break;

                case 'shape':
                    el.classList.add(element.shapeType || 'rectangle');
                    el.style.background = element.background || '';
                    if (element.borderRadius) el.style.borderRadius = `${element.borderRadius}px`;
                    if (element.opacity !== undefined) el.style.opacity = element.opacity;
                    if (element.border) el.style.border = element.border;
                    break;

                case 'image': {
                    const src = element.src || '';
                    if (src.startsWith('data:image/svg+xml;base64,')) {
                        try {
                            const svgStr = decodeURIComponent(escape(atob(src.split(',')[1])));
                            el.innerHTML = `<div style="width:100%;height:100%;overflow:hidden;">${svgStr}</div>`;
                            const svgEl = el.querySelector('svg');
                            if (svgEl) { svgEl.setAttribute('width', '100%'); svgEl.setAttribute('height', '100%'); svgEl.style.display = 'block'; }
                        } catch (_) {
                            el.innerHTML = `<img src="${src}" alt="" style="width:100%;height:100%;object-fit:${element.objectFit || 'contain'}" draggable="false">`;
                        }
                    } else {
                        el.innerHTML = `<img src="${src}" alt="" style="width:100%;height:100%;object-fit:${element.objectFit || 'contain'}" draggable="false">`;
                    }
                    break;
                }

                case 'video':
                    if (element.embedUrl) {
                        el.innerHTML = `<iframe src="${element.embedUrl}" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>`;
                    } else if (element.src) {
                        el.innerHTML = `<video src="${element.src}" controls style="width:100%;height:100%;"></video>`;
                    }
                    break;

                case 'audio':
                    el.innerHTML = `
                        <div class="audio-icon">♪</div>
                        <audio src="${element.src}" controls></audio>
                    `;
                    break;

                case 'link': {
                    el.classList.add('link-element');
                    const linkUrl = element.linkUrl || '#';
                    const linkLabel = element.linkLabel || '開啟連結';
                    const linkDesc = element.linkDesc || '';
                    const lColor = element.linkColor || '#1a73e8';
                    const lIcon = element.linkIcon || 'open_in_new';
                    const lImage = element.linkImage || '';

                    if (lImage) {
                        el.innerHTML = `
                            <div class="link-card link-card--image" data-url="${linkUrl.replace(/"/g, '&quot;')}" style="--link-color:${lColor};flex-direction:column;padding:0;overflow:hidden;">
                                <div style="position:relative;width:100%;padding-top:56.25%;overflow:hidden;">
                                    <img src="${lImage}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" />
                                    <div style="position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:8px;background:${lColor};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
                                        <span class="material-symbols-outlined" style="font-size:16px;color:white;">${lIcon}</span>
                                    </div>
                                </div>
                                <div style="padding:10px 14px;">
                                    <div class="link-card-label">${linkLabel}</div>
                                    ${linkDesc ? `<div class="link-card-desc">${linkDesc}</div>` : ''}
                                    <div class="link-card-url" style="margin-top:4px;">${linkUrl}</div>
                                </div>
                            </div>`;
                    } else {
                        el.innerHTML = `
                            <div class="link-card" data-url="${linkUrl.replace(/"/g, '&quot;')}" style="--link-color:${lColor};">
                                <div class="link-card-icon" style="background:${lColor};">
                                    <span class="material-symbols-outlined">${lIcon}</span>
                                </div>
                                <div class="link-card-body">
                                    <div class="link-card-label">${linkLabel}</div>
                                    ${linkDesc ? `<div class="link-card-desc">${linkDesc}</div>` : ''}
                                    <div class="link-card-url">${linkUrl}</div>
                                </div>
                                <div class="link-card-arrow" style="color:${lColor};">
                                    <span class="material-symbols-outlined">arrow_forward</span>
                                </div>
                            </div>`;
                    }
                    el.querySelector('.link-card')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        let finalUrl = linkUrl;
                        // 自動帶入 session 和 student 參數（survey.html）
                        if (finalUrl.includes('survey.html')) {
                            try {
                                const u = new URL(finalUrl, location.origin);
                                if (!u.searchParams.get('session') && sessionCode) u.searchParams.set('session', sessionCode);
                                if (!u.searchParams.get('student') && studentEmail) u.searchParams.set('student', studentEmail);
                                finalUrl = u.toString();
                            } catch (_) { }
                        }
                        window.open(finalUrl, '_blank');
                    });
                    break;
                }

                case 'fileDownload': {
                    el.classList.add('file-download-element');
                    const fname = element.fileName || '文件';
                    const furl = element.fileUrl || '#';
                    const fsize = element.fileSize || '';
                    const fext = element.fileExt || 'FILE';
                    const extColors = { PDF: '#e74c3c', DOC: '#2b579a', DOCX: '#2b579a', XLS: '#217346', XLSX: '#217346', PPT: '#d24726', PPTX: '#d24726', ZIP: '#f39c12', RAR: '#f39c12', TXT: '#636e72', CSV: '#27ae60' };
                    const extColor = extColors[fext] || '#636e72';
                    el.innerHTML = `
                        <div class="file-download-card" style="
                            display:flex;align-items:center;gap:12px;padding:14px 18px;
                            background:#fff;border:2px solid #e2e8f0;border-radius:8px;
                            height:100%;box-sizing:border-box;cursor:pointer;transition:all 0.2s;
                        ">
                            <div style="min-width:48px;height:48px;border-radius:6px;background:${extColor};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.7rem;">${fext}</div>
                            <div style="flex:1;overflow:hidden;">
                                <div style="font-size:0.88rem;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${fname}</div>
                                <div style="font-size:0.75rem;color:#94a3b8;margin-top:2px;">${fsize}</div>
                            </div>
                            <span class="material-symbols-outlined" style="font-size:22px;color:${extColor};">download</span>
                        </div>`;
                    el.querySelector('.file-download-card')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const a = document.createElement('a');
                        a.href = furl;
                        a.download = fname;
                        a.target = '_blank';
                        a.click();
                    });
                    break;
                }

                case 'flowline': {
                    // ★ 流動線條 — 純 SVG 渲染（不需要編輯器的 waypoint handles）
                    // 注入動畫 keyframe（一次性）
                    if (!document.getElementById('flowlineDashStyle')) {
                        const s = document.createElement('style');
                        s.id = 'flowlineDashStyle';
                        s.textContent = '@keyframes flowlineDash{from{stroke-dashoffset:0}to{stroke-dashoffset:-1000}}';
                        document.head.appendChild(s);
                    }

                    const w = element.width;
                    const h = element.height;
                    let pts = [...(element.waypoints || [])];
                    if (pts.length < 2) break;

                    // 吸附：用 slidesCache 找目標元素座標
                    const currentSlide = slidesCache[currentIndex];
                    if (element.snapStartId && currentSlide) {
                        const target = (currentSlide.elements || []).find(e => e.id === element.snapStartId);
                        if (target) {
                            const cx = target.x + target.width / 2, cy = target.y + target.height / 2;
                            pts[0] = { x: cx - element.x, y: cy - element.y };
                        }
                    }
                    if (element.snapEndId && currentSlide) {
                        const target = (currentSlide.elements || []).find(e => e.id === element.snapEndId);
                        if (target) {
                            const cx = target.x + target.width / 2, cy = target.y + target.height / 2;
                            pts[pts.length - 1] = { x: cx - element.x, y: cy - element.y };
                        }
                    }

                    const flColor = element.lineColor || '#1a73e8';
                    const flGlow = element.glowColor || '#4285f4';
                    const flLw = element.lineWidth || 3;
                    const flSpeed = element.flowSpeed || 2;
                    const flDir = element.flowDirection || 1;
                    const flPCount = element.particleCount || 3;
                    const flDash = element.dashLength || 16;
                    const flShowArrow = element.showArrow || false;
                    const flCurve = element.curveMode || 'curved';

                    // 產生路徑
                    let pathD;
                    if (pts.length === 2 || flCurve === 'straight') {
                        pathD = `M${pts[0].x},${pts[0].y}`;
                        for (let i = 1; i < pts.length; i++) pathD += ` L${pts[i].x},${pts[i].y}`;
                    } else {
                        pathD = `M${pts[0].x},${pts[0].y}`;
                        for (let i = 0; i < pts.length - 1; i++) {
                            const p0 = pts[Math.max(i - 1, 0)];
                            const p1 = pts[i];
                            const p2 = pts[i + 1];
                            const p3 = pts[Math.min(i + 2, pts.length - 1)];
                            const t = 0.3;
                            pathD += ` C${(p1.x + (p2.x - p0.x) * t).toFixed(1)},${(p1.y + (p2.y - p0.y) * t).toFixed(1)} ${(p2.x - (p3.x - p1.x) * t).toFixed(1)},${(p2.y - (p3.y - p1.y) * t).toFixed(1)} ${p2.x},${p2.y}`;
                        }
                    }

                    // 路徑長度
                    let totalLen = 0;
                    for (let i = 1; i < pts.length; i++) totalLen += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
                    totalLen = Math.max(totalLen, 200);
                    const dur = (6 - flSpeed) * 1.5 + 1;

                    // 箭頭
                    const arrowMk = flShowArrow ? `<marker id="sFlowArrow_${element.id}" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,4 L0,8 L2,4 Z" fill="${flColor}"/></marker>` : '';
                    const mkEnd = flShowArrow ? `marker-end="url(#sFlowArrow_${element.id})"` : '';

                    // 粒子
                    let particlePaths = '';
                    for (let i = 0; i < flPCount; i++) {
                        const delay = (dur / flPCount) * i;
                        const opacity = 0.5 + (0.5 / flPCount) * (flPCount - i);
                        const pDash = flDash + i * 4;
                        const gap = totalLen;
                        const animDir = flDir === -1 ? 'reverse' : 'normal';
                        particlePaths += `<path d="${pathD}" fill="none" stroke="${flColor}" stroke-width="${flLw}" stroke-linecap="round" stroke-dasharray="${pDash} ${gap}" opacity="${opacity.toFixed(2)}" style="animation: flowlineDash ${dur.toFixed(1)}s linear ${delay.toFixed(1)}s infinite ${animDir};"><set attributeName="stroke-dashoffset" to="${gap + pDash}"/></path>`;
                    }

                    const startPt = pts[0], endPt = pts[pts.length - 1];
                    el.style.overflow = 'visible';
                    el.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;overflow:visible;">
                            <defs>
                                <filter id="sFlowGlow_${element.id}" x="-20%" y="-20%" width="140%" height="140%">
                                    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                                ${arrowMk}
                            </defs>
                            <path d="${pathD}" fill="none" stroke="${flGlow}" stroke-width="${flLw + 6}" stroke-linecap="round" opacity="0.15" filter="url(#sFlowGlow_${element.id})"/>
                            <path d="${pathD}" fill="none" stroke="${flColor}" stroke-width="${flLw}" stroke-linecap="round" opacity="0.2" ${mkEnd}/>
                            ${particlePaths}
                            <circle cx="${startPt.x}" cy="${startPt.y}" r="${flLw + 2}" fill="${flColor}" opacity="0.6"/>
                            ${flShowArrow ? '' : `<circle cx="${endPt.x}" cy="${endPt.y}" r="${flLw + 2}" fill="${flColor}" opacity="0.6"/>`}
                        </svg>`;
                    break;
                }

                case 'leaderboard': {
                    el.classList.add('leaderboard-element');
                    el.style.overflow = 'hidden';
                    const lbTitle = element.lbTitle || '🏆 排行榜';
                    // 先用 placeholder，然後載入真實資料
                    const medals = ['🥇', '🥈', '🥉'];
                    const pColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
                    const pHeights = [140, 110, 90];
                    const pOrder = [1, 0, 2];
                    const renderLB = (data) => {
                        const top3 = data.slice(0, 3);
                        const rest = data.slice(3, 10);
                        let podium = '<div class="lb-podium">';
                        pOrder.forEach(rank => {
                            const s = top3[rank];
                            if (!s) { podium += '<div class="lb-podium-slot lb-empty-slot"></div>'; return; }
                            const nm = s.name?.length > 6 ? s.name.slice(0, 6) + '…' : (s.name || '—');
                            podium += `<div class="lb-podium-slot"><div class="lb-podium-avatar" style="border-color:${pColors[rank]}"><span class="lb-medal">${medals[rank]}</span></div><div class="lb-podium-name">${nm}</div><div class="lb-podium-pts">${s.totalPoints} 分</div><div class="lb-podium-bar" style="height:${pHeights[rank]}px;background:linear-gradient(135deg,${pColors[rank]}40,${pColors[rank]}20);border-top:3px solid ${pColors[rank]};"><span class="lb-podium-rank">${rank + 1}</span></div></div>`;
                        });
                        podium += '</div>';
                        let list = '';
                        if (rest.length > 0) {
                            list = '<div class="lb-rest">' + rest.map((s, i) => `<div class="lb-row"><span class="lb-row-rank">${i + 4}</span><span class="lb-row-name">${s.name || '—'}</span><span class="lb-row-pts">${s.totalPoints} 分</span></div>`).join('') + '</div>';
                        }
                        el.innerHTML = `<div class="lb-widget"><div class="lb-widget-title"><span class="lb-trophy">🏆</span><span>${lbTitle}</span></div>${podium}${list}${data.length === 0 ? '<div class="lb-no-data">尚無排行資料</div>' : ''}</div>`;
                    };
                    renderLB([]);
                    // 載入真實資料（使用 session UUID，與側欄排行榜一致）
                    import('./scripts/interactive/stateManager.js').then(({ stateManager }) => {
                        const sc = stateManager.getSessionCode() || new URLSearchParams(location.search).get('code') || '';
                        if (sc) {
                            stateManager.getLeaderboard(sc).then(d => renderLB(d));
                        }
                    }).catch(() => { });
                    break;
                }

                case 'matching': {
                    el.classList.add('interactive-element');
                    const pairs = element.pairs || [];
                    const shuffledPairs = shuffleArray(pairs);
                    const mIw = element.matchingItemWidth || 180;
                    const mFs = element.matchingFontSize || 15;
                    const mGap = element.matchingGap || 20;
                    el.innerHTML = `
                        <div class="matching-container">
                            <svg class="matching-lines"></svg>
                            <div class="matching-column left-column" style="width:${mIw}px;gap:${mGap}px;">
                                ${pairs.map((pair, i) => `
                                    <div class="matching-item" data-index="${i}" data-side="left" data-match-id="m${i}" style="font-size:${mFs}px;">
                                        ${pair.left}
                                        <div class="matching-dot left"></div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="matching-column right-column" style="width:${mIw}px;gap:${mGap}px;">
                                ${shuffledPairs.map((pair) => {
                        const origIdx = pairs.indexOf(pair);
                        return `
                                        <div class="matching-item" data-answer="${pair.left}" data-side="right" data-match-id="m${origIdx}" style="font-size:${mFs}px;">
                                            ${pair.right}
                                            <div class="matching-dot right"></div>
                                        </div>
                                    `;
                    }).join('')}
                            </div>
                        </div>
                    `;
                    break;
                }

                case 'fillblank': {
                    el.classList.add('interactive-element');
                    let contentHtml = element.content || '';
                    (element.blanks || []).forEach((blank, i) => {
                        contentHtml = contentHtml.replace(
                            `___${i + 1}___`,
                            `<input type="text" class="fill-blank-input" data-index="${i}" data-answer="${blank.answer}" placeholder="?">`
                        );
                    });
                    el.innerHTML = `
                        <div class="fill-blank-container">
                            <div class="fill-blank-title">${element.title || '填空練習'}</div>
                            <div class="fill-blank-content">${contentHtml}</div>
                            <button class="fill-blank-check-btn">檢查答案</button>
                            <div class="fill-blank-result"></div>
                        </div>
                    `;
                    break;
                }

                case 'ordering': {
                    el.classList.add('interactive-element');
                    const steps = element.steps || ['步驟一', '步驟二', '步驟三'];
                    const shuffledSteps = shuffleArray([...steps]);
                    el.innerHTML = `
                        <div class="ordering-container">
                            <div class="ordering-source">
                                <div class="ordering-source-title">拖曳選項</div>
                                ${shuffledSteps.map((text, i) => `
                                    <div class="ordering-chip" draggable="true" data-value="${text}">
                                        <span class="chip-icon">${String.fromCharCode(65 + i)}</span>
                                        ${text}
                                    </div>
                                `).join('')}
                            </div>
                            <div class="ordering-slots">
                                <div class="ordering-slots-title">正確順序</div>
                                ${steps.map((text, i) => `
                                    <div class="ordering-slot" data-correct-order="${text}">
                                        <span class="slot-number">${i + 1}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    break;
                }

                case 'quiz': {
                    el.classList.add('interactive-element');
                    const markers = 'ABCDEFGHIJ';
                    const isMultiple = element.multiple || false;
                    const options = element.options || [];
                    el.innerHTML = `
                        <div class="quiz-container" data-multiple="${isMultiple}">
                            <div class="quiz-question">${element.question || '請選擇正確答案'}</div>
                            <div class="quiz-options">
                                ${options.map((opt, i) => `
                                    <div class="quiz-option" data-correct="${opt.correct ? 'true' : 'false'}">
                                        <span class="option-marker">${markers[i] || String(i + 1)}</span>
                                        <span>${opt.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="quiz-footer">
                                <span class="quiz-result"></span>
                                <div style="display:flex;gap:8px;align-items:center;">
                                    <button class="quiz-retry">重試</button>
                                    ${isMultiple ? '<button class="quiz-submit">提交</button>' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                }

                case 'poll': {
                    el.classList.add('interactive-element');
                    const pollMarkers = 'ABCDEFGHIJ';
                    const pollOptions = element.options || [];
                    el.innerHTML = `
                        <div class="poll-container" data-element-id="${element.id}">
                            <div class="poll-question">${element.question || '請投票'}</div>
                            <div class="poll-options">
                                ${pollOptions.map((opt, i) => `
                                    <div class="poll-option" data-index="${i}">
                                        <span class="option-marker">${pollMarkers[i] || String(i + 1)}</span>
                                        <span>${opt.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="poll-footer">
                                <span class="poll-total"></span>
                            </div>
                        </div>
                    `;
                    break;
                }

                case 'copycard': {
                    el.classList.add('interactive-element');
                    const rawCopy = element.content || '';
                    const ccVarRe = /\{\{([^}]+)\}\}/g;
                    const ccVars = [];
                    let ccM;
                    while ((ccM = ccVarRe.exec(rawCopy)) !== null) {
                        if (!ccVars.includes(ccM[1])) ccVars.push(ccM[1]);
                    }
                    const ccHasVars = ccVars.length > 0;
                    let ccDisplay = rawCopy.replace(/\n/g, '<br>');
                    if (ccHasVars) {
                        ccDisplay = ccDisplay.replace(/\{\{([^}]+)\}\}/g, (_, name) =>
                            `<input type="text" class="cc-var-input" data-var="${name}" placeholder="${name}" autocomplete="off">`
                        );
                    }
                    el.innerHTML = `
                        <div class="copy-card-container" data-copy-template="${rawCopy.replace(/"/g, '&quot;')}">
                            <div class="copy-card-title">${element.title || '點擊複製'}</div>
                            <div class="copy-card-content">${ccDisplay}</div>
                            ${ccHasVars ? '<div class="cc-var-hint">請填寫所有欄位後再複製</div>' : ''}
                            <button class="copy-card-btn" ${ccHasVars ? 'disabled' : ''}>
                                <span class="copy-icon">⧉</span>
                                <span class="copy-text">點擊複製</span>
                            </button>
                            <div class="copy-card-feedback"></div>
                        </div>
                    `;
                    if (ccHasVars) {
                        const draftKey = `cc_draft_${element.id}`;
                        const ccInputs = el.querySelectorAll('.cc-var-input');
                        const ccBtn = el.querySelector('.copy-card-btn');

                        // 還原暫存草稿
                        try {
                            const draft = JSON.parse(sessionStorage.getItem(draftKey) || '{}');
                            ccInputs.forEach(inp => {
                                if (draft[inp.dataset.var]) inp.value = draft[inp.dataset.var];
                            });
                            ccBtn.disabled = ![...ccInputs].every(i => i.value.trim());
                        } catch { /* ignore */ }

                        ccInputs.forEach(inp => {
                            inp.addEventListener('input', () => {
                                ccBtn.disabled = ![...ccInputs].every(i => i.value.trim());
                                // 暫存草稿到 sessionStorage
                                const draft = {};
                                ccInputs.forEach(i => { draft[i.dataset.var] = i.value; });
                                sessionStorage.setItem(draftKey, JSON.stringify(draft));
                            });
                            inp.addEventListener('click', e => e.stopPropagation());
                        });
                    }
                    const ccCopyBtn = el.querySelector('.copy-card-btn');
                    const ccFeedback = el.querySelector('.copy-card-feedback');
                    ccCopyBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        let txt = rawCopy;
                        const variables = {};
                        if (ccHasVars) {
                            el.querySelectorAll('.cc-var-input').forEach(inp => {
                                const val = inp.value.trim();
                                variables[inp.dataset.var] = val;
                                txt = txt.replaceAll(`{{${inp.dataset.var}}}`, val);
                            });
                        }
                        try {
                            await navigator.clipboard.writeText(txt);
                            ccFeedback.textContent = '✓ 已複製到剪貼簿！';
                            ccFeedback.classList.add('success');
                            ccCopyBtn.classList.add('copied');

                            // 儲存到 DB（變數 + 最終文字）
                            await stateManager.save(element.id, {
                                type: 'copycard',
                                title: element.title || '複製卡',
                                content: txt,
                                isCorrect: null,
                                score: null,
                                points: parseInt(element.points) || defaultPts.copycard || 1,
                                participated: true,
                                state: { variables, template: rawCopy }
                            });
                            // 清除草稿
                            sessionStorage.removeItem(`cc_draft_${element.id}`);

                            setTimeout(() => {
                                ccFeedback.textContent = '';
                                ccFeedback.classList.remove('success');
                                ccCopyBtn.classList.remove('copied');
                            }, 2000);
                        } catch (err) {
                            ccFeedback.textContent = '複製失敗，請手動選取文字';
                            ccFeedback.classList.add('error');
                        }
                    });
                    break;
                }

                case 'homework': {
                    el.classList.add('interactive-element', 'homework-element');
                    const hwMode = element.submissionMode || '';
                    const modeNames = { image_only: '圖片上傳', image_prompt: '圖片 + 提示詞', text_only: '文字繳交' };
                    const modeIcons = { image_only: 'image', image_prompt: 'photo_camera', text_only: 'edit_note' };
                    const modeName = modeNames[hwMode] || '全功能';
                    const modeIconName = modeIcons[hwMode] || 'upload_file';
                    const exampleHtml = element.example ? `
                        <div class="hw-example-block">
                            <button class="hw-example-toggle" type="button">
                                <span class="material-symbols-outlined" style="font-size:16px;">lightbulb</span>
                                查看範例
                                <span class="material-symbols-outlined hw-example-arrow" style="font-size:14px;">expand_more</span>
                            </button>
                            <div class="hw-example-content">${element.example.replace(/\n/g, '<br>')}</div>
                        </div>` : '';

                    const uploadBlock = (id) => `
                        <div class="hw-upload-zone" id="hwUpload_${id}">
                            <span class="material-symbols-outlined" style="font-size:24px;color:#444746;">cloud_upload</span>
                            <span>點擊或拖曳圖片至此</span>
                            <input type="file" accept="image/*" class="hw-file-input" hidden>
                        </div>
                        <div class="hw-preview" id="hwPreview_${id}"></div>`;

                    let inlineFormHtml = '';
                    if (hwMode === 'image_only') {
                        inlineFormHtml = uploadBlock(element.id);
                    } else if (hwMode === 'image_prompt') {
                        inlineFormHtml = `${uploadBlock(element.id)}
                            <textarea class="hw-inline-textarea" id="hwPrompt_${element.id}" placeholder="請貼上你使用的 Prompt..." rows="2"></textarea>`;
                    } else if (hwMode === 'text_only') {
                        inlineFormHtml = `
                            <textarea class="hw-inline-textarea" id="hwText_${element.id}" placeholder="在這裡輸入你的作業內容..." rows="3"></textarea>`;
                    } else {
                        inlineFormHtml = `
                            <div class="hw-full-tabs">
                                <button class="hw-tab active" data-type="text"><span class="material-symbols-outlined" style="font-size:14px;">edit_note</span> 文字</button>
                                <button class="hw-tab" data-type="image"><span class="material-symbols-outlined" style="font-size:14px;">image</span> 圖片</button>
                                <button class="hw-tab" data-type="link"><span class="material-symbols-outlined" style="font-size:14px;">link</span> 連結</button>
                            </div>
                            <div class="hw-full-panel active" data-panel="text">
                                <textarea class="hw-inline-textarea" id="hwText_${element.id}" placeholder="在這裡輸入你的作業內容..." rows="3"></textarea>
                            </div>
                            <div class="hw-full-panel" data-panel="image">
                                ${uploadBlock(element.id)}
                            </div>
                            <div class="hw-full-panel" data-panel="link">
                                <input type="url" class="hw-inline-textarea" id="hwLink_${element.id}" placeholder="https://..." style="padding:10px;">
                            </div>`;
                    }

                    el.innerHTML = `
                        <div class="hw-card">
                            <div class="hw-card-header" style="display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <div class="hw-card-icon"><span class="material-symbols-outlined">assignment</span></div>
                                    <div class="hw-card-info">
                                        <div class="hw-card-title">${element.title || '課堂作業'}</div>
                                        <div class="hw-card-mode"><span class="material-symbols-outlined" style="font-size:13px;">${modeIconName}</span> ${modeName}</div>
                                    </div>
                                </div>
                                <div class="hw-counter-badge" data-element-id="${element.id}" style="display:flex;align-items:center;gap:4px;background:#e6f4ea;border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:12px;color:#1e8e3e;font-weight:600;">
                                    <span class="material-symbols-outlined" style="font-size:14px;">group</span>
                                    <span class="hw-counter-num">0</span> 人已繳交
                                </div>
                            </div>
                            ${element.description ? `<div class="hw-card-desc">${element.description}</div>` : ''}
                            ${exampleHtml}

                            <div class="hw-inline-form" style="display:none;">
                                ${inlineFormHtml}
                                <div class="hw-error-msg" style="display:none;"></div>
                                <button class="hw-submit-btn" type="button">
                                    <span class="material-symbols-outlined" style="font-size:16px;">send</span> 提交作業
                                </button>
                            </div>
                            <button class="hw-start-btn" type="button">
                                <span class="material-symbols-outlined" style="font-size:18px;">edit_square</span> 開始繳交
                            </button>
                            <div class="hw-submitted-badge" style="display:none;">
                                <span class="material-symbols-outlined">check_circle</span>
                                <span>已成功繳交</span>
                                <span class="hw-order-text" style="margin-left:4px;font-size:11px;color:#1a73e8;"></span>
                                <button class="hw-edit-btn" type="button" style="margin-left:auto;background:none;border:1px solid #80868b;color:#444746;border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;">
                                    <span class="material-symbols-outlined" style="font-size:14px;">edit</span> 編輯
                                </button>
                            </div>
                            <div class="hw-submitted-preview" style="display:none;"></div>
                        </div>
                    `;

                    // ★ 初始載入已提交數量
                    const hwCounterNum = el.querySelector('.hw-counter-num');
                    (async () => {
                        try {
                            const sc = new URLSearchParams(location.search).get('code') || '';
                            if (sc) {
                                const countResult = await db.select('submissions', {
                                    filter: {
                                        session_id: `eq.${sc}`,
                                        'state->>base_element_id': `eq.${element.id}`
                                    },
                                    columns: 'student_name'
                                });
                                const unique = new Set((countResult.data || []).map(r => r.student_name));
                                if (hwCounterNum) hwCounterNum.textContent = unique.size;
                            }
                        } catch (e) { /* ignore */ }
                    })();

                    // inline error (取代 alert)
                    const showHwError = (msg) => {
                        const errEl = el.querySelector('.hw-error-msg');
                        if (!errEl) return;
                        errEl.textContent = msg;
                        errEl.style.display = 'block';
                        setTimeout(() => { errEl.style.display = 'none'; }, 3000);
                    };

                    // 範例展開/收合
                    const exToggle = el.querySelector('.hw-example-toggle');
                    if (exToggle) {
                        exToggle.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const content = el.querySelector('.hw-example-content');
                            const arrow = el.querySelector('.hw-example-arrow');
                            const open = content.classList.toggle('open');
                            arrow.textContent = open ? 'expand_less' : 'expand_more';
                        });
                    }

                    // ── 狀態恢復 ──
                    const hwStateKey = `hw_submitted_${element.id}`;
                    let currentHwState = (() => { try { return JSON.parse(sessionStorage.getItem(hwStateKey)); } catch { return null; } })();
                    let lastSubmittedElementId = null; // ★ 追蹤上次提交的 element_id，供編輯時刪除舊 row

                    const hwStartBtn = el.querySelector('.hw-start-btn');
                    const hwInlineForm = el.querySelector('.hw-inline-form');
                    const hwBadge = el.querySelector('.hw-submitted-badge');
                    const hwPreview = el.querySelector('.hw-submitted-preview');

                    function showSubmittedState(state) {
                        hwStartBtn.style.display = 'none';
                        hwInlineForm.style.display = 'none';
                        hwBadge.style.display = 'flex';
                        // 預覽已繳交內容
                        let previewHtml = '';
                        if (state.type === 'image' && state.content) {
                            const imgSrc = typeof state.content === 'string' && state.content.startsWith('data:')
                                ? state.content
                                : (state.content.image || state.content);
                            previewHtml = `<img src="${typeof imgSrc === 'string' ? imgSrc : ''}" style="max-width:100%;max-height:120px;border-radius:8px;margin-top:8px;">`;
                            if (state.content.prompt) {
                                previewHtml += `<div style="font-size:12px;color:#444746;margin-top:4px;">Prompt: ${state.content.prompt}</div>`;
                            }
                        } else if (state.type === 'link') {
                            previewHtml = `<div style="font-size:13px;color:#1a73e8;margin-top:8px;word-break:break-all;">${state.content}</div>`;
                        } else if (state.content) {
                            const txt = typeof state.content === 'string' ? state.content : JSON.stringify(state.content);
                            previewHtml = `<div style="font-size:13px;color:#444746;margin-top:8px;white-space:pre-wrap;">${txt.length > 200 ? txt.slice(0, 200) + '…' : txt}</div>`;
                        }
                        hwPreview.innerHTML = previewHtml;
                        hwPreview.style.display = previewHtml ? 'block' : 'none';
                    }

                    function openEditMode(state) {
                        hwBadge.style.display = 'none';
                        hwPreview.style.display = 'none';
                        hwStartBtn.style.display = 'none';
                        hwInlineForm.style.display = 'block';
                        // pre-fill
                        if (state) {
                            if (hwMode === 'text_only' || (!hwMode && state.type === 'text')) {
                                const ta = el.querySelector(`#hwText_${element.id}`);
                                if (ta) ta.value = typeof state.content === 'string' ? state.content : '';
                            } else if (hwMode === 'image_prompt' && state.content?.prompt) {
                                const ta = el.querySelector(`#hwPrompt_${element.id}`);
                                if (ta) ta.value = state.content.prompt;
                            }
                            if (state.type === 'image' && state.content) {
                                const imgSrc = typeof state.content === 'string' ? state.content : state.content.image;
                                if (imgSrc) {
                                    hwUploadedData = imgSrc;
                                    const preview = el.querySelector('.hw-preview');
                                    if (preview) preview.innerHTML = `<img src="${imgSrc}" style="max-width:100%;max-height:120px;border-radius:8px;">`;
                                    const zone = el.querySelector('.hw-upload-zone');
                                    if (zone) zone.style.display = 'none';
                                }
                            }
                            // ★ 全功能模式：切到對應 tab
                            if (!hwMode && state.type) {
                                const targetTab = el.querySelector(`.hw-tab[data-type="${state.type}"]`);
                                if (targetTab) targetTab.click();
                            }
                        }
                        el.querySelector('.hw-submit-btn').innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">sync</span> 更新作業';
                    }

                    if (currentHwState) {
                        showSubmittedState(currentHwState);
                    }

                    // 開始繳交
                    if (hwStartBtn) {
                        hwStartBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            hwStartBtn.style.display = 'none';
                            hwInlineForm.style.display = 'block';
                        });
                    }

                    // 編輯按鈕 — ★ 使用動態 currentHwState（而非 stale prevState）
                    el.querySelector('.hw-edit-btn')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openEditMode(currentHwState);
                    });

                    // tab 切換
                    el.querySelectorAll('.hw-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            e.stopPropagation();
                            el.querySelectorAll('.hw-tab').forEach(t => t.classList.remove('active'));
                            el.querySelectorAll('.hw-full-panel').forEach(p => p.classList.remove('active'));
                            tab.classList.add('active');
                            el.querySelector(`[data-panel="${tab.dataset.type}"]`).classList.add('active');
                        });
                    });

                    // 圖片上傳
                    const hwUploadZone = el.querySelector('.hw-upload-zone');
                    let hwUploadedData = null;
                    if (hwUploadZone) {
                        const fileInput = hwUploadZone.querySelector('.hw-file-input');
                        const preview = el.querySelector('.hw-preview');
                        hwUploadZone.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
                        hwUploadZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); hwUploadZone.classList.add('dragover'); });
                        hwUploadZone.addEventListener('dragleave', (e) => { e.stopPropagation(); hwUploadZone.classList.remove('dragover'); });
                        hwUploadZone.addEventListener('drop', (e) => {
                            e.preventDefault(); e.stopPropagation(); hwUploadZone.classList.remove('dragover');
                            if (e.dataTransfer.files[0]) processStudentHwFile(e.dataTransfer.files[0]);
                        });
                        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) processStudentHwFile(e.target.files[0]); });

                        function processStudentHwFile(file) {
                            if (!file || !file.type.startsWith('image/')) return;
                            if (file.size > 10 * 1024 * 1024) {
                                showHwError('檔案過大（上限 10MB）');
                                return;
                            }
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.onload = () => {
                                    const MAX = 1200;
                                    let w = img.naturalWidth, h = img.naturalHeight;
                                    const needsResize = w > MAX || h > MAX || file.size > 2 * 1024 * 1024;
                                    if (needsResize) {
                                        if (w > MAX || h > MAX) {
                                            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                                            else { w = Math.round(w * MAX / h); h = MAX; }
                                        }
                                        const canvas = document.createElement('canvas');
                                        canvas.width = w; canvas.height = h;
                                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                        hwUploadedData = canvas.toDataURL('image/jpeg', 0.8);
                                    } else {
                                        hwUploadedData = ev.target.result;
                                    }
                                    preview.innerHTML = `<img src="${hwUploadedData}" style="max-width:100%;max-height:120px;border-radius:8px;">`;
                                    hwUploadZone.style.display = 'none';
                                };
                                img.src = ev.target.result;
                            };
                            reader.readAsDataURL(file);
                        }
                    }

                    // 提交
                    const hwSubmitBtn = el.querySelector('.hw-submit-btn');
                    if (hwSubmitBtn) {
                        hwSubmitBtn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            // 直接使用已登入的 studentName
                            const currentUser = studentName || homework.getUser() || '匿名';
                            let content = null;
                            let type = 'text';
                            if (hwMode === 'image_only') {
                                if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                content = hwUploadedData; type = 'image';
                            } else if (hwMode === 'image_prompt') {
                                const promptVal = el.querySelector(`#hwPrompt_${element.id}`)?.value?.trim();
                                if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                if (!promptVal) { showHwError('請輸入提示詞'); return; }
                                content = { image: hwUploadedData, prompt: promptVal }; type = 'image';
                            } else if (hwMode === 'text_only') {
                                content = el.querySelector(`#hwText_${element.id}`)?.value?.trim();
                                if (!content) { showHwError('請輸入內容'); return; }
                            } else {
                                const activePanel = el.querySelector('.hw-full-panel.active');
                                const panelType = activePanel?.dataset.panel || 'text';
                                if (panelType === 'text') {
                                    content = el.querySelector(`#hwText_${element.id}`)?.value?.trim();
                                    if (!content) { showHwError('請輸入內容'); return; }
                                } else if (panelType === 'image') {
                                    if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                    content = hwUploadedData; type = 'image';
                                } else if (panelType === 'link') {
                                    content = el.querySelector(`#hwLink_${element.id}`)?.value?.trim();
                                    if (!content) { showHwError('請輸入連結'); return; }
                                    type = 'link';
                                }
                            }
                            const matchedAssignment = sessionAssignments.find(a => a.title === element.title);
                            const userObj = typeof currentUser === 'string' ? { name: currentUser } : currentUser;

                            // ★ Loading 狀態
                            hwSubmitBtn.disabled = true;
                            const origHTML = hwSubmitBtn.innerHTML;
                            hwSubmitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;animation:spin 1s linear infinite;">progress_activity</span> 上傳中…';

                            try {
                                // ★ 如果是編輯模式（有舊提交），先刪除舊的 DB row
                                if (lastSubmittedElementId) {
                                    try {
                                        await db.delete('submissions', { element_id: `eq.${lastSubmittedElementId}` });
                                        console.log('[HW] 舊提交已刪除:', lastSubmittedElementId);
                                    } catch (e) { console.warn('[HW] 刪除舊提交失敗:', e); }
                                }

                                const result = await homework.submit(element.title || '課堂作業', type, content, userObj, matchedAssignment?.id || element.id);

                                // ★ 追蹤新提交的 elementId，供下次編輯時刪除
                                lastSubmittedElementId = result?.elementId || null;

                                // 繳交作業也計分
                                if (stateManager) {
                                    try {
                                        await stateManager.save(element.id, {
                                            type: 'homework',
                                            answer: type,
                                            isCorrect: null,
                                            participated: true,
                                            points: element.points || 10,
                                            score: 100
                                        });
                                    } catch (e) { console.warn('[HW] score save err:', e); }
                                }

                                // ★ 記住繳交狀態 + 更新 currentHwState（修復 stale state bug）
                                const stateContent = typeof content === 'string' && content.startsWith('data:')
                                    ? (result?.fileUrl || '(image)')
                                    : content;
                                const savedState = { type, content: stateContent };
                                currentHwState = savedState;
                                sessionStorage.setItem(hwStateKey, JSON.stringify(savedState));
                                showSubmittedState({ type, content: stateContent });
                                homework.showSuccessToast();

                                // ★ 顯示第幾個提交
                                const lastSubmission = homework.submissions[homework.submissions.length - 1];
                                if (lastSubmission?.order) {
                                    const orderText = el.querySelector('.hw-order-text');
                                    if (orderText) orderText.textContent = `（第 ${lastSubmission.order} 個提交）`;
                                }
                            } catch (err) {
                                console.error('[HW] submit failed:', err);
                                showHwError('提交失敗，請重試');
                            } finally {
                                hwSubmitBtn.disabled = false;
                                hwSubmitBtn.innerHTML = origHTML;
                            }
                        });
                    }
                    break;
                }

                case 'showcase': {
                    el.classList.add('interactive-element', 'showcase-container');
                    el.dataset.assignmentTitle = element.assignmentTitle || '';
                    break;
                }

                case 'truefalse': {
                    el.classList.add('interactive-element');
                    const tl = element.trueLabel || '對';
                    const fl = element.falseLabel || '錯';
                    const tfTitleFs = element.interactiveTitleFontSize || '1.1rem';
                    el.innerHTML = `
                        <div class="truefalse-container" data-answer="${element.answer ? 'true' : 'false'}" data-true-label="${tl}" data-false-label="${fl}">
                            <div class="tf-question" style="font-size:${tfTitleFs}">${element.question || '對或錯？'}</div>
                            <div class="tf-buttons">
                                <button class="tf-btn tf-btn-true"><span class="tf-label">${tl}</span></button>
                                <button class="tf-btn tf-btn-false"><span class="tf-label">${fl}</span></button>
                            </div>
                            <div class="tf-result"></div>
                            <div class="tf-reveal-area"></div>
                            <div class="tf-stats-area"></div>
                        </div>`;
                    break;
                }

                case 'opentext': {
                    el.classList.add('interactive-element');
                    const maxLen = element.maxLength || 500;
                    el.innerHTML = `
                        <div class="opentext-container">
                            <div class="opentext-question">${element.question || '請輸入你的想法'}</div>
                            <textarea class="opentext-input" placeholder="${element.placeholder || '在這裡輸入你的回答...'}" maxlength="${maxLen}"></textarea>
                            <div class="opentext-footer">
                                <span class="opentext-counter">0 / ${maxLen}</span>
                                <button class="opentext-submit">送出</button>
                            </div>
                            <div class="opentext-result"></div>
                        </div>`;
                    const otTextarea = el.querySelector('.opentext-input');
                    const otCounter = el.querySelector('.opentext-counter');
                    otTextarea?.addEventListener('input', () => {
                        if (otCounter) otCounter.textContent = otTextarea.value.length + ' / ' + maxLen;
                    });
                    break;
                }

                case 'scale': {
                    el.classList.add('interactive-element');
                    const sMin = element.min || 1;
                    const sMax = element.max || 10;
                    const sStep = element.step || 1;
                    const defaultVal = Math.round((sMin + sMax) / 2);
                    el.innerHTML = `
                        <div class="scale-container">
                            <div class="scale-question">${element.question || '請評分'}</div>
                            <div class="scale-slider-wrap">
                                ${element.labelLeft ? '<span class="scale-label-edge">' + element.labelLeft + '</span>' : ''}
                                <input type="range" class="scale-slider" min="${sMin}" max="${sMax}" step="${sStep}" value="${defaultVal}">
                                ${element.labelRight ? '<span class="scale-label-edge">' + element.labelRight + '</span>' : ''}
                            </div>
                            <div class="scale-value">${defaultVal}</div>
                            <button class="scale-submit">提交</button>
                            <div class="scale-result"></div>
                        </div>`;
                    break;
                }

                case 'buzzer': {
                    el.classList.add('interactive-element');
                    el.innerHTML = `
                        <div class="buzzer-container">
                            <div class="buzzer-question">${element.question || '準備好了嗎？'}</div>
                            <div class="buzzer-input-row">
                                <input type="text" class="buzzer-text-input" placeholder="輸入你的答案..." />
                                <button class="buzzer-submit-btn"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">campaign</span> 搶答</button>
                            </div>
                            <div class="buzzer-result"></div>
                            <div class="buzzer-ranking"></div>
                        </div>`;
                    break;
                }

                case 'wordcloud': {
                    el.classList.add('interactive-element');
                    const maxWords = element.maxWords || 3;
                    el.innerHTML = `
                        <div class="wordcloud-container" data-max-words="${maxWords}">
                            <div class="wordcloud-question">${element.question || '輸入你想到的關鍵字'}</div>
                            <div class="wordcloud-cloud"></div>
                        </div>`;
                    break;
                }

                case 'hotspot': {
                    el.classList.add('interactive-element');
                    const hsSrc = element.image || element.src || '';
                    const hsNodes = element.nodes || [];
                    const hsNodesJson = JSON.stringify(hsNodes).replace(/"/g, '&quot;');
                    el.innerHTML = `
                        <div class="hotspot-container" data-nodes="${hsNodesJson}">
                            <div class="hotspot-question">${element.question || '圈出你認為有問題的地方'}</div>
                            <div class="hotspot-image-wrap" style="position:relative;">
                                ${hsSrc ? '<img src="' + hsSrc + '" class="hotspot-image" draggable="false" />' : '<div class="hotspot-placeholder">（請設定圖片）</div>'}
                                ${hsNodes.map(n => '<div class="hs-node" data-id="' + n.id + '" style="left:' + n.x + '%;top:' + n.y + '%;">' + n.label + '</div>').join('')}
                            </div>
                            <div class="hotspot-actions"><button class="hs-submit-btn" disabled>確認送出</button></div>
                            <div class="hotspot-result"></div>
                        </div>`;
                    break;
                }

                case 'document': {
                    el.classList.add('interactive-element');
                    el.innerHTML = `
                        <div class="document-card-container" data-element-id="${element.id}" style="
                            display:flex;flex-direction:column;align-items:center;justify-content:center;
                            gap:10px;height:100%;cursor:pointer;pointer-events:auto;
                            background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 100%);
                            border-radius:12px;border:1.5px solid #bae6fd;
                            transition:transform .15s,box-shadow .15s;position:relative;
                        ">
                            <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0284c7,#0ea5e9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(2,132,199,0.25);">
                                <span class="material-symbols-outlined" style="font-size:28px;color:#fff;">description</span>
                            </div>
                            <div style="font-weight:600;font-size:0.95rem;color:#0c4a6e;text-align:center;line-height:1.4;padding:0 12px;">${element.docTitle || '文件名稱'}</div>
                            <div style="font-size:0.72rem;color:#7dd3fc;display:flex;align-items:center;gap:4px;">
                                <span class="material-symbols-outlined" style="font-size:14px;">visibility</span>
                                點擊查看文件
                            </div>
                        </div>`;
                    el.querySelector('.document-card-container')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (window._openDocViewer) window._openDocViewer(element.id);
                    });
                    break;
                }

                case 'assessment': {
                    el.classList.add('interactive-element');
                    el.style.overflow = 'hidden';
                    import('./scripts/interactive/assessment.js').then(({ AssessmentGame }) => {
                        new AssessmentGame().render(el, element);
                    });
                    break;
                }

                case 'icebreaker': {
                    el.classList.add('interactive-element', 'icebreaker-element');
                    el.style.overflow = 'hidden';
                    import('./scripts/interactive/icebreaker.js').then(({ IcebreakerGame }) => {
                        new IcebreakerGame().render(el, element);
                    });
                    break;
                }

                case 'assessmentWall': {
                    el.classList.add('interactive-element', 'assessment-wall-element');
                    el.style.overflow = 'hidden';
                    import('./scripts/interactive/assessmentWall.js').then(({ AssessmentWallGame }) => {
                        new AssessmentWallGame().render(el, element);
                    });
                    break;
                }

                default:
                    return null;
            }

            // 倒數計時器（適用所有互動元件）
            if (element.timeLimit && element.timeLimit > 0) {
                el.dataset.timeLimit = element.timeLimit;
            }

            return el;
        }

        // ── 縮放投影片適應視窗 ──
        function scaleSlide() {
            const wrapper = document.querySelector('.student-slide-wrapper');
            if (!wrapper || !slideEl) return;
            const pres = document.getElementById('studentPresentation');
            const isImmersive = pres?.classList.contains('immersive-mode') ||
                !!document.fullscreenElement || !!document.webkitFullscreenElement;
            const isMobile = window.innerWidth <= 1024;

            // 確保 960x540 固定尺寸
            slideEl.style.width = '960px';
            slideEl.style.height = '540px';

            if (isMobile) {
                // 手機版：slide 是 absolute + top:0 left:0
                const ww = wrapper.clientWidth;
                const wh = wrapper.clientHeight;
                const scale = Math.min(ww / 960, wh / 540);
                const scaledW = 960 * scale;
                const scaledH = 540 * scale;
                const offsetX = (ww - scaledW) / 2;
                const offsetY = (wh - scaledH) / 2;
                slideEl.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
                slideEl.style.transformOrigin = 'top left';
                slideEl.style.marginBottom = '0';
                // 讓互動元素可見（不被 overflow:hidden 裁掉）
                slideEl.style.overflow = 'visible';
            } else if (isImmersive) {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const scale = Math.min(vw / 960, vh / 540);
                slideEl.style.transform = `scale(${scale})`;
                slideEl.style.transformOrigin = 'center center';
                slideEl.style.marginBottom = '0';
            } else {
                const pad = 40;
                const ww = wrapper.clientWidth - pad;
                const wh = wrapper.clientHeight - pad;
                const scale = Math.min(ww / 960, wh / 540);
                slideEl.style.transform = `scale(${scale})`;
                slideEl.style.transformOrigin = 'center center';
                slideEl.style.marginBottom = '0';
            }
        }

        // ── 手機版側面板 ──
        (function initMobileSidePanel() {
            const panel = document.getElementById('mobileSidePanel');
            if (!panel) return;

            // 頁碼同步
            const mainCounter = document.getElementById('slideCounter');
            const mspCounter = document.getElementById('mspPageCounter');
            if (mainCounter && mspCounter) {
                const syncCount = () => {
                    mspCounter.textContent = mainCounter.textContent.replace(/\s/g, '');
                };
                syncCount();
                new MutationObserver(syncCount).observe(mainCounter, { childList: true, characterData: true, subtree: true });
            }

            // 模式切換同步
            const followBtn = document.getElementById('mspFollowBtn');
            const freeBtn = document.getElementById('mspFreeBtn');
            const mainFollowBtn = document.getElementById('followModeBtn');
            const mainFreeBtn = document.getElementById('freeModeBtn');

            function syncModeState() {
                const isFollow = mainFollowBtn?.classList.contains('active');
                followBtn?.classList.toggle('active', isFollow);
                freeBtn?.classList.toggle('active', !isFollow);
            }
            syncModeState();

            followBtn?.addEventListener('click', () => { mainFollowBtn?.click(); syncModeState(); });
            freeBtn?.addEventListener('click', () => { mainFreeBtn?.click(); syncModeState(); });

            // 監聽桌面端 mode 變化
            new MutationObserver(syncModeState).observe(mainFollowBtn, { attributes: true, attributeFilter: ['class'] });

            // 全螢幕退出
            document.getElementById('mspFullscreenBtn')?.addEventListener('click', () => {
                document.getElementById('studentFullscreenBtn')?.click();
            });

            // ── 右側面板：Q&A + 排行榜 ──
            document.getElementById('mspQABtn')?.addEventListener('click', () => {
                const popup = document.getElementById('studentQAPopup');
                if (popup) popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
            });

            document.getElementById('mspLBBtn')?.addEventListener('click', () => {
                const lbPanel = document.getElementById('studentLeaderboard');
                if (lbPanel) lbPanel.classList.toggle('open');
            });

            // 排行榜關閉按鈕
            document.getElementById('studentLbClose')?.addEventListener('click', () => {
                document.getElementById('studentLeaderboard')?.classList.remove('open');
            });

            // ── 側面板 Emoji reaction 按鈕 ──
            let lastMspReactionTime = 0;
            document.querySelectorAll('.msp-reaction-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const now = Date.now();
                    if (now - lastMspReactionTime < 1000) return; // 1秒節流
                    lastMspReactionTime = now;
                    const emoji = btn.dataset.emoji;
                    btn.style.transform = 'scale(1.3)';
                    setTimeout(() => { btn.style.transform = ''; }, 150);
                    if (sessionCode) {
                        realtime.publish(`session:${sessionCode}`, 'reaction', { emoji });
                    }
                });
            });
        })();

        // ── 方向偵測：橫放提示 + 橫放自動開啟面板 ──
        (function initOrientationHandler() {
            const rotateHint = document.getElementById('rotateHint');
            const leftPanel = document.getElementById('mobileSidePanel');
            const rightPanel = document.getElementById('mobileRightPanel');
            if (!rotateHint) return;

            function handleOrientation() {
                const isMobile = window.innerWidth <= 1024;
                const isPortrait = window.matchMedia('(orientation: portrait)').matches;

                if (isMobile && isPortrait) {
                    // 直式：顯示橫放提示
                    rotateHint.style.display = 'flex';
                } else {
                    // 橫放或桌面：隱藏提示
                    rotateHint.style.display = 'none';
                }

                // 橫放手機：自動顯示左右面板
                if (isMobile && !isPortrait) {
                    if (leftPanel) leftPanel.style.display = 'flex';
                    if (rightPanel) rightPanel.style.display = 'flex';
                }

                // ★ 橫放手機：把 nav arrows 移到 .student-presentation 直接子層
                // （避免 transform 容器內 position:fixed 失效）
                const pres = document.getElementById('studentPresentation');
                const wrapper = document.getElementById('slideWrapper');
                const prevBtn = document.getElementById('prevSlideBtn');
                const nextBtn = document.getElementById('nextSlideBtn');
                if (pres && wrapper && prevBtn && nextBtn) {
                    if (isMobile && !isPortrait) {
                        // 橫放：移到 presentation 層
                        if (prevBtn.parentElement === wrapper) {
                            pres.appendChild(prevBtn);
                            pres.appendChild(nextBtn);
                        }
                    } else {
                        // 直式/桌面：移回 wrapper
                        if (prevBtn.parentElement !== wrapper) {
                            wrapper.insertBefore(prevBtn, wrapper.firstChild);
                            wrapper.insertBefore(nextBtn, wrapper.querySelector('.follow-banner'));
                        }
                    }
                }
            }

            // 初始執行 + 監聽變化
            handleOrientation();
            window.addEventListener('resize', handleOrientation);
            window.matchMedia('(orientation: portrait)').addEventListener('change', handleOrientation);
        })();

        // ── 全螢幕 / 沉浸模式 ──
        (function initImmersive() {
            const btn = document.getElementById('studentFullscreenBtn');
            const pres = document.getElementById('studentPresentation');
            const wrapper = document.querySelector('.student-slide-wrapper');
            const header = document.querySelector('.student-header');
            if (!pres) return;

            let isImmersive = false;

            function enterImmersive() {
                if (isImmersive) return;
                // 優先用原生 Fullscreen API
                if (pres.requestFullscreen) {
                    pres.requestFullscreen().catch(() => {
                        // fallback: CSS immersive
                        pres.classList.add('immersive-mode');
                    });
                } else if (pres.webkitRequestFullscreen) {
                    pres.webkitRequestFullscreen();
