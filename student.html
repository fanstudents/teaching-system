                    const modeIcons = { image_only: 'image', image_prompt: 'photo_camera', text_only: 'edit_note' };
                    const modeName = modeNames[hwMode] || '全功能';
                    const modeIconName = modeIcons[hwMode] || 'upload_file';
                    const exampleHtml = element.example ? `
                        <div class="hw-example-block">
                            <button class="hw-example-toggle" type="button">
                                <span class="material-symbols-outlined" style="font-size:16px;">lightbulb</span>
                                查看範例
                                <span class="material-symbols-outlined hw-example-arrow" style="font-size:14px;">expand_more</span>
                            </button>
                            <div class="hw-example-content">${element.example.replace(/\n/g, '<br>')}</div>
                        </div>` : '';

                    const uploadBlock = (id) => `
                        <div class="hw-upload-zone" id="hwUpload_${id}">
                            <span class="material-symbols-outlined" style="font-size:24px;color:#64748b;">cloud_upload</span>
                            <span>點擊或拖曳圖片至此</span>
                            <input type="file" accept="image/*" class="hw-file-input" hidden>
                        </div>
                        <div class="hw-preview" id="hwPreview_${id}"></div>`;

                    let inlineFormHtml = '';
                    if (hwMode === 'image_only') {
                        inlineFormHtml = uploadBlock(element.id);
                    } else if (hwMode === 'image_prompt') {
                        inlineFormHtml = `${uploadBlock(element.id)}
                            <textarea class="hw-inline-textarea" id="hwPrompt_${element.id}" placeholder="請貼上你使用的 Prompt..." rows="2"></textarea>`;
                    } else if (hwMode === 'text_only') {
                        inlineFormHtml = `
                            <textarea class="hw-inline-textarea" id="hwText_${element.id}" placeholder="在這裡輸入你的作業內容..." rows="3"></textarea>`;
                    } else {
                        inlineFormHtml = `
                            <div class="hw-full-tabs">
                                <button class="hw-tab active" data-type="text"><span class="material-symbols-outlined" style="font-size:14px;">edit_note</span> 文字</button>
                                <button class="hw-tab" data-type="image"><span class="material-symbols-outlined" style="font-size:14px;">image</span> 圖片</button>
                                <button class="hw-tab" data-type="link"><span class="material-symbols-outlined" style="font-size:14px;">link</span> 連結</button>
                            </div>
                            <div class="hw-full-panel active" data-panel="text">
                                <textarea class="hw-inline-textarea" id="hwText_${element.id}" placeholder="在這裡輸入你的作業內容..." rows="3"></textarea>
                            </div>
                            <div class="hw-full-panel" data-panel="image">
                                ${uploadBlock(element.id)}
                            </div>
                            <div class="hw-full-panel" data-panel="link">
                                <input type="url" class="hw-inline-textarea" id="hwLink_${element.id}" placeholder="https://..." style="padding:10px;">
                            </div>`;
                    }

                    el.innerHTML = `
                        <div class="hw-card">
                            <div class="hw-card-header" style="display:flex;align-items:center;justify-content:space-between;">
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <div class="hw-card-icon"><span class="material-symbols-outlined">assignment</span></div>
                                    <div class="hw-card-info">
                                        <div class="hw-card-title">${element.title || '課堂作業'}</div>
                                        <div class="hw-card-mode"><span class="material-symbols-outlined" style="font-size:13px;">${modeIconName}</span> ${modeName}</div>
                                    </div>
                                </div>
                                <div class="hw-counter-badge" data-element-id="${element.id}" style="display:flex;align-items:center;gap:4px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:12px;color:#16a34a;font-weight:600;">
                                    <span class="material-symbols-outlined" style="font-size:14px;">group</span>
                                    <span class="hw-counter-num">0</span> 人已繳交
                                </div>
                            </div>
                            ${element.description ? `<div class="hw-card-desc">${element.description}</div>` : ''}
                            ${exampleHtml}

                            <div class="hw-inline-form" style="display:none;">
                                ${inlineFormHtml}
                                <div class="hw-error-msg" style="display:none;"></div>
                                <button class="hw-submit-btn" type="button">
                                    <span class="material-symbols-outlined" style="font-size:16px;">send</span> 提交作業
                                </button>
                            </div>
                            <button class="hw-start-btn" type="button">
                                <span class="material-symbols-outlined" style="font-size:18px;">edit_square</span> 開始繳交
                            </button>
                            <div class="hw-submitted-badge" style="display:none;">
                                <span class="material-symbols-outlined">check_circle</span>
                                <span>已成功繳交</span>
                                <span class="hw-order-text" style="margin-left:4px;font-size:11px;color:#6366f1;"></span>
                                <button class="hw-edit-btn" type="button" style="margin-left:auto;background:none;border:1px solid #94a3b8;color:#64748b;border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;">
                                    <span class="material-symbols-outlined" style="font-size:14px;">edit</span> 編輯
                                </button>
                            </div>
                            <div class="hw-submitted-preview" style="display:none;"></div>
                        </div>
                    `;

                    // ★ 初始載入已提交數量
                    const hwCounterNum = el.querySelector('.hw-counter-num');
                    (async () => {
                        try {
                            const sc = new URLSearchParams(location.search).get('code') || '';
                            if (sc) {
                                const countResult = await db.select('submissions', {
                                    filter: {
                                        session_id: `eq.${sc}`,
                                        'state->>base_element_id': `eq.${element.id}`
                                    },
                                    columns: 'student_name'
                                });
                                const unique = new Set((countResult.data || []).map(r => r.student_name));
                                if (hwCounterNum) hwCounterNum.textContent = unique.size;
                            }
                        } catch (e) { /* ignore */ }
                    })();

                    // inline error (取代 alert)
                    const showHwError = (msg) => {
                        const errEl = el.querySelector('.hw-error-msg');
                        if (!errEl) return;
                        errEl.textContent = msg;
                        errEl.style.display = 'block';
                        setTimeout(() => { errEl.style.display = 'none'; }, 3000);
                    };

                    // 範例展開/收合
                    const exToggle = el.querySelector('.hw-example-toggle');
                    if (exToggle) {
                        exToggle.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const content = el.querySelector('.hw-example-content');
                            const arrow = el.querySelector('.hw-example-arrow');
                            const open = content.classList.toggle('open');
                            arrow.textContent = open ? 'expand_less' : 'expand_more';
                        });
                    }

                    // ── 狀態恢復 ──
                    const hwStateKey = `hw_submitted_${element.id}`;
                    const prevState = (() => { try { return JSON.parse(sessionStorage.getItem(hwStateKey)); } catch { return null; } })();

                    const hwStartBtn = el.querySelector('.hw-start-btn');
                    const hwInlineForm = el.querySelector('.hw-inline-form');
                    const hwBadge = el.querySelector('.hw-submitted-badge');
                    const hwPreview = el.querySelector('.hw-submitted-preview');

                    function showSubmittedState(state) {
                        hwStartBtn.style.display = 'none';
                        hwInlineForm.style.display = 'none';
                        hwBadge.style.display = 'flex';
                        // 預覽已繳交內容
                        let previewHtml = '';
                        if (state.type === 'image' && state.content) {
                            const imgSrc = typeof state.content === 'string' && state.content.startsWith('data:')
                                ? state.content
                                : (state.content.image || state.content);
                            previewHtml = `<img src="${typeof imgSrc === 'string' ? imgSrc : ''}" style="max-width:100%;max-height:120px;border-radius:8px;margin-top:8px;">`;
                            if (state.content.prompt) {
                                previewHtml += `<div style="font-size:12px;color:#64748b;margin-top:4px;">Prompt: ${state.content.prompt}</div>`;
                            }
                        } else if (state.type === 'link') {
                            previewHtml = `<div style="font-size:13px;color:#6366f1;margin-top:8px;word-break:break-all;">${state.content}</div>`;
                        } else if (state.content) {
                            const txt = typeof state.content === 'string' ? state.content : JSON.stringify(state.content);
                            previewHtml = `<div style="font-size:13px;color:#475569;margin-top:8px;white-space:pre-wrap;">${txt.length > 200 ? txt.slice(0, 200) + '…' : txt}</div>`;
                        }
                        hwPreview.innerHTML = previewHtml;
                        hwPreview.style.display = previewHtml ? 'block' : 'none';
                    }

                    function openEditMode(state) {
                        hwBadge.style.display = 'none';
                        hwPreview.style.display = 'none';
                        hwStartBtn.style.display = 'none';
                        hwInlineForm.style.display = 'block';
                        // pre-fill
                        if (state) {
                            if (hwMode === 'text_only' || (!hwMode && state.type === 'text')) {
                                const ta = el.querySelector(`#hwText_${element.id}`);
                                if (ta) ta.value = typeof state.content === 'string' ? state.content : '';
                            } else if (hwMode === 'image_prompt' && state.content?.prompt) {
                                const ta = el.querySelector(`#hwPrompt_${element.id}`);
                                if (ta) ta.value = state.content.prompt;
                            }
                            if (state.type === 'image' && state.content) {
                                const imgSrc = typeof state.content === 'string' ? state.content : state.content.image;
                                if (imgSrc) {
                                    hwUploadedData = imgSrc;
                                    const preview = el.querySelector('.hw-preview');
                                    if (preview) preview.innerHTML = `<img src="${imgSrc}" style="max-width:100%;max-height:120px;border-radius:8px;">`;
                                    const zone = el.querySelector('.hw-upload-zone');
                                    if (zone) zone.style.display = 'none';
                                }
                            }
                        }
                        el.querySelector('.hw-submit-btn').innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">sync</span> 更新作業';
                    }

                    if (prevState) {
                        showSubmittedState(prevState);
                    }

                    // 開始繳交
                    if (hwStartBtn) {
                        hwStartBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            hwStartBtn.style.display = 'none';
                            hwInlineForm.style.display = 'block';
                        });
                    }

                    // 編輯按鈕
                    el.querySelector('.hw-edit-btn')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openEditMode(prevState);
                    });

                    // tab 切換
                    el.querySelectorAll('.hw-tab').forEach(tab => {
                        tab.addEventListener('click', (e) => {
                            e.stopPropagation();
                            el.querySelectorAll('.hw-tab').forEach(t => t.classList.remove('active'));
                            el.querySelectorAll('.hw-full-panel').forEach(p => p.classList.remove('active'));
                            tab.classList.add('active');
                            el.querySelector(`[data-panel="${tab.dataset.type}"]`).classList.add('active');
                        });
                    });

                    // 圖片上傳
                    const hwUploadZone = el.querySelector('.hw-upload-zone');
                    let hwUploadedData = null;
                    if (hwUploadZone) {
                        const fileInput = hwUploadZone.querySelector('.hw-file-input');
                        const preview = el.querySelector('.hw-preview');
                        hwUploadZone.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
                        hwUploadZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); hwUploadZone.classList.add('dragover'); });
                        hwUploadZone.addEventListener('dragleave', (e) => { e.stopPropagation(); hwUploadZone.classList.remove('dragover'); });
                        hwUploadZone.addEventListener('drop', (e) => {
                            e.preventDefault(); e.stopPropagation(); hwUploadZone.classList.remove('dragover');
                            if (e.dataTransfer.files[0]) processStudentHwFile(e.dataTransfer.files[0]);
                        });
                        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) processStudentHwFile(e.target.files[0]); });

                        function processStudentHwFile(file) {
                            if (!file || !file.type.startsWith('image/')) return;
                            if (file.size > 10 * 1024 * 1024) {
                                showHwError('檔案過大（上限 10MB）');
                                return;
                            }
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.onload = () => {
                                    const MAX = 1200;
                                    let w = img.naturalWidth, h = img.naturalHeight;
                                    const needsResize = w > MAX || h > MAX || file.size > 2 * 1024 * 1024;
                                    if (needsResize) {
                                        if (w > MAX || h > MAX) {
                                            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                                            else { w = Math.round(w * MAX / h); h = MAX; }
                                        }
                                        const canvas = document.createElement('canvas');
                                        canvas.width = w; canvas.height = h;
                                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                        hwUploadedData = canvas.toDataURL('image/jpeg', 0.8);
                                    } else {
                                        hwUploadedData = ev.target.result;
                                    }
                                    preview.innerHTML = `<img src="${hwUploadedData}" style="max-width:100%;max-height:120px;border-radius:8px;">`;
                                    hwUploadZone.style.display = 'none';
                                };
                                img.src = ev.target.result;
                            };
                            reader.readAsDataURL(file);
                        }
                    }

                    // 提交
                    const hwSubmitBtn = el.querySelector('.hw-submit-btn');
                    if (hwSubmitBtn) {
                        hwSubmitBtn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            // 直接使用已登入的 studentName
                            const currentUser = studentName || homework.getUser() || '匿名';
                            let content = null;
                            let type = 'text';
                            if (hwMode === 'image_only') {
                                if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                content = hwUploadedData; type = 'image';
                            } else if (hwMode === 'image_prompt') {
                                const promptVal = el.querySelector(`#hwPrompt_${element.id}`)?.value?.trim();
                                if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                if (!promptVal) { showHwError('請輸入提示詞'); return; }
                                content = { image: hwUploadedData, prompt: promptVal }; type = 'image';
                            } else if (hwMode === 'text_only') {
                                content = el.querySelector(`#hwText_${element.id}`)?.value?.trim();
                                if (!content) { showHwError('請輸入內容'); return; }
                            } else {
                                const activePanel = el.querySelector('.hw-full-panel.active');
                                const panelType = activePanel?.dataset.panel || 'text';
                                if (panelType === 'text') {
                                    content = el.querySelector(`#hwText_${element.id}`)?.value?.trim();
                                    if (!content) { showHwError('請輸入內容'); return; }
                                } else if (panelType === 'image') {
                                    if (!hwUploadedData) { showHwError('請上傳圖片'); return; }
                                    content = hwUploadedData; type = 'image';
                                } else if (panelType === 'link') {
                                    content = el.querySelector(`#hwLink_${element.id}`)?.value?.trim();
                                    if (!content) { showHwError('請輸入連結'); return; }
                                    type = 'link';
                                }
                            }
                            const matchedAssignment = sessionAssignments.find(a => a.title === element.title);
                            const userObj = typeof currentUser === 'string' ? { name: currentUser } : currentUser;

                            // ★ Loading 狀態
                            hwSubmitBtn.disabled = true;
                            const origHTML = hwSubmitBtn.innerHTML;
                            hwSubmitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;animation:spin 1s linear infinite;">progress_activity</span> 上傳中…';

                            try {
                                await homework.submit(element.title || '課堂作業', type, content, userObj, matchedAssignment?.id || element.id);

                                // 繳交作業也計分
                                if (stateManager) {
                                    try {
                                        await stateManager.save(element.id, {
                                            type: 'homework',
                                            answer: type,
                                            isCorrect: null,
                                            participated: true,
                                            points: element.points || 10,
                                            score: 100
                                        });
                                    } catch (e) { console.warn('[HW] score save err:', e); }
                                }

                                // 記住繳交狀態
                                const savedState = { type, content: typeof content === 'string' && content.startsWith('data:') ? '(image)' : content };
                                sessionStorage.setItem(hwStateKey, JSON.stringify(savedState));
                                showSubmittedState({ type, content });
                                homework.showSuccessToast();

                                // ★ 顯示第幾個提交
                                const lastSubmission = homework.submissions[homework.submissions.length - 1];
                                if (lastSubmission?.order) {
                                    const orderText = el.querySelector('.hw-order-text');
                                    if (orderText) orderText.textContent = `（第 ${lastSubmission.order} 個提交）`;
                                }
                            } catch (err) {
                                console.error('[HW] submit failed:', err);
                                showHwError('提交失敗，請重試');
                            } finally {
                                hwSubmitBtn.disabled = false;
                                hwSubmitBtn.innerHTML = origHTML;
                            }
                        });
                    }
                    break;
                }

                case 'showcase': {
                    el.classList.add('interactive-element', 'showcase-container');
                    el.dataset.assignmentTitle = element.assignmentTitle || '';
                    break;
                }

                case 'truefalse': {
                    el.classList.add('interactive-element');
                    const tl = element.trueLabel || '對';
                    const fl = element.falseLabel || '錯';
                    const tfTitleFs = element.interactiveTitleFontSize || '1.1rem';
                    el.innerHTML = `
                        <div class="truefalse-container" data-answer="${element.answer ? 'true' : 'false'}" data-true-label="${tl}" data-false-label="${fl}">
                            <div class="tf-question" style="font-size:${tfTitleFs}">${element.question || '對或錯？'}</div>
                            <div class="tf-buttons">
                                <button class="tf-btn tf-btn-true"><span class="tf-label">${tl}</span></button>
                                <button class="tf-btn tf-btn-false"><span class="tf-label">${fl}</span></button>
                            </div>
                            <div class="tf-result"></div>
                            <div class="tf-reveal-area"></div>
                            <div class="tf-stats-area"></div>
                        </div>`;
                    break;
                }

                case 'opentext': {
                    el.classList.add('interactive-element');
                    const maxLen = element.maxLength || 500;
                    el.innerHTML = `
                        <div class="opentext-container">
                            <div class="opentext-question">${element.question || '請輸入你的想法'}</div>
                            <textarea class="opentext-input" placeholder="${element.placeholder || '在這裡輸入你的回答...'}" maxlength="${maxLen}"></textarea>
                            <div class="opentext-footer">
                                <span class="opentext-counter">0 / ${maxLen}</span>
                                <button class="opentext-submit">送出</button>
                            </div>
                            <div class="opentext-result"></div>
                        </div>`;
                    const otTextarea = el.querySelector('.opentext-input');
                    const otCounter = el.querySelector('.opentext-counter');
                    otTextarea?.addEventListener('input', () => {
                        if (otCounter) otCounter.textContent = otTextarea.value.length + ' / ' + maxLen;
                    });
                    break;
                }

                case 'scale': {
                    el.classList.add('interactive-element');
                    const sMin = element.min || 1;
                    const sMax = element.max || 10;
                    const sStep = element.step || 1;
                    const defaultVal = Math.round((sMin + sMax) / 2);
                    el.innerHTML = `
                        <div class="scale-container">
                            <div class="scale-question">${element.question || '請評分'}</div>
                            <div class="scale-slider-wrap">
                                ${element.labelLeft ? '<span class="scale-label-edge">' + element.labelLeft + '</span>' : ''}
                                <input type="range" class="scale-slider" min="${sMin}" max="${sMax}" step="${sStep}" value="${defaultVal}">
                                ${element.labelRight ? '<span class="scale-label-edge">' + element.labelRight + '</span>' : ''}
                            </div>
                            <div class="scale-value">${defaultVal}</div>
                            <button class="scale-submit">提交</button>
                            <div class="scale-result"></div>
                        </div>`;
                    break;
                }

                case 'buzzer': {
                    el.classList.add('interactive-element');
                    el.innerHTML = `
                        <div class="buzzer-container">
                            <div class="buzzer-question">${element.question || '準備好了嗎？'}</div>
                            <div class="buzzer-input-row">
                                <input type="text" class="buzzer-text-input" placeholder="輸入你的答案..." />
                                <button class="buzzer-submit-btn"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">campaign</span> 搶答</button>
                            </div>
                            <div class="buzzer-result"></div>
                            <div class="buzzer-ranking"></div>
                        </div>`;
                    break;
                }

                case 'wordcloud': {
                    el.classList.add('interactive-element');
                    const maxWords = element.maxWords || 3;
                    el.innerHTML = `
                        <div class="wordcloud-container" data-max-words="${maxWords}">
                            <div class="wordcloud-question">${element.question || '輸入你想到的關鍵字'}</div>
                            <div class="wordcloud-cloud"></div>
                        </div>`;
                    break;
                }

                case 'hotspot': {
                    el.classList.add('interactive-element');
                    const hsSrc = element.image || element.src || '';
                    const hsNodes = element.nodes || [];
                    const hsNodesJson = JSON.stringify(hsNodes).replace(/"/g, '&quot;');
                    el.innerHTML = `
                        <div class="hotspot-container" data-nodes="${hsNodesJson}">
                            <div class="hotspot-question">${element.question || '圈出你認為有問題的地方'}</div>
                            <div class="hotspot-image-wrap" style="position:relative;">
                                ${hsSrc ? '<img src="' + hsSrc + '" class="hotspot-image" draggable="false" />' : '<div class="hotspot-placeholder">（請設定圖片）</div>'}
                                ${hsNodes.map(n => '<div class="hs-node" data-id="' + n.id + '" style="left:' + n.x + '%;top:' + n.y + '%;">' + n.label + '</div>').join('')}
                            </div>
                            <div class="hotspot-actions"><button class="hs-submit-btn" disabled>確認送出</button></div>
                            <div class="hotspot-result"></div>
                        </div>`;
                    break;
                }

                case 'document': {
                    el.classList.add('interactive-element');
                    el.innerHTML = `
                        <div class="document-card-container" data-element-id="${element.id}" style="
                            display:flex;flex-direction:column;align-items:center;justify-content:center;
                            gap:10px;height:100%;cursor:pointer;pointer-events:auto;
                            background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 100%);
                            border-radius:12px;border:1.5px solid #bae6fd;
                            transition:transform .15s,box-shadow .15s;position:relative;
                        ">
                            <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0284c7,#0ea5e9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(2,132,199,0.25);">
                                <span class="material-symbols-outlined" style="font-size:28px;color:#fff;">description</span>
                            </div>
                            <div style="font-weight:600;font-size:0.95rem;color:#0c4a6e;text-align:center;line-height:1.4;padding:0 12px;">${element.docTitle || '文件名稱'}</div>
                            <div style="font-size:0.72rem;color:#7dd3fc;display:flex;align-items:center;gap:4px;">
                                <span class="material-symbols-outlined" style="font-size:14px;">visibility</span>
                                點擊查看文件
                            </div>
                        </div>`;
                    el.querySelector('.document-card-container')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (window._openDocViewer) window._openDocViewer(element.id);

                default:
                    return null;

            // 倒數計時器（適用所有互動元件）
            if (element.timeLimit && element.timeLimit > 0) {
                el.dataset.timeLimit = element.timeLimit;
            }

            return el;

        // ── 縮放投影片適應視窗 ──
        function scaleSlide() {
            const wrapper = document.querySelector('.student-slide-wrapper');
            if (!wrapper || !slideEl) return;
            const pres = document.getElementById('studentPresentation');
            const isImmersive = pres?.classList.contains('immersive-mode') ||
                !!document.fullscreenElement || !!document.webkitFullscreenElement;
            const isMobile = window.innerWidth <= 1024;

            // 確保 960x540 固定尺寸
            slideEl.style.width = '960px';
            slideEl.style.height = '540px';

            if (isMobile) {
                // 手機版：slide 是 absolute + top:50% left:50%
                // 用 translate(-50%,-50%) 居中 + scale 縮放
                const ww = wrapper.clientWidth;
                const wh = wrapper.clientHeight;
                const scale = Math.min(ww / 960, wh / 540, 1);
                slideEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
                slideEl.style.transformOrigin = 'top left';
                slideEl.style.marginBottom = '0';
            } else if (isImmersive) {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const scale = Math.min(vw / 960, vh / 540, 1);
                slideEl.style.transform = `scale(${scale})`;
                slideEl.style.transformOrigin = 'center center';
                slideEl.style.marginBottom = '0';
            } else {
                const pad = 40;
                const ww = wrapper.clientWidth - pad;
                const wh = wrapper.clientHeight - pad;
                const scale = Math.min(ww / 960, wh / 540, 1);
                slideEl.style.transform = `scale(${scale})`;
                slideEl.style.transformOrigin = 'center center';
                slideEl.style.marginBottom = '0';
            }
        }

        // ── 手機版側面板 ──
        (function initMobileSidePanel() {
            const panel = document.getElementById('mobileSidePanel');
            if (!panel) return;

            // 頁碼同步
            const mainCounter = document.getElementById('slideCounter');
            const mspCounter = document.getElementById('mspPageCounter');
            if (mainCounter && mspCounter) {
                const syncCount = () => {
                    mspCounter.textContent = mainCounter.textContent.replace(/\s/g, '');
                };
                syncCount();
                new MutationObserver(syncCount).observe(mainCounter, { childList: true, characterData: true, subtree: true });
            }

            // 模式切換同步
            const followBtn = document.getElementById('mspFollowBtn');
            const freeBtn = document.getElementById('mspFreeBtn');
            const mainFollowBtn = document.getElementById('followModeBtn');
            const mainFreeBtn = document.getElementById('freeModeBtn');

            function syncModeState() {
                const isFollow = mainFollowBtn?.classList.contains('active');
                followBtn?.classList.toggle('active', isFollow);
                freeBtn?.classList.toggle('active', !isFollow);
            }
            syncModeState();

            followBtn?.addEventListener('click', () => { mainFollowBtn?.click(); syncModeState(); });
            freeBtn?.addEventListener('click', () => { mainFreeBtn?.click(); syncModeState(); });

            // 監聽桌面端 mode 變化
            new MutationObserver(syncModeState).observe(mainFollowBtn, { attributes: true, attributeFilter: ['class'] });

            // 全螢幕退出
            document.getElementById('mspFullscreenBtn')?.addEventListener('click', () => {
                document.getElementById('studentFullscreenBtn')?.click();
            });

            // ── 右側面板：Q&A + 排行榜 ──
            document.getElementById('mspQABtn')?.addEventListener('click', () => {
                const popup = document.getElementById('studentQAPopup');
                if (popup) popup.style.display = popup.style.display === 'flex' ? 'none' : 'flex';
            });

            document.getElementById('mspLBBtn')?.addEventListener('click', () => {
                const lbPanel = document.getElementById('studentLeaderboard');
                if (lbPanel) lbPanel.classList.toggle('open');
            });

            // 排行榜關閉按鈕
            document.getElementById('studentLbClose')?.addEventListener('click', () => {
                document.getElementById('studentLeaderboard')?.classList.remove('open');
            });
        })();

        // ── 全螢幕 / 沉浸模式 ──
        (function initImmersive() {
            const btn = document.getElementById('studentFullscreenBtn');
            const pres = document.getElementById('studentPresentation');
            const wrapper = document.querySelector('.student-slide-wrapper');
            const header = document.querySelector('.student-header');
            if (!pres) return;

            let isImmersive = false;

            function enterImmersive() {
                if (isImmersive) return;
                // 優先用原生 Fullscreen API
                if (pres.requestFullscreen) {
                    pres.requestFullscreen().catch(() => {
                        // fallback: CSS immersive
                        pres.classList.add('immersive-mode');
                    });
                } else if (pres.webkitRequestFullscreen) {
                    pres.webkitRequestFullscreen();
                } else {
                    pres.classList.add('immersive-mode');
                }
                isImmersive = true;
                if (btn) {
                    btn.querySelector('.material-symbols-outlined').textContent = 'fullscreen_exit';
                    btn.title = '退出全螢幕';
                }
                setTimeout(scaleSlide, 100);

                // 顯示退出提示
                showImmersiveHint();
            }

            function exitImmersive() {
                if (!isImmersive) return;
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else if (document.webkitFullscreenElement) {
                    document.webkitExitFullscreen();
                }
                pres.classList.remove('immersive-mode');
                isImmersive = false;
                if (btn) {
                    btn.querySelector('.material-symbols-outlined').textContent = 'fullscreen';
                    btn.title = '全螢幕';
                }
                setTimeout(scaleSlide, 100);
                // 移除提示
                document.querySelector('.immersive-hint')?.remove();
            }

            function showImmersiveHint() {
                document.querySelector('.immersive-hint')?.remove();
                const hint = document.createElement('div');
                hint.className = 'immersive-hint';
                hint.textContent = '點擊投影片退出全螢幕';
                document.body.appendChild(hint);
                setTimeout(() => hint.remove(), 3500);
            }

            // 按鈕切換
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isImmersive ? exitImmersive() : enterImmersive();
                });
            }

            // ★ 點擊投影片進入沉浸模式（手機）
            if (slideEl) {
                slideEl.addEventListener('click', (e) => {
                    // 不要攔截互動元素的點擊
                    if (e.target.closest('.interactive-element, button, input, textarea, select, a, .hw-card, .showcase-container')) return;
                    if (isImmersive) {
                        exitImmersive();
                    } else if (window.innerWidth <= 1024) {
                        // 只在手機上啟用點擊進入
                        enterImmersive();
                    }
                });
            }

            // 監聽原生全螢幕退出
            const onFSExit = () => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    pres.classList.remove('immersive-mode');
                    isImmersive = false;
                    if (btn) {
                        btn.querySelector('.material-symbols-outlined').textContent = 'fullscreen';
                        btn.title = '全螢幕';
                    }
                    document.querySelector('.immersive-hint')?.remove();
                    setTimeout(scaleSlide, 100);
                } else {
                    setTimeout(scaleSlide, 100);
                }
            };
            document.addEventListener('fullscreenchange', onFSExit);
            document.addEventListener('webkitfullscreenchange', onFSExit);

            // ★ 手機自動進入沉浸模式
            if (window.innerWidth <= 1024) {
                setTimeout(() => {
                    // 不用 Fullscreen API（iOS 不支援），直接用 CSS immersive
                    pres.classList.add('immersive-mode');
                    isImmersive = true;
                    if (btn) {
                        btn.querySelector('.material-symbols-outlined').textContent = 'fullscreen_exit';
                        btn.title = '退出全螢幕';
                    }
                    scaleSlide();
                }, 300);
            }
        })();
    </script>

</body>

</html>
