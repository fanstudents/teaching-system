<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本預算 — 數位簡報室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <style>
        :root { --accent: #4f46e5; --accent-light: #eef2ff; --text: #1e293b; --text-secondary: #64748b; --text-muted: #94a3b8; --border: #e2e8f0; --bg: #f8fafc; --card: #fff; --positive: #059669; --negative: #dc2626; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .page-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
        .page-header h1 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .page-header h1 .material-symbols-outlined { color: var(--text-secondary); }
        .page-header p { font-size: 0.76rem; color: var(--text-muted); margin-top: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

        /* Controls */
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
        .controls select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.82rem; font-family: inherit; background: var(--card); }
        .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.25); }
        .btn-export { background: var(--card); color: var(--text-secondary); border: 1.5px solid var(--border); }
        .btn-export:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sync { background: var(--text); color: #fff; }
        .btn-sync:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,41,59,.2); }
        .btn-sync:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-sm { padding: 5px 12px; font-size: 0.76rem; border-radius: 6px; }
        .btn-add { background: var(--bg); color: var(--text-secondary); border: 1px dashed var(--border); }
        .btn-add:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
        .btn-del { background: none; color: var(--text-muted); border: none; padding: 4px; cursor: pointer; }
        .btn-del:hover { color: var(--negative); }
        .auto-saved { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 3px; }

        /* Summary cards */
        .profit-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .profit-card { background: var(--card); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); }
        .pc-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 3px; }
        .pc-value { font-size: 1.3rem; font-weight: 700; color: var(--text); }
        .pc-value.green { color: var(--positive); } .pc-value.red { color: var(--negative); }

        /* Section */
        .section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 18px; overflow: hidden; }
        .section-header { padding: 12px 18px; border-bottom: 1px solid #f0f1f3; display: flex; align-items: center; gap: 8px; }
        .section-header h3 { font-size: 0.86rem; font-weight: 600; }
        .section-body { padding: 0 18px 14px; }

        /* TABS */
        .tab-bar { display: flex; border-bottom: 2px solid #f0f1f3; margin-bottom: 18px; gap: 0; }
        .tab-btn { padding: 10px 20px; font-size: 0.84rem; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--text-muted); position: relative; font-family: inherit; transition: color .15s; display: flex; align-items: center; gap: 6px; }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: var(--accent); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; }
        .tab-badge { font-size: 0.62rem; padding: 1px 6px; border-radius: 10px; background: #f1f5f9; color: var(--text-secondary); font-weight: 700; }
        .tab-btn.active .tab-badge { background: var(--accent-light); color: var(--accent); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Collapsible rows */
        .product-list { display: flex; flex-direction: column; }
        .product-row { border-bottom: 1px solid #f0f1f3; }
        .product-row:last-child { border-bottom: none; }
        .product-row-header { display: flex; align-items: center; gap: 8px; padding: 11px 6px; cursor: pointer; transition: background .15s; user-select: none; }
        .product-row-header:hover { background: var(--bg); }
        .row-chevron { font-size: 18px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
        .product-row.open .row-chevron { transform: rotate(90deg); }
        .row-name { font-size: 0.84rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .row-sub { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; margin-left: 4px; }
        .row-right { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .badge { font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; font-weight: 600; white-space: nowrap; background: #f1f5f9; color: var(--text-secondary); }
        .badge-order { background: #f1f5f9; color: var(--text-secondary); }
        .badge-type { background: #f1f5f9; color: var(--text-secondary); }
        .row-metrics { display: flex; gap: 4px; align-items: center; }
        .row-chip { font-size: 0.68rem; padding: 2px 8px; border-radius: 4px; white-space: nowrap; background: #f1f5f9; color: var(--text-secondary); font-weight: 500; }
        .row-chip b { font-weight: 700; color: var(--text); margin-left: 2px; }
        .row-chip.profit { font-weight: 700; }
        .row-chip.profit.pos { background: #ecfdf5; color: var(--positive); }
        .row-chip.profit.neg { background: #fef2f2; color: var(--negative); }
        .product-detail { display: none; padding: 6px 6px 14px 30px; }
        .product-row.open .product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
        .field { display: flex; align-items: center; gap: 6px; }
        .field-label { font-size: 0.76rem; color: var(--text-secondary); min-width: 78px; white-space: nowrap; }
        .field-input { flex: 1; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; }
        .field-input:focus { outline: none; border-color: var(--accent); }
        .field-input.rev-input { border-color: var(--border); background: var(--bg); }
        .field-input.rev-input:focus { border-color: var(--accent); }
        .field-input.rev-readonly { border-color: var(--border); background: #f1f5f9; color: var(--text-secondary); cursor: default; }
        .lecturer-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #f0f1f3; margin-top: 4px; }
        .toggle-wrap { display: flex; border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; }
        .toggle-opt { padding: 4px 10px; font-size: 0.72rem; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text-muted); transition: all .15s; border: none; font-family: inherit; }
        .toggle-opt.active { background: var(--accent); color: #fff; }
        .cur-toggle { display: inline-flex; border: 1.5px solid var(--border); border-radius: 5px; overflow: hidden; margin-left: 4px; flex-shrink: 0; }
        .cur-opt { padding: 2px 7px; font-size: 0.62rem; font-weight: 700; cursor: pointer; background: var(--card); color: var(--text-muted); border: none; font-family: inherit; transition: all .15s; }
        .cur-opt.active { background: var(--accent); color: #fff; }
        .cur-opt.twd.active { background: var(--text-secondary); color: #fff; }
        .full-row { grid-column: 1 / -1; }
        .date-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #f0f1f3; margin-top: 4px; }
        .type-tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; background: #f1f5f9; color: var(--text-secondary); }
        .badge-matched { background: #f1f5f9; color: var(--positive); }
        .badge-unmatched { background: #f1f5f9; color: var(--text-muted); }
        .add-row { padding: 10px 6px; }

        /* Order detail mini-table */
        .order-detail-table { width: 100%; grid-column: 1 / -1; margin: 6px 0; font-size: 0.74rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .order-detail-table th { padding: 5px 10px; font-size: .66rem; background: var(--bg); color: var(--text-secondary); border-bottom: 1px solid var(--border); }
        .order-detail-table td { padding: 4px 10px; border-bottom: 1px solid #f0f1f3; }
        .order-detail-table tr:last-child td { border-bottom: none; }
        .order-detail-table .plan-name { font-weight: 600; color: var(--text); }
        .order-detail-table .plan-count { color: var(--text-secondary); font-weight: 600; }
        .order-detail-table .plan-rev { font-weight: 700; color: var(--text); }

        /* Plan pricing table */
        .plan-pricing { grid-column: 1 / -1; margin: 4px 0; }
        .plan-pricing-table { width: 100%; font-size: 0.74rem; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .plan-pricing-table th { padding: 4px 10px; font-size: .66rem; background: var(--bg); color: var(--text-muted); border-bottom: 1px solid var(--border); text-align: left; }
        .plan-pricing-table td { padding: 4px 10px; border-bottom: 1px solid #f0f1f3; }
        .plan-pricing-table tr:last-child td { border-bottom: none; }

        /* Sub-section */
        .subsection { margin: 10px 0; border: 1px solid #f0f1f3; border-radius: 8px; overflow: hidden; }
        .subsection-header { padding: 8px 12px; background: var(--bg); font-size: .78rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .subsection-body { padding: 0 12px; }

        /* Chart */
        /* Month pills */
        .month-pills { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
        .month-pill { padding: 4px 12px; border-radius: 6px; font-size: 0.76rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--card); color: var(--text-secondary); transition: all .15s; user-select: none; }
        .month-pill:hover { border-color: var(--accent); color: var(--accent); }
        .month-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Overview table */
        .overview-group { margin-bottom: 14px; }
        .overview-group-label { font-size: 0.76rem; font-weight: 600; color: var(--text-secondary); padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
        .overview-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .overview-table th { text-align: left; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); padding: 6px 12px; border-bottom: 1px solid var(--border); }
        .overview-table th.num { text-align: right; }
        .overview-table td { padding: 8px 12px; border-bottom: 1px solid #f0f1f3; }
        .overview-table td.num { text-align: right; font-family: 'Inter', monospace; font-weight: 600; }
        .overview-table tr:hover td { background: var(--bg); }
        .overview-table .pos { color: var(--positive); }
        .overview-table .neg { color: var(--negative); }
        .month-tag { font-size: 0.62rem; padding: 1px 6px; border-radius: 3px; background: #f1f5f9; color: var(--text-muted); margin-left: 4px; }

        /* Monthly tools */
        .monthly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tool-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 5px 10px; border-radius: 8px; background: var(--bg); }
        .tool-icon { width: 24px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .tool-name { flex: 1; font-size: 0.78rem; font-weight: 500; }
        .tool-input { width: 110px; padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; }
        .tool-input:focus { outline: none; border-color: var(--accent); }
        .cost-subtotal { font-size: 0.78rem; font-weight: 700; color: var(--negative); text-align: right; padding: 8px 0; border-top: 1px solid #f0f1f3; display: flex; justify-content: space-between; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: .82rem; transform: translateY(100px); opacity: 0; transition: all .3s; z-index: 999; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .pct-label { font-size: 0.72rem; color: var(--text-muted); }
        .shared-row { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; padding-top: 10px; }
        .shared-item { display: flex; align-items: center; gap: 8px; }
        .shared-item label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
        .shared-input { width: 100px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.82rem; font-family: 'Inter', monospace; text-align: right; }
        .shared-input:focus { outline: none; border-color: var(--accent); }

        @media (max-width: 1024px) { .monthly-grid { grid-template-columns: 1fr; } .product-row.open .product-detail { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .profit-bar { grid-template-columns: repeat(2, 1fr); } .page-header { padding: 14px 16px; } .container { padding: 14px 12px; } .tab-btn { padding: 8px 12px; font-size: .78rem; } }
    </style>
</head>
<body>
<div class="admin-main">
    <div class="page-header">
        <h1><span class="material-symbols-outlined">calculate</span> 成本預算管理</h1>
        <p>產品收入、成本分析與利潤追蹤</p>
    </div>
    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <div class="month-pills" id="monthPills"></div>
            <input type="hidden" id="monthSelect" value="">
            <button class="btn btn-sync" id="btnSync"><span class="material-symbols-outlined" style="font-size:16px;">sync</span> 重新整理</button>
            <button class="btn btn-save" id="btnSave"><span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存</button>
            <button class="btn btn-export" id="btnExport"><span class="material-symbols-outlined" style="font-size:16px;">download</span> CSV</button>
            <span class="auto-saved" id="autoSaved"></span>
        </div>

        <!-- Profit -->
        <div class="profit-bar">
            <div class="profit-card"><div class="pc-label">總收入</div><div class="pc-value" id="totalRevenue">NT$ 0</div></div>
            <div class="profit-card"><div class="pc-label">總成本</div><div class="pc-value red" id="totalCost">NT$ 0</div></div>
            <div class="profit-card"><div class="pc-label">淨利潤</div><div class="pc-value green" id="netProfit">NT$ 0</div></div>
            <div class="profit-card"><div class="pc-label">利潤率</div><div class="pc-value" id="profitMargin">0%</div></div>
        </div>

        <!-- Settings loaded from system settings -->
        <input type="hidden" id="globalTaxRate" value="5">
        <input type="hidden" id="globalUsdRate" value="32.5">

        <!-- TABS -->
        <div class="section">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="overview"><span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span> 月份總覽</button>
                <button class="tab-btn" data-tab="b2b"><span class="material-symbols-outlined" style="font-size:16px;">business</span> 企業內訓 <span class="tab-badge" id="b2bCount">0</span></button>
                <button class="tab-btn" data-tab="b2c"><span class="material-symbols-outlined" style="font-size:16px;">school</span> 公開課程 <span class="tab-badge" id="b2cCount">0</span></button>
                <button class="tab-btn" data-tab="biz"><span class="material-symbols-outlined" style="font-size:16px;">handshake</span> 企業服務 <span class="tab-badge" id="bizCount">0</span></button>
            </div>

            <!-- Monthly Overview Panel -->
            <div class="tab-panel active" id="panel-overview">
                <div class="section-body" id="overviewPanel" style="padding:14px 0;"></div>
            </div>

            <!-- B2B Panel -->
            <div class="tab-panel" id="panel-b2b">
                <div class="section-body">
                    <div class="product-list" id="b2bProducts"></div>
                    <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('b2b')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                    <div class="cost-subtotal"><span>企業內訓合計</span><span>收入 <span id="b2bRevTotal" style="color:var(--accent);">NT$ 0</span> ｜ 成本 <span id="b2bCostTotal">NT$ 0</span> ｜ 利潤 <span id="b2bProfitTotal" style="color:var(--positive);">NT$ 0</span></span></div>
                </div>
            </div>

            <!-- B2C Panel -->
            <div class="tab-panel" id="panel-b2c">
                <div class="section-body">
                    <div class="product-list" id="b2cProducts"></div>
                    <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('b2c')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                    <div class="cost-subtotal"><span>公開課程合計</span><span>收入 <span id="b2cRevTotal" style="color:var(--accent);">NT$ 0</span> ｜ 成本 <span id="b2cCostTotal">NT$ 0</span> ｜ 利潤 <span id="b2cProfitTotal" style="color:var(--positive);">NT$ 0</span></span></div>
                </div>
            </div>

            <!-- Biz Services Panel -->
            <div class="tab-panel" id="panel-biz">
                <div class="section-body">
                    <div class="subsection">
                        <div class="subsection-header"><span class="material-symbols-outlined" style="font-size:15px;color:var(--text-secondary);">campaign</span> 行銷代操</div>
                        <div class="subsection-body">
                            <div class="product-list" id="bizMarketingProducts"></div>
                            <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('bizMarketing')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                        </div>
                    </div>
                    <div class="subsection">
                        <div class="subsection-header"><span class="material-symbols-outlined" style="font-size:15px;color:var(--text-secondary);">code</span> 系統開發</div>
                        <div class="subsection-body">
                            <div class="product-list" id="bizDevProducts"></div>
                            <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('bizDev')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                        </div>
                    </div>
                    <div class="subsection">
                        <div class="subsection-header"><span class="material-symbols-outlined" style="font-size:15px;color:var(--text-secondary);">engineering</span> 專家派遣</div>
                        <div class="subsection-body">
                            <div class="product-list" id="bizExpertProducts"></div>
                            <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('bizExpert')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                        </div>
                    </div>
                    <div class="cost-subtotal"><span>企業服務合計</span><span>收入 <span id="bizRevTotal" style="color:var(--accent);">NT$ 0</span> ｜ 成本 <span id="bizCostTotal">NT$ 0</span> ｜ 利潤 <span id="bizProfitTotal" style="color:var(--positive);">NT$ 0</span></span></div>
                </div>
            </div>
        </div>

        <!-- Monthly costs moved to expenses.html -->
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { db } from './scripts/supabase.js';

const TEACHIFY_API = 'https://teachify.io/admin/graphql';
const TEACHIFY_KEY = 'vsXiCQXFlNs95GjiRHW4Y3mwc9L6_oj6VdRiTj-3ymE';
const SERVICE_OWNER_ID = '60182dbe-09ea-4e92-b8d7-ed2c24b81eb9';

const GROUPS = ['b2b', 'b2c', 'bizMarketing', 'bizDev', 'bizExpert'];
const BIZ_GROUPS = ['bizMarketing', 'bizDev', 'bizExpert'];
let products = { b2b: [], b2c: [], bizMarketing: [], bizDev: [], bizExpert: [] };
let ordersByCourseName = {};
// B2C 訂單明細：{ 'courseName': [ {course_name, plan_name, amount, payment_time, student_name, student_email}, ... ] }
let b2cOrderDetails = {};
let nextId = 1;
const STORE_KEY = 'tbr_cost_budget_v5';

// ── Month Selector ──
const monthSelect = document.getElementById('monthSelect');
const monthPills = document.getElementById('monthPills');
const now = new Date();
const allMonths = [];
for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = `${d.getMonth()+1} 月`;
    allMonths.push({ val, label, year: d.getFullYear() });
}
// Render pills
let lastYear = null;
allMonths.forEach((m, i) => {
    if (m.year !== lastYear) {
        const yearSpan = document.createElement('span');
        yearSpan.style.cssText = 'font-size:.68rem;color:var(--text-muted);padding:4px 2px;font-weight:600;';
        yearSpan.textContent = m.year;
        monthPills.appendChild(yearSpan);
        lastYear = m.year;
    }
    const pill = document.createElement('span');
    pill.className = 'month-pill' + (i === 0 ? ' active' : '');
    pill.dataset.month = m.val;
    pill.textContent = m.label;
    pill.addEventListener('click', () => {
        pill.classList.toggle('active');
        // Ensure at least one is selected
        const actives = monthPills.querySelectorAll('.month-pill.active');
        if (actives.length === 0) { pill.classList.add('active'); return; }
        // Primary = most recent active month
        const sorted = [...actives].map(p => p.dataset.month).sort().reverse();
        monthSelect.value = sorted[0];
        autoSync(false);
    });
    monthPills.appendChild(pill);
});

// ── 模糊比對：找出 orders 的 course_name 屬於哪個 Teachify 課程 ──
function fuzzyMatchCourse(orderCourseName, teachifyCourses) {
    if (!orderCourseName) return null;
    const lcName = orderCourseName.toLowerCase();
    // 1. 完全一致
    for (const c of teachifyCourses) {
        if (c.name === orderCourseName) return c;
    }
    // 2. 訂單 course_name 包含 Teachify 課程名（或反向）
    for (const c of teachifyCourses) {
        const lcCourse = (c.name || '').toLowerCase();
        if (lcName.includes(lcCourse) || lcCourse.includes(lcName)) return c;
    }
    // 3. plan name 比對
    for (const c of teachifyCourses) {
        for (const p of (c.plans || [])) {
            if ((p.name || '').toLowerCase().includes(lcName) || lcName.includes((p.name || '').toLowerCase())) return c;
        }
    }
    return null;
}

// ══ Auto Sync ══
async function autoSync(silent = false) {
    const btn = document.getElementById('btnSync');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;animation:spin .7s linear infinite;">progress_activity</span> 同步中…';

    const month = monthSelect.value;
    const [year, mon] = month.split('-').map(Number);
    const monthStart = `${year}-${String(mon).padStart(2,'0')}-01`;
    const nextMon = mon === 12 ? `${year+1}-01-01` : `${year}-${String(mon+1).padStart(2,'0')}-01`;

    try {
        const [projResult, orgResult, sessionsResult, teachifyResult, ordersResult, savedResult] = await Promise.all([
            db.select('projects', { select: 'id,name,organization_id', filter: { owner_id: `eq.${SERVICE_OWNER_ID}` }, order: 'created_at.desc', limit: 100 }),
            db.select('organizations', { select: 'id,name', limit: 200 }),
            db.select('project_sessions', { select: 'id,project_id,session_code,date,time,venue,status', limit: 500 }),
            fetch(TEACHIFY_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Teachify-API-Key': TEACHIFY_KEY }, body: JSON.stringify({ query: `{ courses { nodes { id name slug plans { id name amount } } } }` }) }).then(r => r.json()).catch(() => null),
            db.select('orders', {
                select: 'course_name,plan_name,amount,payment_status,payment_time,student_name,student_email,coupon_code',
                filter: { payment_status: 'eq.Paid', payment_time: `gte.${monthStart}` },
                order: 'payment_time.desc', limit: 2000
            }),
            db.select('cost_budgets', { filter: { month: `eq.${month}` }, limit: 1 }).catch(() => ({ data: null }))
        ]);

        const orgMap = {};
        (orgResult.data || []).forEach(o => { orgMap[o.id] = o.name; });

        // ── 建立 B2B project → sessions 對應 ──
        const projSessionsMap = {}; // project_id → [{id, date, time, venue, session_code}]
        (sessionsResult.data || []).forEach(s => {
            if (!projSessionsMap[s.project_id]) projSessionsMap[s.project_id] = [];
            projSessionsMap[s.project_id].push(s);
        });

        // ── 讀取已存檔的成本資料 (Supabase 優先，localStorage fallback) ──
        let saved = null;
        if (savedResult.data && savedResult.data.length > 0) {
            saved = savedResult.data[0].data;
        }
        if (!saved) saved = getSavedMonth(month);

        // ── 過濾當月訂單 ──
        const monthOrders = (ordersResult.data || []).filter(o => o.payment_time && o.payment_time >= monthStart && o.payment_time < nextMon);
        const teachifyCourses = teachifyResult?.data?.courses?.nodes || [];

        // ── 建立 B2B 專案名稱 set（用來排除非公開課程的訂單）──
        const b2bProjectNames = new Set();
        (projResult.data || []).forEach(proj => { if (proj.name) b2bProjectNames.add(proj.name); });

        // ── 處理 B2B 訂單對應 ──
        ordersByCourseName = {};
        monthOrders.forEach(o => {
            const n = o.course_name || '未知';
            if (!ordersByCourseName[n]) ordersByCourseName[n] = { count: 0, revenue: 0 };
            ordersByCourseName[n].count++;
            ordersByCourseName[n].revenue += (o.amount || 0);
        });

        // ── 處理 B2C：以訂單為主，配對 Teachify 課程 ──
        // 把 orders 歸組到 Teachify 課程下（或未配對組）
        const courseOrderMap = {}; // teachifyCourseId → { course, orders: [], revenue, count }
        const unmatchedOrders = []; // 沒有配對到任何 Teachify 課程的訂單
        b2cOrderDetails = {};

        monthOrders.forEach(order => {
            const courseName = order.course_name || '未知';
            // 嘗試配對 Teachify 課程
            const matched = fuzzyMatchCourse(courseName, teachifyCourses);
            if (matched) {
                const key = matched.id;
                if (!courseOrderMap[key]) {
                    courseOrderMap[key] = {
                        course: matched,
                        orders: [],
                        revenue: 0,
                        count: 0,
                        planBreakdown: {} // plan_name → { count, revenue }
                    };
                }
                courseOrderMap[key].orders.push(order);
                courseOrderMap[key].revenue += (order.amount || 0);
                courseOrderMap[key].count++;
                const planKey = order.plan_name || order.course_name || '預設方案';
                if (!courseOrderMap[key].planBreakdown[planKey]) {
                    courseOrderMap[key].planBreakdown[planKey] = { count: 0, revenue: 0 };
                }
                courseOrderMap[key].planBreakdown[planKey].count++;
                courseOrderMap[key].planBreakdown[planKey].revenue += (order.amount || 0);
            } else {
                // 只有不在 B2B 專案名稱裡的才算公開課程
                if (!b2bProjectNames.has(courseName)) {
                    unmatchedOrders.push(order);
                }
            }
        });

        // 也加上有課程但當月沒訂單的 Teachify 課程（讓使用者仍可輸入成本）
        teachifyCourses.forEach(c => {
            if (!courseOrderMap[c.id]) {
                courseOrderMap[c.id] = { course: c, orders: [], revenue: 0, count: 0, planBreakdown: {} };
            }
        });

        // 把未配對訂單按 course_name 群組化
        const unmatchedGrouped = {};
        unmatchedOrders.forEach(o => {
            const n = o.course_name || '未知';
            if (!unmatchedGrouped[n]) unmatchedGrouped[n] = { orders: [], revenue: 0, count: 0, planBreakdown: {} };
            unmatchedGrouped[n].orders.push(o);
            unmatchedGrouped[n].revenue += (o.amount || 0);
            unmatchedGrouped[n].count++;
            const planKey = o.plan_name || o.course_name || '預設方案';
            if (!unmatchedGrouped[n].planBreakdown[planKey]) {
                unmatchedGrouped[n].planBreakdown[planKey] = { count: 0, revenue: 0 };
            }
            unmatchedGrouped[n].planBreakdown[planKey].count++;
            unmatchedGrouped[n].planBreakdown[planKey].revenue += (o.amount || 0);
        });

        const makeSavedMap = (list) => { const m = {}; (list || []).forEach(p => { m[p.sourceId || p.name] = p; }); return m; };
        const sB2b = makeSavedMap(saved?.products?.b2b);
        const sB2c = makeSavedMap(saved?.products?.b2c);

        // ── B2B: 客戶名稱＋場次 ──
        const newB2b = [];
        (projResult.data || []).forEach(proj => {
            const courseName = proj.name || '未命名';
            const clientName = (proj.organization_id && orgMap[proj.organization_id]) || '';
            const e = sB2b[proj.id] || sB2b[courseName];
            const oi = ordersByCourseName[courseName] || { count: 0, revenue: 0 };
            const p = mergeProduct(nextId++, clientName || courseName, courseName, proj.id, null, e, oi);
            // B2B 場次：從 project_sessions 自動建立，合併已存檔
            const projSessions = projSessionsMap[proj.id] || [];
            const savedSessions = e?.sessions || [];
            const savedSessMap = {};
            savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
            if (projSessions.length > 0) {
                p.sessions = projSessions.map(ps => {
                    const es = savedSessMap[ps.id] || savedSessMap[ps.session_code] || {};
                    return makeSession(ps.id, `${ps.date || ''} ${ps.venue || ps.session_code}`.trim(), es);
                });
            } else if (savedSessions.length > 0) {
                p.sessions = savedSessions.map(s => makeSession(s.sessionId, s.name, s));
            }
            newB2b.push(p);
        });

        // ── B2C: 以訂單為核心，配對 Teachify 課程 ──
        const newB2c = [];
        // 有配對到 Teachify 的
        Object.entries(courseOrderMap)
            .sort((a,b) => b[1].revenue - a[1].revenue)
            .forEach(([courseId, data]) => {
                const name = data.course.name || '未命名';
                const e = sB2c[courseId] || sB2c[name];
                const oi = { count: data.count, revenue: data.revenue };
                const p = mergeProduct(nextId++, name, null, courseId, data.course.slug, e, oi);
                p.revenue = data.revenue;
                p.orderRevenue = data.revenue;
                p.orderCount = data.count;
                p.planBreakdown = data.planBreakdown;
                p.matchedTeachify = true;
                p.ordersList = data.orders;
                p.teachifyPlans = data.course.plans || [];
                p.estimatedRevenue = e?.estimatedRevenue || 0;
                b2cOrderDetails[p.id] = data.orders;
                // B2C 場次：從 plan breakdown 自動建立
                const savedSessions = e?.sessions || [];
                const savedSessMap = {};
                savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
                p.sessions = Object.entries(data.planBreakdown).map(([planName, info]) => {
                    const es = savedSessMap[planName] || {};
                    const s = makeSession(planName, planName, es);
                    s.orderCount = info.count;
                    s.orderRevenue = info.revenue;
                    return s;
                });
                newB2c.push(p);
            });

        // 未配對的訂單群組
        Object.entries(unmatchedGrouped)
            .sort((a,b) => b[1].revenue - a[1].revenue)
            .forEach(([courseName, data]) => {
                const e = sB2c[courseName];
                const oi = { count: data.count, revenue: data.revenue };
                const p = mergeProduct(nextId++, courseName, null, `unmatched_${courseName}`, null, e, oi);
                p.revenue = data.revenue;
                p.orderRevenue = data.revenue;
                p.orderCount = data.count;
                p.planBreakdown = data.planBreakdown;
                p.matchedTeachify = false;
                p.ordersList = data.orders;
                b2cOrderDetails[p.id] = data.orders;
                const savedSessions = e?.sessions || [];
                const savedSessMap = {};
                savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
                p.sessions = Object.entries(data.planBreakdown).map(([planName, info]) => {
                    const es = savedSessMap[planName] || {};
                    const s = makeSession(planName, planName, es);
                    s.orderCount = info.count;
                    s.orderRevenue = info.revenue;
                    return s;
                });
                newB2c.push(p);
            });

        products.b2b = newB2b;
        products.b2c = newB2c;
        // Biz: restore from saved only
        BIZ_GROUPS.forEach(g => { products[g] = (saved?.products?.[g] || []).map(p => ({ ...p, id: nextId++ })); });

        if (saved) {
            document.getElementById('globalTaxRate').value = saved.globalTaxRate ?? 5;
            document.getElementById('globalUsdRate').value = saved.globalUsdRate ?? 32.5;
            if (saved.tools) Object.entries(saved.tools).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.value = val || ''; });
        }

        renderAll();
        const totalB2cOrders = Object.values(courseOrderMap).reduce((s,d) => s + d.count, 0) + unmatchedOrders.length;
        if (!silent) showToast(`已同步 ${newB2b.length} 專案、${newB2c.length} 課程、${totalB2cOrders} 筆公開課程訂單`);
        document.getElementById('autoSaved').innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> ${new Date().toLocaleTimeString('zh-TW')} 已同步`;
    } catch (err) {
        console.error('[sync]', err);
        if (!silent) showToast('同步失敗: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">sync</span> 重新整理';
    }
}

function mergeProduct(id, name, courseName, sourceId, sourceSlug, existing, orderInfo) {
    return {
        id, name, courseName: courseName || '', sourceId, sourceSlug,
        revenue: existing?.revenue || orderInfo.revenue || 0,
        orderCount: orderInfo.count, orderRevenue: orderInfo.revenue,
        lecturerType: existing?.lecturerType || 'fixed',
        lecturerFee: existing?.lecturerFee || 0, lecturerPercent: existing?.lecturerPercent || 0,
        kol: existing?.kol || 0, ads: existing?.ads || 0,
        venue: existing?.venue || 0, assistant: existing?.assistant || 0,
        transport: existing?.transport || 0, material: existing?.material || 0, personnel: existing?.personnel || 0,
        cur_lecturerFee: existing?.cur_lecturerFee || 'twd',
        cur_kol: existing?.cur_kol || 'twd', cur_ads: existing?.cur_ads || 'twd',
        cur_venue: existing?.cur_venue || 'twd', cur_assistant: existing?.cur_assistant || 'twd',
        cur_transport: existing?.cur_transport || 'twd', cur_material: existing?.cur_material || 'twd',
        cur_personnel: existing?.cur_personnel || 'twd',
        sessions: existing?.sessions || [] // 場次級別成本
    };
}

function makeSession(sessionId, name, existing) {
    return {
        sessionId: sessionId || '', name: name || '未命名場次',
        venue: existing?.venue || 0, lecturerFee: existing?.lecturerFee || 0,
        assistant: existing?.assistant || 0, transport: existing?.transport || 0,
        material: existing?.material || 0,
        cur_venue: existing?.cur_venue || 'twd', cur_lecturerFee: existing?.cur_lecturerFee || 'twd',
        cur_assistant: existing?.cur_assistant || 'twd', cur_transport: existing?.cur_transport || 'twd',
        cur_material: existing?.cur_material || 'twd',
        orderCount: existing?.orderCount || 0, orderRevenue: existing?.orderRevenue || 0
    };
}

function getSavedMonth(month) {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}')[month] || null; } catch { return null; }
}

function getUsdRate() {
    return parseFloat(document.getElementById('globalUsdRate')?.value) || 32.5;
}
function toTwd(amount, currency) {
    return currency === 'usd' ? Math.round(amount * getUsdRate()) : amount;
}

function calcCosts(p, group) {
    const taxRate = parseFloat(document.getElementById('globalTaxRate').value) || 0;
    const isB2c = group === 'b2c';
    const isBiz = BIZ_GROUPS.includes(group);
    const rev = (p.revenue || 0) > 0 ? (p.revenue || 0) : (parseFloat(p.estimatedRevenue) || 0);
    const tax = Math.round(rev * taxRate / 100);
    const orderCount = p.orderCount || (isB2c && rev > 0 ? 1 : 0);
    const payFee = isB2c ? Math.round(rev * 0.05 + orderCount * 15) : 0;

    // 講師費（課程級，若用分潤）
    const lecCostCourse = p.lecturerType === 'percent' ? Math.round(rev * (p.lecturerPercent || 0) / 100) : 0;
    // 課程級共享成本
    const sharedCosts = (isB2c ? (toTwd(p.kol||0, p.cur_kol) + toTwd(p.ads||0, p.cur_ads)) : 0)
                      + (isBiz ? toTwd(p.personnel||0, p.cur_personnel) : 0);

    // 場次級成本加總
    let sessionCosts = 0;
    (p.sessions || []).forEach(s => {
        sessionCosts += toTwd(s.venue||0, s.cur_venue)
                     + toTwd(s.lecturerFee||0, s.cur_lecturerFee)
                     + toTwd(s.assistant||0, s.cur_assistant)
                     + toTwd(s.transport||0, s.cur_transport)
                     + toTwd(s.material||0, s.cur_material);
    });

    // 若沒有場次，就用課程級的費用（向下相容）
    const hasSessions = (p.sessions || []).length > 0;
    const fallbackCosts = !hasSessions
        ? (p.lecturerType === 'fixed' ? toTwd(p.lecturerFee||0, p.cur_lecturerFee) : 0)
          + toTwd(p.venue||0, p.cur_venue) + toTwd(p.assistant||0, p.cur_assistant)
          + toTwd(p.transport||0, p.cur_transport) + toTwd(p.material||0, p.cur_material)
        : 0;

    const totalCost = tax + payFee + lecCostCourse + sharedCosts + sessionCosts + fallbackCosts;
    return { rev, tax, payFee, lecCost: lecCostCourse + (hasSessions ? 0 : (p.lecturerType==='fixed'?toTwd(p.lecturerFee||0,p.cur_lecturerFee):0)),
             sharedCosts, sessionCosts, totalCost, profit: rev - totalCost, taxRate, orderCount, isB2c, isBiz, hasSessions };
}

// ── Render ──
function renderAll() { GROUPS.forEach(g => renderProducts(g)); recalculate(); }

function renderProducts(group) {
    const container = document.getElementById(group + 'Products');
    const list = products[group];
    const isB2b = group === 'b2b';
    const isBiz = BIZ_GROUPS.includes(group);

    if (isBiz) {
        document.getElementById('bizCount').textContent = BIZ_GROUPS.reduce(function(s,g){ return s + products[g].length; }, 0);
    } else {
        var countEl = document.getElementById((isBiz ? 'biz' : group) + 'Count');
        if (countEl) countEl.textContent = list.length;
    }

    if (!list.length) {
        container.innerHTML = '<div style="text-align:center;padding:16px;color:#94a3b8;font-size:.8rem;">尚無項目</div>';
        return;
    }

    container.innerHTML = list.map(function(p) { return renderProductRow(p, group, isB2b, isBiz); }).join('');
}

function renderCurToggle(type, group, id, idxOrField, field) {
    // type: 'product' or 'session'
    var cur, onclick1, onclick2;
    if (type === 'session') {
        var sess = null;
        var prod = products[group].find(function(pp){ return pp.id === id; });
        if (prod && prod.sessions) sess = prod.sessions[idxOrField];
        cur = (sess && sess['cur_' + field]) || 'twd';
        onclick1 = "event.stopPropagation();toggleSessionCurrency('" + group + "'," + id + "," + idxOrField + ",'" + field + "')";
        onclick2 = onclick1;
    } else {
        var prod2 = products[group].find(function(pp){ return pp.id === id; });
        cur = (prod2 && prod2['cur_' + idxOrField]) || 'twd';
        onclick1 = "event.stopPropagation();toggleCurrency('" + group + "'," + id + ",'" + idxOrField + "')";
        onclick2 = onclick1;
    }
    return '<div class="cur-toggle">' +
        '<button class="cur-opt twd ' + (cur==='twd'?'active':'') + '" onclick="' + onclick1 + '">NT$</button>' +
        '<button class="cur-opt ' + (cur==='usd'?'active':'') + '" onclick="' + onclick2 + '">US$</button>' +
    '</div>';
}

    if (currency === 'usd') {
        return '<span class="pct-label">≈ NT$ ' + toTwd(amount || 0, 'usd').toLocaleString() + '</span>';
    }
    return '';

// ── Recalculate ──
function recalculate() {
    let grandRev = 0, grandCost = 0;

    // Per-category subtotals
    const catGroups = { b2b: ['b2b'], b2c: ['b2c'], biz: BIZ_GROUPS };
    Object.entries(catGroups).forEach(([cat, groups]) => {
        let cRev = 0, cCost = 0;
        groups.forEach(g => {
            products[g].forEach(p => {
                const c = calcCosts(p, g);
                cRev += c.rev; cCost += c.totalCost;
            });
        });
        document.getElementById(`${cat}RevTotal`).textContent = `NT$ ${cRev.toLocaleString()}`;
        document.getElementById(`${cat}CostTotal`).textContent = `NT$ ${cCost.toLocaleString()}`;
        document.getElementById(`${cat}ProfitTotal`).textContent = `NT$ ${(cRev - cCost).toLocaleString()}`;
        grandRev += cRev; grandCost += cCost;
    });

    const netProfit = grandRev - grandCost;
    const margin = grandRev > 0 ? (netProfit / grandRev * 100) : 0;
    document.getElementById('totalRevenue').textContent = `NT$ ${grandRev.toLocaleString()}`;
    document.getElementById('totalCost').textContent = `NT$ ${grandCost.toLocaleString()}`;
    const pe = document.getElementById('netProfit'); pe.textContent = `NT$ ${netProfit.toLocaleString()}`; pe.className = `pc-value ${netProfit>=0?'green':'red'}`;
    const me = document.getElementById('profitMargin'); me.textContent = margin.toFixed(1)+'%'; me.className = `pc-value ${margin>=0?'green':'red'}`;
    renderProfitChart(grandRev, grandCost);
    renderOverview();
}

function renderOverview() {
    const panel = document.getElementById('overviewPanel');
    const catDefs = [
        { key: 'b2b', label: '企業內訓', icon: 'business', groups: ['b2b'], cols: ['項目','應收','講師費','其他費用','利潤'] },
        { key: 'b2c', label: '公開課程', icon: 'school', groups: ['b2c'], cols: ['項目','應收','講師費','其他費用','利潤'] },
        { key: 'biz', label: '企業服務', icon: 'handshake', groups: BIZ_GROUPS, cols: ['項目','應收','成本','利潤'] }
    ];
    let html = '';
    catDefs.forEach(cat => {
        let rows = [];
        cat.groups.forEach(g => {
            products[g].forEach(p => {
                const c = calcCosts(p, g);
                const profCls = c.profit >= 0 ? 'pos' : 'neg';
                if (cat.key === 'biz') {
                    rows.push(`<tr><td>${p.name || '未命名'}</td><td class="num">${c.rev.toLocaleString()}</td><td class="num">${c.totalCost.toLocaleString()}</td><td class="num ${profCls}">${c.profit.toLocaleString()}</td></tr>`);
                } else {
                    const otherCost = c.totalCost - c.lecCost;
                    rows.push(`<tr><td>${p.name || '未命名'}</td><td class="num">${c.rev.toLocaleString()}</td><td class="num">${c.lecCost.toLocaleString()}</td><td class="num">${otherCost.toLocaleString()}</td><td class="num ${profCls}">${c.profit.toLocaleString()}</td></tr>`);
                }
            });
        });
        if (rows.length === 0) return;
        const thHtml = cat.cols.map((col, i) => `<th${i > 0 ? ' class="num"' : ''}>${col}</th>`).join('');
        html += `<div class="overview-group">
            <div class="overview-group-label"><span class="material-symbols-outlined" style="font-size:16px;">${cat.icon}</span> ${cat.label}</div>
            <table class="overview-table"><thead><tr>${thHtml}</tr></thead><tbody>${rows.join('')}</tbody></table>
        </div>`;
    });
    panel.innerHTML = html || '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:.82rem;">尚無項目，請在分類頁籤中新增</div>';
}

// ── Save / Export ──
async function saveAll() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;animation:spin .7s linear infinite;">progress_activity</span> 儲存中…';

    const month = monthSelect.value;
    // 清理 products 移除不需要存的大物件
    const cleanProducts = JSON.parse(JSON.stringify(products));
    ['b2c'].forEach(g => {
        (cleanProducts[g] || []).forEach(p => {
            delete p.ordersList;
        });
    });

    const payload = {
        globalTaxRate: parseFloat(document.getElementById('globalTaxRate').value) || 0,
        globalUsdRate: parseFloat(document.getElementById('globalUsdRate').value) || 32.5,
        products: cleanProducts
    };

    try {
        // 存到 Supabase cost_budgets 表
        const { error } = await db.insert('cost_budgets', {
            month,
            data: payload,
            updated_at: new Date().toISOString()
        }, { onConflict: 'month' });

        if (error) throw new Error(error.message || JSON.stringify(error));

        // 也存 localStorage 做快取
        const all = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        all[month] = payload;
        localStorage.setItem(STORE_KEY, JSON.stringify(all));

        showToast('已儲存至雲端 ✓');
        document.getElementById('autoSaved').innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;color:var(--positive);">cloud_done</span> ${new Date().toLocaleTimeString('zh-TW')} 已儲存`;
    } catch (err) {
        console.error('[save]', err);
        // Supabase 失敗時 fallback 到 localStorage
        const all = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        all[month] = payload;
        localStorage.setItem(STORE_KEY, JSON.stringify(all));
        showToast('雲端儲存失敗，已存到本地 ⚠️');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存';
    }
}

function exportCSV() {
    const month = monthSelect.value;
    const rows = [['類別','名稱','項目','幣別','金額','折合NT$']];
    const labels = { b2b: '企業內訓', b2c: '公開課程', bizMarketing: '行銷代操', bizDev: '系統開發', bizExpert: '專家派遣' };
    GROUPS.forEach(g => {
        products[g].forEach(p => {
            const c = calcCosts(p, g);
            rows.push([labels[g], p.name||'未命名', '實收金額', 'TWD', c.rev, c.rev]);
            rows.push([labels[g], p.name, `稅金 ${c.taxRate}%`, 'TWD', c.tax, c.tax]);
            if (c.isB2c) rows.push([labels[g], p.name, '金流手續費 5%+15', 'TWD', c.payFee, c.payFee]);
            const lCur = p.cur_lecturerFee || 'twd';
            rows.push([labels[g], p.name, '講師費', lCur.toUpperCase(), p.lecturerType==='fixed'?(p.lecturerFee||0):c.lecCost, c.lecCost]);
            if (c.isB2c) {
                ['kol','ads','venue'].forEach(k => {
                    const cur = p[`cur_${k}`]||'twd';
                    rows.push([labels[g], p.name, k, cur.toUpperCase(), p[k]||0, toTwd(p[k]||0, cur)]);
                });
            }
            ['assistant','transport','material'].forEach(k => {
                const cur = p[`cur_${k}`]||'twd';
                rows.push([labels[g], p.name, k, cur.toUpperCase(), p[k]||0, toTwd(p[k]||0, cur)]);
            });
            if (c.isBiz) {
                const cur = p.cur_personnel||'twd';
                rows.push([labels[g], p.name, '人事費', cur.toUpperCase(), p.personnel||0, toTwd(p.personnel||0, cur)]);
            }
        });
    });
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `成本預算_${month}.csv`; a.click();
}

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Load finance settings from system settings
const financeSettings = JSON.parse(localStorage.getItem('finance_settings') || '{}');
document.getElementById('globalTaxRate').value = financeSettings.taxRate ?? 5;
document.getElementById('globalUsdRate').value = financeSettings.usdRate ?? 32.5;

document.getElementById('btnSync').addEventListener('click', () => autoSync(false));
document.getElementById('btnSave').addEventListener('click', () => saveAll());
document.getElementById('btnExport').addEventListener('click', exportCSV);

autoSync(false);
</script>
