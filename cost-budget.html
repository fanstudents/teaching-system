<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本預算 — 數位簡報室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <style>
        :root {
            --accent: #6366f1; --accent-hover: #4f46e5; --accent-light: #eef2ff; --accent-glow: rgba(99,102,241,.12);
            --text: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --border: #e2e8f0; --border-light: #f1f5f9;
            --bg: #f1f5f9; --card: #ffffff;
            --positive: #10b981; --positive-bg: #ecfdf5;
            --negative: #ef4444; --negative-bg: #fef2f2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
            --radius: 14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        /* Page Header — override base.css */
        .admin-main > .page-header {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a5b4fc 100%);
            padding: 24px 32px; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(99,102,241,.2); margin-bottom: 0;
        }
        .admin-main > .page-header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; letter-spacing: -0.01em; }
        .admin-main > .page-header h1 .material-symbols-outlined { color: rgba(255,255,255,.8); }
        .admin-main > .page-header p { font-size: 0.76rem; color: rgba(255,255,255,.7); margin-top: 3px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px 24px; }

        /* Controls */
        .admin-main .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .admin-main .controls select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.82rem; font-family: inherit; background: var(--card); box-shadow: var(--shadow-sm); }
        .admin-main .btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 20px; border: none; border-radius: 10px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; min-height: unset; background: var(--card); color: var(--text-secondary); }
        .admin-main .btn-save { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.3); }
        .admin-main .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.35); background: linear-gradient(135deg, #4f46e5, #6366f1); }
        .admin-main .btn-export { background: var(--card); color: var(--text-secondary); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
        .admin-main .btn-export:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .admin-main .btn-sync { background: var(--text); color: #fff; box-shadow: var(--shadow-sm); }
        .admin-main .btn-sync:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30,41,59,.2); background: #334155; }
        .admin-main .btn-sync:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .admin-main .btn-sm { padding: 5px 12px; font-size: 0.76rem; border-radius: 8px; }
        .admin-main .btn-add { background: var(--card); color: var(--text-secondary); border: 1.5px dashed var(--border); }
        .admin-main .btn-add:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
        .admin-main .btn-del { background: none; color: var(--text-muted); border: none; padding: 4px; cursor: pointer; transition: color .15s; min-height: unset; }
        .admin-main .btn-del:hover { color: var(--negative); }
        .admin-main .auto-saved { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 3px; }

        /* Summary Table */
        .summary-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 22px; box-shadow: var(--shadow-sm); }
        .summary-table th { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); padding: 12px 18px; text-align: right; border-bottom: 1px solid var(--border); background: #fafbfd; }
        .summary-table th:first-child { text-align: left; }
        .summary-table td { font-size: 1rem; font-weight: 700; padding: 14px 18px; text-align: right; font-family: 'Inter', monospace; }
        .summary-table td:first-child { text-align: left; font-family: inherit; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); }
        .summary-table td.pos { color: var(--positive); }
        .summary-table td.neg { color: var(--negative); }
        .summary-table tr:last-child td { border-bottom: none; }

        /* Section */
        .admin-main .section { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; box-shadow: var(--shadow-sm); }
        .admin-main .section-header { padding: 14px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 8px; background: linear-gradient(to bottom, #fafbfd, var(--card)); }
        .admin-main .section-header h3 { font-size: 0.88rem; font-weight: 700; }
        .admin-main .section-body { padding: 0 20px 16px; }

        /* Tabs */
        .admin-main .tab-bar { display: flex; border-bottom: 2px solid var(--border-light); margin-bottom: 20px; gap: 0; background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 0 6px; box-shadow: var(--shadow-sm); }
        .admin-main .tab-btn { padding: 12px 22px; font-size: 0.84rem; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--text-muted); position: relative; font-family: inherit; transition: color .2s; display: flex; align-items: center; gap: 6px; min-height: unset; border-radius: 0; }
        .admin-main .tab-btn:hover { color: var(--text-secondary); background: transparent; }
        .admin-main .tab-btn.active { color: var(--accent); }
        .admin-main .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 6px; right: 6px; height: 2.5px; background: linear-gradient(90deg, var(--accent), #818cf8); border-radius: 3px 3px 0 0; }
        .admin-main .tab-badge { font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; background: var(--border-light); color: var(--text-secondary); font-weight: 700; }
        .admin-main .tab-btn.active .tab-badge { background: var(--accent-light); color: var(--accent); }
        .admin-main .tab-panel { display: none; }
        .admin-main .tab-panel.active { display: block; }

        /* Product table */
        .product-list { width: 100%; }
        .product-table { width: 100%; border-collapse: collapse; }
        .product-table th { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border); }
        .product-table th:first-child { text-align: left; }
        .product-table td { padding: 12px 12px; border-bottom: 1px solid var(--border-light); font-size: 0.82rem; text-align: right; font-family: 'Inter', monospace; }
        .product-table td:first-child { text-align: left; font-family: inherit; }
        .product-table tr.product-header-row { cursor: pointer; transition: all .15s; user-select: none; }
        .product-table tr.product-header-row:hover { background: var(--accent-glow); }
        .product-table tr.product-header-row td { font-weight: 600; }
        .product-table .p-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .product-table .p-name .material-symbols-outlined { font-size: 16px; color: var(--accent); opacity: .6; transition: transform .2s; }
        .product-table tr.open .p-name .material-symbols-outlined { transform: rotate(90deg); opacity: 1; }
        .product-table .pos { color: var(--positive); }
        .product-table .neg { color: var(--negative); }
        .product-table .muted { color: var(--text-muted); font-weight: 400; }
        .product-table tr.product-detail-row { display: none; }
        .product-table tr.product-detail-row.open { display: table-row; }
        .product-table tr.product-detail-row td { padding: 8px 12px 16px 36px; background: #fafbfd; }
        .product-detail-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; }
        .row-chevron { font-size: 18px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
        .admin-main .badge { font-size: 0.64rem; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; background: var(--accent-light); color: var(--accent); margin-left: 6px; line-height: 1.4; }
        .admin-main .badge-order { background: var(--accent-light); color: var(--accent); }
        .admin-main .badge-type { background: var(--border-light); color: var(--text-secondary); }

        /* Session toggle */
        .sess-open > .sess-detail { display: block !important; }
        .sess-open > div:first-child .material-symbols-outlined { transform: rotate(90deg); }

        .field { display: flex; align-items: center; gap: 6px; }
        .field-label { font-size: 0.76rem; color: var(--text-secondary); min-width: 78px; white-space: nowrap; font-weight: 500; }
        .field-input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; transition: border-color .15s, box-shadow .15s; }
        .field-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .field-input.rev-input { border-color: var(--border); background: var(--bg); }
        .field-input.rev-input:focus { border-color: var(--accent); }
        .field-input.rev-readonly { border-color: var(--border); background: var(--border-light); color: var(--text-secondary); cursor: default; }
        .lecturer-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid var(--border-light); margin-top: 4px; }
        .toggle-wrap { display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
        .toggle-opt { padding: 4px 12px; font-size: 0.72rem; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text-muted); transition: all .15s; border: none; font-family: inherit; }
        .toggle-opt.active { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; }
        .cur-toggle { display: inline-flex; border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: 4px; flex-shrink: 0; }
        .cur-opt { padding: 2px 8px; font-size: 0.62rem; font-weight: 700; cursor: pointer; background: var(--card); color: var(--text-muted); border: none; font-family: inherit; transition: all .15s; }
        .cur-opt.active { background: var(--accent); color: #fff; }
        .cur-opt.twd.active { background: var(--text-secondary); color: #fff; }
        .full-row { grid-column: 1 / -1; }
        .date-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid var(--border-light); margin-top: 4px; }
        .type-tag { font-size: 0.68rem; padding: 3px 10px; border-radius: 6px; font-weight: 600; background: var(--border-light); color: var(--text-secondary); }
        .badge-matched { background: var(--positive-bg); color: var(--positive); }
        .badge-unmatched { background: var(--border-light); color: var(--text-muted); }
        .add-row { padding: 10px 6px; }

        /* Order detail mini-table */
        .order-detail-table { width: 100%; grid-column: 1 / -1; margin: 6px 0; font-size: 0.74rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .order-detail-table th { padding: 6px 10px; font-size: .68rem; background: #fafbfd; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
        .order-detail-table td { padding: 5px 10px; border-bottom: 1px solid var(--border-light); }
        .order-detail-table tr:last-child td { border-bottom: none; }
        .order-detail-table .plan-name { font-weight: 600; color: var(--text); }
        .order-detail-table .plan-count { color: var(--text-secondary); font-weight: 600; }
        .order-detail-table .plan-rev { font-weight: 700; color: var(--text); }

        /* Plan pricing */
        .plan-pricing { grid-column: 1 / -1; margin: 4px 0; }
        .plan-pricing-table { width: 100%; font-size: 0.74rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .plan-pricing-table th { padding: 5px 10px; font-size: .68rem; background: #fafbfd; color: var(--text-muted); border-bottom: 1px solid var(--border); text-align: left; }
        .plan-pricing-table td { padding: 5px 10px; border-bottom: 1px solid var(--border-light); }
        .plan-pricing-table tr:last-child td { border-bottom: none; }

        .subsection { margin: 12px 0; border: 1px solid var(--border-light); border-radius: 10px; overflow: hidden; }
        .subsection-header { padding: 10px 14px; background: #fafbfd; font-size: .78rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .subsection-body { padding: 0 14px; }

        /* Month pills */
        .month-pills { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
        .month-pill { padding: 5px 14px; border-radius: 8px; font-size: 0.76rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--card); color: var(--text-secondary); transition: all .2s; user-select: none; box-shadow: var(--shadow-sm); }
        .month-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .month-pill.active { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; border-color: transparent; box-shadow: 0 2px 8px rgba(99,102,241,.3); }

        /* Overview table */
        .overview-group { margin-bottom: 16px; }
        .overview-group-label { font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); padding: 8px 14px; display: flex; align-items: center; gap: 6px; }
        .overview-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .overview-table th { text-align: left; font-size: 0.72rem; font-weight: 600; color: var(--text-muted); padding: 8px 14px; border-bottom: 1px solid var(--border); }
        .overview-table th.num { text-align: right; }
        .overview-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); }
        .overview-table td.num { text-align: right; font-family: 'Inter', monospace; font-weight: 600; }
        .overview-table tr:hover td { background: var(--accent-glow); }
        .overview-table .pos { color: var(--positive); }
        .overview-table .neg { color: var(--negative); }
        .month-tag { font-size: 0.62rem; padding: 2px 7px; border-radius: 4px; background: var(--accent-light); color: var(--accent); margin-left: 4px; font-weight: 600; }

        /* Tools */
        .monthly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tool-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 6px 12px; border-radius: 10px; background: #fafbfd; border: 1px solid var(--border-light); transition: border-color .15s; }
        .tool-row:hover { border-color: var(--accent); }
        .tool-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .tool-name { flex: 1; font-size: 0.78rem; font-weight: 500; }
        .tool-input { width: 110px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; transition: border-color .15s, box-shadow .15s; }
        .tool-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .cost-subtotal { font-size: 0.8rem; font-weight: 700; color: var(--negative); text-align: right; padding: 10px 0; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 12px 22px; border-radius: 12px; font-size: .82rem; transform: translateY(100px); opacity: 0; transition: all .3s; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
        .toast.show { transform: translateY(0); opacity: 1; }
        .pct-label { font-size: 0.72rem; color: var(--text-muted); }
        .shared-row { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; padding-top: 10px; }
        .shared-item { display: flex; align-items: center; gap: 8px; }
        .shared-item label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
        .shared-input { width: 100px; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.82rem; font-family: 'Inter', monospace; text-align: right; transition: border-color .15s, box-shadow .15s; }
        .shared-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .monthly-grid { grid-template-columns: 1fr; } .product-detail-inner { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .summary-table td { font-size: .82rem; padding: 8px 10px; } .page-header { padding: 16px 18px; } .container { padding: 16px 14px; } .tab-btn { padding: 10px 14px; font-size: .78rem; } .summary-bar { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="admin-main">
    <div class="page-header">
        <h1><span class="material-symbols-outlined">calculate</span> 成本預算管理</h1>
        <p>產品收入、成本分析與利潤追蹤</p>
    </div>
    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <div class="month-pills" id="monthPills"></div>
            <input type="hidden" id="monthSelect" value="">
            <button class="btn btn-sync" id="btnSync"><span class="material-symbols-outlined" style="font-size:16px;">sync</span> 重新整理</button>
            <button class="btn btn-save" id="btnSave"><span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存</button>
            <button class="btn btn-export" id="btnExport"><span class="material-symbols-outlined" style="font-size:16px;">download</span> CSV</button>
            <span class="auto-saved" id="autoSaved"></span>
        </div>

        <!-- Summary Table -->
        <table class="summary-table" id="summaryTable">
            <thead><tr><th>指標</th><th>企業內訓</th><th>公開課程</th><th>企業服務</th><th>合計</th></tr></thead>
            <tbody>
                <tr><td>總收入</td><td id="b2bRev">0</td><td id="b2cRev">0</td><td id="bizRev">0</td><td id="totalRevenue">0</td></tr>
                <tr><td>總成本</td><td id="b2bCost">0</td><td id="b2cCost">0</td><td id="bizCost">0</td><td id="totalCost" class="neg">0</td></tr>
                <tr><td>淨利潤</td><td id="b2bProfit">0</td><td id="b2cProfit">0</td><td id="bizProfit">0</td><td id="netProfit">0</td></tr>
                <tr><td>利潤率</td><td id="b2bMargin">-</td><td id="b2cMargin">-</td><td id="bizMargin">-</td><td id="profitMargin">0%</td></tr>
            </tbody>
        </table>

        <!-- Settings loaded from system settings -->
        <input type="hidden" id="globalTaxRate" value="5">
        <input type="hidden" id="globalUsdRate" value="32.5">

        <!-- TABS -->
        <div class="section">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="overview"><span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span> 月份總覽</button>
                <button class="tab-btn" data-tab="b2b"><span class="material-symbols-outlined" style="font-size:16px;">business</span> 企業內訓 <span class="tab-badge" id="b2bCount">0</span></button>
                <button class="tab-btn" data-tab="b2c"><span class="material-symbols-outlined" style="font-size:16px;">school</span> 公開課程 <span class="tab-badge" id="b2cCount">0</span></button>
                <button class="tab-btn" data-tab="biz"><span class="material-symbols-outlined" style="font-size:16px;">handshake</span> 企業服務 <span class="tab-badge" id="bizCount">0</span></button>
            </div>

            <!-- Monthly Overview Panel -->
            <div class="tab-panel active" id="panel-overview">
                <div class="section-body" id="overviewPanel" style="padding:14px 0;"></div>
            </div>

            <!-- B2B Panel -->
            <div class="tab-panel" id="panel-b2b">
                <div class="section-body">
                    <div class="product-list" id="b2bProducts"></div>
                    <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('b2b')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                    <div class="cost-subtotal"><span>企業內訓合計</span><span>收入 <span id="b2bRevTotal" style="color:var(--accent);">NT$ 0</span> ｜ 成本 <span id="b2bCostTotal">NT$ 0</span> ｜ 利潤 <span id="b2bProfitTotal" style="color:var(--positive);">NT$ 0</span></span></div>
                </div>
            </div>

            <!-- B2C Panel -->
            <div class="tab-panel" id="panel-b2c">
                <div class="section-body">
                    <div class="product-list" id="b2cProducts"></div>
                    <div class="add-row"><button class="btn btn-sm btn-add" onclick="addProduct('b2c')"><span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增</button></div>
                    <div class="cost-subtotal"><span>公開課程合計</span><span>收入 <span id="b2cRevTotal" style="color:var(--accent);">NT$ 0</span> ｜ 成本 <span id="b2cCostTotal">NT$ 0</span> ｜ 利潤 <span id="b2cProfitTotal" style="color:var(--positive);">NT$ 0</span></span></div>
                </div>
            </div>

            <!-- Biz Services Panel -->
            <div class="tab-panel" id="panel-biz">

<script type="module">
import { db } from './scripts/supabase.js';

const SUPABASE_URL = 'https://wsaknnhjgiqmkendeyrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzYWtubmhqZ2lxbWtlbmRleXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTI4MTIsImV4cCI6MjA4NzY4ODgxMn0.1j-4D9Kw0vqhVcTWgU7ABTJ_mO6aN4IB72Ojof8Yfko';

const TEACHIFY_API = 'https://teachify.io/admin/graphql';
const TEACHIFY_KEY = 'vsXiCQXFlNs95GjiRHW4Y3mwc9L6_oj6VdRiTj-3ymE';
const SERVICE_OWNER_ID = '60182dbe-09ea-4e92-b8d7-ed2c24b81eb9';

const GROUPS = ['b2b', 'b2c', 'bizMarketing', 'bizDev', 'bizExpert'];
const BIZ_GROUPS = ['bizMarketing', 'bizDev', 'bizExpert'];
let products = { b2b: [], b2c: [], bizMarketing: [], bizDev: [], bizExpert: [] };
let ordersByCourseName = {};
// B2C 訂單明細：{ 'courseName': [ {course_name, plan_name, amount, payment_time, student_name, student_email}, ... ] }
let b2cOrderDetails = {};
let nextId = 1;
const STORE_KEY = 'tbr_cost_budget_v5';

// ── Month Selector ──
const monthSelect = document.getElementById('monthSelect');
const monthPills = document.getElementById('monthPills');
const now = new Date();
const allMonths = [];
for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

}
// Render pills
let lastYear = null;
allMonths.forEach((m, i) => {
    if (m.year !== lastYear) {
        const yearSpan = document.createElement('span');
        yearSpan.style.cssText = 'font-size:.68rem;color:var(--text-muted);padding:4px 2px;font-weight:600;';
        yearSpan.textContent = m.year;
        monthPills.appendChild(yearSpan);
        lastYear = m.year;
    }
    const pill = document.createElement('span');
    pill.className = 'month-pill' + (i === 0 ? ' active' : '');

        const actives = monthPills.querySelectorAll('.month-pill.active');
        if (actives.length === 0) { pill.classList.add('active'); return; }

        autoSync(false);
    });

});
monthSelect.value = allMonths[0].val;

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn => {

// ── Toggle row ──
window.toggleRow = function(el) {
    const headerRow = el.closest('tr.product-header-row');
    headerRow.classList.toggle('open');
    const detailRow = headerRow.nextElementSibling;
    if (detailRow && detailRow.classList.contains('product-detail-row')) {
        detailRow.classList.toggle('open');
    }
};

// ── 模糊比對：找出 orders 的 course_name 屬於哪個 Teachify 課程 ──
function fuzzyMatchCourse(orderCourseName, teachifyCourses) {
    if (!orderCourseName) return null;
    const lcName = orderCourseName.toLowerCase();
    // 1. 完全一致
    for (const c of teachifyCourses) {
        if (c.name === orderCourseName) return c;
    }
    // 2. 訂單 course_name 包含 Teachify 課程名（或反向）
    for (const c of teachifyCourses) {
        const lcCourse = (c.name || '').toLowerCase();
        if (lcName.includes(lcCourse) || lcCourse.includes(lcName)) return c;
    }
    // 3. plan name 比對
    for (const c of teachifyCourses) {
        for (const p of (c.plans || [])) {
            if ((p.name || '').toLowerCase().includes(lcName) || lcName.includes((p.name || '').toLowerCase())) return c;
        }
    }
    return null;
}

// ══ Auto Sync ══
async function autoSync(silent = false) {
    const btn = document.getElementById('btnSync');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;animation:spin .7s linear infinite;">progress_activity</span> 同步中…';

    const month = monthSelect.value;
    const [year, mon] = month.split('-').map(Number);
    const monthStart = `${year}-${String(mon).padStart(2,'0')}-01`;
    const nextMon = mon === 12 ? `${year+1}-01-01` : `${year}-${String(mon+1).padStart(2,'0')}-01`;

    try {
        const [projResult, orgResult, sessionsResult, teachifyResult, ordersResult, savedResult] = await Promise.all([
            db.select('projects', { select: 'id,name,organization_id', filter: { owner_id: `eq.${SERVICE_OWNER_ID}` }, order: 'created_at.desc', limit: 100 }),
            db.select('organizations', { select: 'id,name', limit: 200 }),
            db.select('project_sessions', { select: 'id,project_id,session_code,date,time,venue,status', limit: 500 }),
            fetch(TEACHIFY_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Teachify-API-Key': TEACHIFY_KEY }, body: JSON.stringify({ query: `{ courses { nodes { id name slug plans { id name amount } } } }` }) }).then(r => r.json()).catch(() => null),
            db.select('orders', {
                select: 'course_name,plan_name,amount,payment_status,payment_time,student_name,student_email,coupon_code',
                filter: { payment_status: 'eq.Paid', payment_time: `gte.${monthStart}` },
                order: 'payment_time.desc', limit: 2000
            }),
            fetch(SUPABASE_URL + '/rest/v1/cost_budgets?month=eq.' + month + '&limit=1', {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
            }).then(r => r.json()).catch(() => null)
        ]);

        const orgMap = {};
        (orgResult.data || []).forEach(o => { orgMap[o.id] = o.name; });

        // ── 建立 B2B project → sessions 對應 ──
        const projSessionsMap = {}; // project_id → [{id, date, time, venue, session_code}]
        (sessionsResult.data || []).forEach(s => {
            if (!projSessionsMap[s.project_id]) projSessionsMap[s.project_id] = [];
            projSessionsMap[s.project_id].push(s);
        });

        // ── 讀取已存檔的成本資料 (Supabase 優先，localStorage fallback) ──
        let saved = null;
        if (Array.isArray(savedResult) && savedResult.length > 0) {
            saved = savedResult[0].data;
        } else if (savedResult && savedResult.data && savedResult.data.length > 0) {
            saved = savedResult.data[0].data;
        }
        if (!saved) saved = getSavedMonth(month);

        // ── 過濾當月訂單 ──
        const monthOrders = (ordersResult.data || []).filter(o => o.payment_time && o.payment_time >= monthStart && o.payment_time < nextMon);
        const teachifyCourses = teachifyResult?.data?.courses?.nodes || [];

        // ── 建立 B2B 專案名稱 set（用來排除非公開課程的訂單）──
        const b2bProjectNames = new Set();
        (projResult.data || []).forEach(proj => { if (proj.name) b2bProjectNames.add(proj.name); });

        // ── 處理 B2B 訂單對應 ──
        ordersByCourseName = {};
        monthOrders.forEach(o => {
            const n = o.course_name || '未知';
            if (!ordersByCourseName[n]) ordersByCourseName[n] = { count: 0, revenue: 0 };
            ordersByCourseName[n].count++;
            ordersByCourseName[n].revenue += (o.amount || 0);
        });

        // ── 處理 B2C：以訂單為主，配對 Teachify 課程 ──
        // 把 orders 歸組到 Teachify 課程下（或未配對組）
        const courseOrderMap = {}; // teachifyCourseId → { course, orders: [], revenue, count }
        const unmatchedOrders = []; // 沒有配對到任何 Teachify 課程的訂單
        b2cOrderDetails = {};

        monthOrders.forEach(order => {
            const courseName = order.course_name || '未知';
            // 嘗試配對 Teachify 課程
            const matched = fuzzyMatchCourse(courseName, teachifyCourses);
            if (matched) {
                const key = matched.id;
                if (!courseOrderMap[key]) {
                    courseOrderMap[key] = {
                        course: matched,
                        orders: [],
                        revenue: 0,
                        count: 0,
                        planBreakdown: {} // plan_name → { count, revenue }
                    };
                }
                courseOrderMap[key].orders.push(order);
                courseOrderMap[key].revenue += (order.amount || 0);
                courseOrderMap[key].count++;
                const planKey = order.plan_name || order.course_name || '預設方案';
                if (!courseOrderMap[key].planBreakdown[planKey]) {
                    courseOrderMap[key].planBreakdown[planKey] = { count: 0, revenue: 0 };
                }
                courseOrderMap[key].planBreakdown[planKey].count++;
                courseOrderMap[key].planBreakdown[planKey].revenue += (order.amount || 0);
            } else {
                // 只有不在 B2B 專案名稱裡的才算公開課程
                if (!b2bProjectNames.has(courseName)) {
                    unmatchedOrders.push(order);
                }
            }
        });

        // 也加上有課程但當月沒訂單的 Teachify 課程（讓使用者仍可輸入成本）
        teachifyCourses.forEach(c => {
            if (!courseOrderMap[c.id]) {
                courseOrderMap[c.id] = { course: c, orders: [], revenue: 0, count: 0, planBreakdown: {} };
            }
        });

        // 把未配對訂單按 course_name 群組化
        const unmatchedGrouped = {};
        unmatchedOrders.forEach(o => {
            const n = o.course_name || '未知';
            if (!unmatchedGrouped[n]) unmatchedGrouped[n] = { orders: [], revenue: 0, count: 0, planBreakdown: {} };
            unmatchedGrouped[n].orders.push(o);
            unmatchedGrouped[n].revenue += (o.amount || 0);
            unmatchedGrouped[n].count++;
            const planKey = o.plan_name || o.course_name || '預設方案';
            if (!unmatchedGrouped[n].planBreakdown[planKey]) {
                unmatchedGrouped[n].planBreakdown[planKey] = { count: 0, revenue: 0 };
            }
            unmatchedGrouped[n].planBreakdown[planKey].count++;
            unmatchedGrouped[n].planBreakdown[planKey].revenue += (o.amount || 0);
        });

        const makeSavedMap = (list) => { const m = {}; (list || []).forEach(p => { m[p.sourceId || p.name] = p; }); return m; };
        const sB2b = makeSavedMap(saved?.products?.b2b);
        const sB2c = makeSavedMap(saved?.products?.b2c);

        // ── B2B: 客戶名稱＋場次 ──
        const newB2b = [];
        (projResult.data || []).forEach(proj => {
            const courseName = proj.name || '未命名';
            const clientName = (proj.organization_id && orgMap[proj.organization_id]) || '';
            const e = sB2b[proj.id] || sB2b[courseName];
            const oi = ordersByCourseName[courseName] || { count: 0, revenue: 0 };
            const p = mergeProduct(nextId++, clientName || courseName, courseName, proj.id, null, e, oi);
            // B2B 場次：從 project_sessions 自動建立，合併已存檔
            const projSessions = projSessionsMap[proj.id] || [];
            const savedSessions = e?.sessions || [];
            const savedSessMap = {};
            savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
            if (projSessions.length > 0) {
                p.sessions = projSessions.map(ps => {
                    const es = savedSessMap[ps.id] || savedSessMap[ps.session_code] || {};
                    return makeSession(ps.id, `${ps.date || ''} ${ps.venue || ps.session_code}`.trim(), es);
                });
            } else if (savedSessions.length > 0) {
                p.sessions = savedSessions.map(s => makeSession(s.sessionId, s.name, s));
            }
            newB2b.push(p);
        });

        // ── B2C: 以訂單為核心，配對 Teachify 課程 ──
        const newB2c = [];
        // 有配對到 Teachify 的
        Object.entries(courseOrderMap)
            .sort((a,b) => b[1].revenue - a[1].revenue)
            .forEach(([courseId, data]) => {
                const name = data.course.name || '未命名';
                const e = sB2c[courseId] || sB2c[name];
                const oi = { count: data.count, revenue: data.revenue };
                const p = mergeProduct(nextId++, name, null, courseId, data.course.slug, e, oi);
                p.revenue = data.revenue;
                p.orderRevenue = data.revenue;
                p.orderCount = data.count;
                p.planBreakdown = data.planBreakdown;
                p.matchedTeachify = true;
                p.ordersList = data.orders;
                p.teachifyPlans = data.course.plans || [];
                p.estimatedRevenue = e?.estimatedRevenue || 0;
                b2cOrderDetails[p.id] = data.orders;
                // B2C 場次：從 plan breakdown 自動建立
                const savedSessions = e?.sessions || [];
                const savedSessMap = {};
                savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
                p.sessions = Object.entries(data.planBreakdown).map(([planName, info]) => {
                    const es = savedSessMap[planName] || {};
                    const s = makeSession(planName, planName, es);
                    s.orderCount = info.count;
                    s.orderRevenue = info.revenue;
                    return s;
                });
                newB2c.push(p);
            });

        // 未配對的訂單群組
        Object.entries(unmatchedGrouped)
            .sort((a,b) => b[1].revenue - a[1].revenue)
            .forEach(([courseName, data]) => {
                const e = sB2c[courseName];
                const oi = { count: data.count, revenue: data.revenue };
                const p = mergeProduct(nextId++, courseName, null, `unmatched_${courseName}`, null, e, oi);
                p.revenue = data.revenue;
                p.orderRevenue = data.revenue;
                p.orderCount = data.count;
                p.planBreakdown = data.planBreakdown;
                p.matchedTeachify = false;
                p.ordersList = data.orders;
                b2cOrderDetails[p.id] = data.orders;
                const savedSessions = e?.sessions || [];
                const savedSessMap = {};
                savedSessions.forEach(s => { savedSessMap[s.sessionId || s.name] = s; });
                p.sessions = Object.entries(data.planBreakdown).map(([planName, info]) => {
                    const es = savedSessMap[planName] || {};
                    const s = makeSession(planName, planName, es);
                    s.orderCount = info.count;
                    s.orderRevenue = info.revenue;
                    return s;
                });
                newB2c.push(p);
            });

        products.b2b = newB2b;
        products.b2c = newB2c;
        // Biz: restore from saved only
        BIZ_GROUPS.forEach(g => { products[g] = (saved?.products?.[g] || []).map(p => ({ ...p, id: nextId++ })); });

        if (saved) {
            document.getElementById('globalTaxRate').value = saved.globalTaxRate ?? 5;
            document.getElementById('globalUsdRate').value = saved.globalUsdRate ?? 32.5;
            if (saved.tools) Object.entries(saved.tools).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.value = val || ''; });
        }

        renderAll();
        const totalB2cOrders = Object.values(courseOrderMap).reduce((s,d) => s + d.count, 0) + unmatchedOrders.length;
        if (!silent) showToast(`已同步 ${newB2b.length} 專案、${newB2c.length} 課程、${totalB2cOrders} 筆公開課程訂單`);
        document.getElementById('autoSaved').innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> ${new Date().toLocaleTimeString('zh-TW')} 已同步`;
    } catch (err) {
        console.error('[sync]', err);
        if (!silent) showToast('同步失敗: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">sync</span> 重新整理';
    }
}

function mergeProduct(id, name, courseName, sourceId, sourceSlug, existing, orderInfo) {
    return {
        id, name, courseName: courseName || '', sourceId, sourceSlug,
        revenue: existing?.revenue || orderInfo.revenue || 0,
        orderCount: orderInfo.count, orderRevenue: orderInfo.revenue,
        lecturerType: existing?.lecturerType || 'fixed',
        lecturerFee: existing?.lecturerFee || 0, lecturerPercent: existing?.lecturerPercent || 0,
        kol: existing?.kol || 0, ads: existing?.ads || 0,
        venue: existing?.venue || 0, assistant: existing?.assistant || 0,
        transport: existing?.transport || 0, material: existing?.material || 0, personnel: existing?.personnel || 0,
        cur_lecturerFee: existing?.cur_lecturerFee || 'twd',
        cur_kol: existing?.cur_kol || 'twd', cur_ads: existing?.cur_ads || 'twd',
        cur_venue: existing?.cur_venue || 'twd', cur_assistant: existing?.cur_assistant || 'twd',
        cur_transport: existing?.cur_transport || 'twd', cur_material: existing?.cur_material || 'twd',
        cur_personnel: existing?.cur_personnel || 'twd',
        sessions: existing?.sessions || [] // 場次級別成本
    };
}

function makeSession(sessionId, name, existing) {
    return {
        sessionId: sessionId || '', name: name || '未命名場次',
        revenue: existing?.revenue || 0, cur_revenue: existing?.cur_revenue || 'twd',
        venue: existing?.venue || 0, lecturerFee: existing?.lecturerFee || 0,
        assistant: existing?.assistant || 0, transport: existing?.transport || 0,
        material: existing?.material || 0,
        cur_venue: existing?.cur_venue || 'twd', cur_lecturerFee: existing?.cur_lecturerFee || 'twd',
        cur_assistant: existing?.cur_assistant || 'twd', cur_transport: existing?.cur_transport || 'twd',
        cur_material: existing?.cur_material || 'twd',
        orderCount: existing?.orderCount || 0, orderRevenue: existing?.orderRevenue || 0
    };
}

function getSavedMonth(month) {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}')[month] || null; } catch { return null; }
}
// ── Auto-save (debounced 3s) ──
let _autoSaveTimer = null;
function scheduleAutoSave() {
    if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(async () => {
        await saveAll();
        showToast('已自動儲存');
    }, 3000);
}

// ── Product CRUD ──
window.addProduct = function(group) {
    const isBizGroup = BIZ_GROUPS.includes(group);
    products[group].push({
        id: nextId++, name: '', courseName: '', revenue: 0,
        lecturerType: 'fixed', lecturerFee: 0, lecturerPercent: 0,
        kol: 0, ads: 0, venue: 0, assistant: 0, transport: 0, material: 0, personnel: 0,
        cur_lecturerFee:'twd', cur_kol:'twd', cur_ads:'twd', cur_venue:'twd',
        cur_assistant:'twd', cur_transport:'twd', cur_material:'twd', cur_personnel:'twd',
        revenueType: isBizGroup ? 'onetime' : '', serviceDate: '',
        sessions: []
    });
    renderAll();
    scheduleAutoSave();
    // Auto-expand the newly added row and focus name input
    const container = document.getElementById(group + 'Products');
    const rows = container.querySelectorAll('tr.product-header-row');
    const lastRow = rows[rows.length - 1];
    if (lastRow) {
        lastRow.classList.add('open');
        const detailRow = lastRow.nextElementSibling;
        if (detailRow) detailRow.classList.add('open');
        setTimeout(() => {
            const nameInput = detailRow?.querySelector('input[type="text"]');
            if (nameInput) nameInput.focus();
        }, 50);
    }
};
window.removeProduct = function(group, id) { products[group] = products[group].filter(p => p.id !== id); renderAll(); scheduleAutoSave(); };
window.addSession = function(group, productId) {
    const p = products[group].find(p => p.id === productId);
    if (!p) return;
    if (!p.sessions) p.sessions = [];
    p.sessions.push(makeSession('', '新場次', {}));
    renderAll();
    scheduleAutoSave();
};
window.removeSession = function(group, productId, idx) {
    const p = products[group].find(p => p.id === productId);
    if (p && p.sessions) { p.sessions.splice(idx, 1); renderAll(); scheduleAutoSave(); }
};
window.updateSession = function(group, productId, idx, field, value) {
    const p = products[group].find(p => p.id === productId);
    if (!p || !p.sessions || !p.sessions[idx]) return;
    const strFields = ['name','cur_venue','cur_lecturerFee','cur_assistant','cur_transport','cur_material','cur_revenue'];
    p.sessions[idx][field] = strFields.includes(field) ? value : (parseFloat(value) || 0);
    recalculate();
    scheduleAutoSave();
};
window.toggleSessionCurrency = function(group, productId, idx, field) {
    const p = products[group].find(pp => pp.id === productId);
    if (!p || !p.sessions || !p.sessions[idx]) return;
    const curField = `cur_${field}`;
    p.sessions[idx][curField] = p.sessions[idx][curField] === 'usd' ? 'twd' : 'usd';
    renderAll();
    scheduleAutoSave();
};
window.toggleLecturerType = function(group, id, type) { const p = products[group].find(p => p.id === id); if (p) { p.lecturerType = type; renderAll(); scheduleAutoSave(); } };
window.updateProduct = function(group, id, field, value) {
    const p = products[group].find(p => p.id === id);
    if (!p) return;
    const strFields = ['name','courseName','revenueType','serviceDate','cur_lecturerFee','cur_kol','cur_ads','cur_venue','cur_assistant','cur_transport','cur_material','cur_personnel'];
    p[field] = strFields.includes(field) ? value : (parseFloat(value) || 0);
    recalculate();
    scheduleAutoSave();
};
window.toggleCurrency = function(group, id, field) {
    const p = products[group].find(p => p.id === id);
    if (!p) return;
    const curField = `cur_${field}`;
    p[curField] = p[curField] === 'usd' ? 'twd' : 'usd';
    renderAll();
    scheduleAutoSave();
};
function getUsdRate() {
    return parseFloat(document.getElementById('globalUsdRate')?.value) || 32.5;
}
function toTwd(amount, currency) {
    return currency === 'usd' ? Math.round(amount * getUsdRate()) : amount;
}

function calcCosts(p, group) {
    const taxRate = parseFloat(document.getElementById('globalTaxRate').value) || 0;
    const isB2c = group === 'b2c';
    const isB2b = group === 'b2b';
    const isBiz = BIZ_GROUPS.includes(group);
    // B2B with sessions: sum session revenues
    let sessionRevTotal = 0;
    if (isB2b && (p.sessions || []).length > 0) {
        (p.sessions || []).forEach(s => { sessionRevTotal += toTwd(s.revenue || 0, s.cur_revenue || 'twd'); });
    }
    const baseRev = (p.revenue || 0) > 0 ? (p.revenue || 0) : (parseFloat(p.estimatedRevenue) || 0);
    const rev = (isB2b && sessionRevTotal > 0) ? sessionRevTotal : baseRev;
    const tax = Math.round(rev * taxRate / 100);
    const orderCount = p.orderCount || (isB2c && rev > 0 ? 1 : 0);
    const payFee = isB2c ? Math.round(rev * 0.05 + orderCount * 15) : 0;

    // 講師費（課程級，若用分潤）
    const lecCostCourse = p.lecturerType === 'percent' ? Math.round(rev * (p.lecturerPercent || 0) / 100) : 0;
    // 課程級共享成本
    const sharedCosts = (isB2c ? (toTwd(p.kol||0, p.cur_kol) + toTwd(p.ads||0, p.cur_ads)) : 0)
                      + (isBiz ? toTwd(p.personnel||0, p.cur_personnel) : 0);

    // 場次級成本加總
    let sessionCosts = 0;
    (p.sessions || []).forEach(s => {
        sessionCosts += toTwd(s.venue||0, s.cur_venue)
                     + toTwd(s.lecturerFee||0, s.cur_lecturerFee)
                     + toTwd(s.assistant||0, s.cur_assistant)
                     + toTwd(s.transport||0, s.cur_transport)
                     + toTwd(s.material||0, s.cur_material);
    });

    // 若沒有場次，就用課程級的費用（向下相容）
    const hasSessions = (p.sessions || []).length > 0;
    const fallbackCosts = !hasSessions
        ? (p.lecturerType === 'fixed' ? toTwd(p.lecturerFee||0, p.cur_lecturerFee) : 0)
          + toTwd(p.venue||0, p.cur_venue) + toTwd(p.assistant||0, p.cur_assistant)
          + toTwd(p.transport||0, p.cur_transport) + toTwd(p.material||0, p.cur_material)
        : 0;

    const totalCost = tax + payFee + lecCostCourse + sharedCosts + sessionCosts + fallbackCosts;
    return { rev, tax, payFee, lecCost: lecCostCourse + (hasSessions ? 0 : (p.lecturerType==='fixed'?toTwd(p.lecturerFee||0,p.cur_lecturerFee):0)),
             sharedCosts, sessionCosts, totalCost, profit: rev - totalCost, taxRate, orderCount, isB2c, isBiz, hasSessions };
}

// ── Render ──
function renderAll() { GROUPS.forEach(g => renderProducts(g)); recalculate(); }

function renderProducts(group) {
    const container = document.getElementById(group + 'Products');
    const list = products[group];
    const isB2b = group === 'b2b';
    const isBiz = BIZ_GROUPS.includes(group);
    const isB2c = group === 'b2c';

    if (isBiz) {
        document.getElementById('bizCount').textContent = BIZ_GROUPS.reduce(function(s,g){ return s + products[g].length; }, 0);
    } else {
        var countEl = document.getElementById((isBiz ? 'biz' : group) + 'Count');
        if (countEl) countEl.textContent = list.length;
    }

    if (!list.length) {
        container.innerHTML = '<div style="text-align:center;padding:16px;color:#94a3b8;font-size:.8rem;">尚無項目</div>';
        return;
    }

    // Table headers based on type
    var thHtml;
    if (isBiz) {
        thHtml = '<th>專案名稱</th><th>應收</th><th>成本</th><th>利潤</th><th style="width:30px;"></th>';
    } else {
        thHtml = '<th>專案名稱</th><th>訂單</th><th>應收</th><th>講師費</th><th>其他費用</th><th>利潤</th><th style="width:30px;"></th>';
    }

    var rows = list.map(function(p) { return renderProductRow(p, group, isB2b, isBiz); }).join('');
    container.innerHTML = '<table class="product-table"><thead><tr>' + thHtml + '</tr></thead><tbody>' + rows + '</tbody></table>';
}

function renderCurToggle(type, group, id, idxOrField, field) {
    // type: 'product' or 'session'
    var cur, onclick1, onclick2;
    if (type === 'session') {
        var sess = null;
        var prod = products[group].find(function(pp){ return pp.id === id; });
        if (prod && prod.sessions) sess = prod.sessions[idxOrField];
        cur = (sess && sess['cur_' + field]) || 'twd';
        onclick1 = "event.stopPropagation();toggleSessionCurrency('" + group + "'," + id + "," + idxOrField + ",'" + field + "')";
        onclick2 = onclick1;
    } else {
        var prod2 = products[group].find(function(pp){ return pp.id === id; });
        cur = (prod2 && prod2['cur_' + idxOrField]) || 'twd';
        onclick1 = "event.stopPropagation();toggleCurrency('" + group + "'," + id + ",'" + idxOrField + "')";
        onclick2 = onclick1;
    }
    return '<div class="cur-toggle">' +
        '<button class="cur-opt twd ' + (cur==='twd'?'active':'') + '" onclick="' + onclick1 + '">NT$</button>' +
        '<button class="cur-opt ' + (cur==='usd'?'active':'') + '" onclick="' + onclick2 + '">US$</button>' +
    '</div>';
}

function renderCurLabel(amount, currency) {
    if (currency === 'usd') {
        return '<span class="pct-label">≈ NT$ ' + toTwd(amount || 0, 'usd').toLocaleString() + '</span>';
    }
    return '';
}

function renderSessionRow(s, si, group, productId) {
    var sessCost = toTwd(s.venue||0,s.cur_venue) + toTwd(s.lecturerFee||0,s.cur_lecturerFee) + toTwd(s.assistant||0,s.cur_assistant) + toTwd(s.transport||0,s.cur_transport) + toTwd(s.material||0,s.cur_material);
    var sessRev = toTwd(s.revenue||0, s.cur_revenue||'twd');
    var sessProfit = sessRev - sessCost;
    var isB2b = group === 'b2b';
    var g = group, pid = productId;
    var cb = function(f){ return renderCurToggle('session', g, pid, si, f); };
    var cl = function(f){ return renderCurLabel(s[f], s['cur_'+f]); };
    var inp = function(f, label){
        return '<div class="field"><span class="field-label">' + label + '</span>' +
            '<input type="number" class="field-input" value="' + (s[f]||'') + '" placeholder="0" oninput="updateSession(\'' + g + '\',' + pid + ',' + si + ',\'' + f + '\',this.value)">' +
            cb(f) + cl(f) + '</div>';
    };

    // Session header summary
    var headerRight = '';
    if (isB2b && sessRev > 0) {
        headerRight += '<span style="font-size:.72rem;color:var(--accent);font-weight:600;margin-right:8px;">收入 ' + sessRev.toLocaleString() + '</span>';
    }
    headerRight += '<span style="font-size:.72rem;color:var(--negative);font-weight:600;">成本 ' + sessCost.toLocaleString() + '</span>';
    if (isB2b && sessRev > 0) {
        headerRight += '<span style="font-size:.72rem;font-weight:600;margin-left:8px;color:' + (sessProfit >= 0 ? 'var(--positive)' : 'var(--negative)') + ';">利潤 ' + sessProfit.toLocaleString() + '</span>';
    }

    // Revenue input (B2B only)
    var revInput = isB2b ? inp('revenue', '場次收入') : '';

    return '<div style="border:1px solid var(--border);border-radius:8px;margin:4px 0;">' +
        '<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);cursor:pointer;border-radius:8px 8px 0 0;" onclick="this.parentElement.classList.toggle(\'sess-open\')">' +
            '<span class="material-symbols-outlined" style="font-size:16px;color:var(--text-muted);">chevron_right</span>' +
            '<span style="font-size:.78rem;font-weight:600;">' + (s.name || '場次 '+(si+1)) + '</span>' +
            '<div style="margin-left:auto;display:flex;gap:4px;align-items:center;">' +
                headerRight +
                '<button class="btn-del" onclick="event.stopPropagation();removeSession(\'' + g + '\',' + pid + ',' + si + ')" title="刪除場次"><span class="material-symbols-outlined" style="font-size:14px;">close</span></button>' +
            '</div>' +
        '</div>' +
        '<div style="display:none;padding:8px 12px;" class="sess-detail">' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;">' +
                '<div class="field"><span class="field-label">場次名稱</span><input type="text" class="field-input" value="' + (s.name||'') + '" oninput="updateSession(\'' + g + '\',' + pid + ',' + si + ',\'name\',this.value)"></div>' +
                revInput +
                inp('venue', '場地費') +
                inp('lecturerFee', '講師費') +
                inp('assistant', '助教費') +
                inp('transport', '車馬費') +
                inp('material', '教材費') +
            '</div>' +
        '</div>' +
    '</div>';
}

            planTable +
            '<div class="field"><span class="field-label" style="color:var(--text-muted);">稅金 ' + c.taxRate + '%</span><div style="flex:1;text-align:right;font-size:.82rem;font-weight:600;color:var(--text-muted);">NT$ ' + c.tax.toLocaleString() + '</div></div>' +
            (c.isB2c ? '<div class="field"><span class="field-label" style="color:var(--text-muted);">金流 5%+15/筆</span><div style="flex:1;text-align:right;font-size:.82rem;font-weight:600;color:var(--text-muted);">NT$ ' + c.payFee.toLocaleString() + ' (' + c.orderCount + '筆)</div></div>' : '') +
            lecturerRow +
            sharedFields +
            costSection +
        '</div></td></tr>';
}
// ── Recalculate ──
function recalculate() {
    let grandRev = 0, grandCost = 0;

    // Per-category subtotals
    const catGroups = { b2b: ['b2b'], b2c: ['b2c'], biz: BIZ_GROUPS };
    Object.entries(catGroups).forEach(([cat, groups]) => {
        let cRev = 0, cCost = 0;
        groups.forEach(g => {
            products[g].forEach(p => {
                const c = calcCosts(p, g);
                cRev += c.rev; cCost += c.totalCost;
            });
        });
        const cProfit = cRev - cCost;
        const cMargin = cRev > 0 ? (cProfit / cRev * 100) : 0;
        document.getElementById(`${cat}RevTotal`).textContent = `NT$ ${cRev.toLocaleString()}`;
        document.getElementById(`${cat}CostTotal`).textContent = `NT$ ${cCost.toLocaleString()}`;
        document.getElementById(`${cat}ProfitTotal`).textContent = `NT$ ${cProfit.toLocaleString()}`;
        // Summary table cells
        document.getElementById(`${cat}Rev`).textContent = cRev.toLocaleString();
        document.getElementById(`${cat}Cost`).textContent = cCost.toLocaleString();
        const profEl = document.getElementById(`${cat}Profit`);
        profEl.textContent = cProfit.toLocaleString();
        profEl.className = cProfit >= 0 ? 'pos' : 'neg';
        document.getElementById(`${cat}Margin`).textContent = cRev > 0 ? cMargin.toFixed(1) + '%' : '-';
        grandRev += cRev; grandCost += cCost;
    });

    const netProfit = grandRev - grandCost;
    const margin = grandRev > 0 ? (netProfit / grandRev * 100) : 0;
    document.getElementById('totalRevenue').textContent = grandRev.toLocaleString();
    document.getElementById('totalCost').textContent = grandCost.toLocaleString();
    const npe = document.getElementById('netProfit');
    npe.textContent = netProfit.toLocaleString();
    npe.className = netProfit >= 0 ? 'pos' : 'neg';
    document.getElementById('profitMargin').textContent = margin.toFixed(1) + '%';

    // Cache current month data
    monthlyCache[monthSelect.value] = JSON.parse(JSON.stringify(products));
    renderOverview();
}

// ── Monthly Cache for multi-month pivot ──
const monthlyCache = {};

function renderOverview() {
    const panel = document.getElementById('overviewPanel');
    const selectedMonths = [...document.querySelectorAll('.month-pill.active')].map(p => p.dataset.month).sort();
    if (selectedMonths.length === 0) { panel.innerHTML = ''; return; }

    // Collect all projects across selected months
    const allProjects = new Map(); // name → { group, months: { month → {rev, cost, profit} } }
    selectedMonths.forEach(month => {
        const prods = monthlyCache[month] || (month === monthSelect.value ? products : null);
        if (!prods) return;
        GROUPS.forEach(g => {
            (prods[g] || []).forEach(p => {
                const key = p.name || '未命名';
                if (!allProjects.has(key)) allProjects.set(key, { group: g, months: {} });
                const c = calcCostsFromProduct(p, g);
                allProjects.get(key).months[month] = { rev: c.rev, cost: c.totalCost, profit: c.profit };
            });
        });
    });

    if (allProjects.size === 0) {
        panel.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:.82rem;">尚無項目</div>';
        return;
    }

    const monthLabels = selectedMonths.map(m => { const [y, mo] = m.split('-'); return `${parseInt(mo)}月`; });

    // Build pivot table header
    let thCols = '<th style="text-align:left;">專案名稱</th>';
    selectedMonths.forEach((m, i) => {
        thCols += `<th colspan="3" style="text-align:center;border-left:2px solid var(--border);">${monthLabels[i]}</th>`;
    });
    let thSub = '<th></th>';
    selectedMonths.forEach(() => {
        thSub += '<th class="num" style="border-left:2px solid var(--border);font-size:.62rem;">收入</th><th class="num" style="font-size:.62rem;">成本</th><th class="num" style="font-size:.62rem;">利潤</th>';
    });

    // Group by category
    const catOrder = { b2b: '企業內訓', b2c: '公開課程', bizMarketing: '企業服務', bizDev: '企業服務', bizExpert: '企業服務' };
    const grouped = {};
    allProjects.forEach((data, name) => {
        const catLabel = catOrder[data.group] || '其他';
        if (!grouped[catLabel]) grouped[catLabel] = [];
        grouped[catLabel].push({ name, ...data });
    });

    let bodyHtml = '';
    Object.entries(grouped).forEach(([catLabel, items]) => {
        bodyHtml += `<tr><td colspan="${1 + selectedMonths.length * 3}" style="font-size:.72rem;font-weight:700;color:var(--text-secondary);background:var(--bg);padding:6px 12px;">${catLabel}</td></tr>`;
        items.forEach(item => {
            bodyHtml += '<tr><td style="text-align:left;font-weight:500;">' + item.name + '</td>';
            selectedMonths.forEach(m => {
                const d = item.months[m] || { rev: 0, cost: 0, profit: 0 };
                const profCls = d.profit >= 0 ? 'pos' : 'neg';
                bodyHtml += `<td class="num" style="border-left:2px solid var(--border);">${d.rev.toLocaleString()}</td><td class="num">${d.cost.toLocaleString()}</td><td class="num ${profCls}">${d.profit.toLocaleString()}</td>`;
            });
            bodyHtml += '</tr>';
        });
    });

    // Total row
    bodyHtml += `<tr style="border-top:2px solid var(--border);font-weight:700;"><td style="text-align:left;">合計</td>`;
    selectedMonths.forEach(m => {
        let tRev = 0, tCost = 0;
        allProjects.forEach(data => { const d = data.months[m] || { rev: 0, cost: 0 }; tRev += d.rev; tCost += d.cost; });
        const tProfit = tRev - tCost;
        const profCls = tProfit >= 0 ? 'pos' : 'neg';
        bodyHtml += `<td class="num" style="border-left:2px solid var(--border);">${tRev.toLocaleString()}</td><td class="num">${tCost.toLocaleString()}</td><td class="num ${profCls}">${tProfit.toLocaleString()}</td>`;
    });
    bodyHtml += '</tr>';

    panel.innerHTML = `<div style="overflow-x:auto;"><table class="overview-table"><thead><tr>${thCols}</tr><tr>${thSub}</tr></thead><tbody>${bodyHtml}</tbody></table></div>`;
}

// Helper: calc costs from a cached product snapshot
function calcCostsFromProduct(p, group) {
    const taxRate = parseFloat(document.getElementById('globalTaxRate').value) || 0;
    const isB2c = group === 'b2c';
    const isBiz = BIZ_GROUPS.includes(group);
    const rev = (p.revenue || 0) > 0 ? (p.revenue || 0) : (parseFloat(p.estimatedRevenue) || 0);
    const tax = Math.round(rev * taxRate / 100);
    const orderCount = p.orderCount || (isB2c && rev > 0 ? 1 : 0);
    const payFee = isB2c ? Math.round(rev * 0.05 + orderCount * 15) : 0;
    const lecCost = p.lecturerType === 'percent' ? Math.round(rev * (p.lecturerPercent || 0) / 100) : 0;
    const sharedCosts = (isB2c ? (toTwd(p.kol||0,p.cur_kol) + toTwd(p.ads||0,p.cur_ads)) : 0) + (isBiz ? toTwd(p.personnel||0,p.cur_personnel) : 0);
    let sessionCosts = 0;
    (p.sessions || []).forEach(s => {
        sessionCosts += toTwd(s.venue||0,s.cur_venue) + toTwd(s.lecturerFee||0,s.cur_lecturerFee) + toTwd(s.assistant||0,s.cur_assistant) + toTwd(s.transport||0,s.cur_transport) + toTwd(s.material||0,s.cur_material);
    });
    const hasSessions = (p.sessions || []).length > 0;
    const fallbackCosts = !hasSessions ? (p.lecturerType==='fixed' ? toTwd(p.lecturerFee||0,p.cur_lecturerFee) : 0) + toTwd(p.venue||0,p.cur_venue) + toTwd(p.assistant||0,p.cur_assistant) + toTwd(p.transport||0,p.cur_transport) + toTwd(p.material||0,p.cur_material) : 0;
    const totalCost = tax + payFee + lecCost + sharedCosts + sessionCosts + fallbackCosts;
    return { rev, totalCost, profit: rev - totalCost };
}

// ── Save / Export ──
async function saveAll() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = '儲存中…';
    const month = monthSelect.value;
    const cleanProducts = JSON.parse(JSON.stringify(products));
    ['b2c'].forEach(g => { (cleanProducts[g] || []).forEach(p => { delete p.ordersList; }); });
    const payload = {
        globalTaxRate: parseFloat(document.getElementById('globalTaxRate').value) || 0,
        globalUsdRate: parseFloat(document.getElementById('globalUsdRate').value) || 32.5,
        products: cleanProducts
    };
    const hdr = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
    const base = SUPABASE_URL + '/rest/v1';
    try {
        const chk = await fetch(base + '/cost_budgets?month=eq.' + month + '&select=id&limit=1', { headers: hdr });
        const rows = await chk.json();
        let res;
        if (rows && rows.length > 0) {
            res = await fetch(base + '/cost_budgets?month=eq.' + month, {
                method: 'PATCH', headers: { ...hdr, 'Prefer': 'return=representation' },
                body: JSON.stringify({ data: payload, updated_at: new Date().toISOString() })
            });
        } else {
            res = await fetch(base + '/cost_budgets', {
                method: 'POST', headers: { ...hdr, 'Prefer': 'return=representation' },
                body: JSON.stringify([{ month, data: payload, updated_at: new Date().toISOString() }])
            });
        }
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + res.status); }
        showToast('已儲存至雲端 ✓');
        document.getElementById('autoSaved').innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;color:var(--positive);">cloud_done</span> ' + new Date().toLocaleTimeString('zh-TW') + ' 已儲存';
    } catch (err) {
        console.error('[save]', err);
        showToast('儲存失敗: ' + (err.message || '').substring(0, 40));
        document.getElementById('autoSaved').innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;color:var(--negative);">cloud_off</span> 儲存失敗';
    } finally {
        btn.disabled = false;
        btn.textContent = '儲存';
    }
}


function exportCSV() {
    const month = monthSelect.value;
    const rows = [['類別','名稱','項目','幣別','金額','折合NT$']];
    const labels = { b2b: '企業內訓', b2c: '公開課程', bizMarketing: '行銷代操', bizDev: '系統開發', bizExpert: '專家派遣' };
    GROUPS.forEach(g => {
        products[g].forEach(p => {
            const c = calcCosts(p, g);
            rows.push([labels[g], p.name||'未命名', '實收金額', 'TWD', c.rev, c.rev]);
            rows.push([labels[g], p.name, `稅金 ${c.taxRate}%`, 'TWD', c.tax, c.tax]);
            if (c.isB2c) rows.push([labels[g], p.name, '金流手續費 5%+15', 'TWD', c.payFee, c.payFee]);
            const lCur = p.cur_lecturerFee || 'twd';
            rows.push([labels[g], p.name, '講師費', lCur.toUpperCase(), p.lecturerType==='fixed'?(p.lecturerFee||0):c.lecCost, c.lecCost]);
            if (c.isB2c) {
                ['kol','ads','venue'].forEach(k => {
                    const cur = p[`cur_${k}`]||'twd';
                    rows.push([labels[g], p.name, k, cur.toUpperCase(), p[k]||0, toTwd(p[k]||0, cur)]);
                });
            }
            ['assistant','transport','material'].forEach(k => {
                const cur = p[`cur_${k}`]||'twd';
                rows.push([labels[g], p.name, k, cur.toUpperCase(), p[k]||0, toTwd(p[k]||0, cur)]);
            });
            if (c.isBiz) {
                const cur = p.cur_personnel||'twd';
                rows.push([labels[g], p.name, '人事費', cur.toUpperCase(), p.personnel||0, toTwd(p.personnel||0, cur)]);
            }
        });
    });
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `成本預算_${month}.csv`; a.click();
}

function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// Load finance settings from system settings
const financeSettings = JSON.parse(localStorage.getItem('finance_settings') || '{}');
document.getElementById('globalTaxRate').value = financeSettings.taxRate ?? 5;
document.getElementById('globalUsdRate').value = financeSettings.usdRate ?? 32.5;

document.getElementById('btnSync').addEventListener('click', () => autoSync(false));
document.getElementById('btnSave').addEventListener('click', () => saveAll());
document.getElementById('btnExport').addEventListener('click', exportCSV);

autoSync(false);
