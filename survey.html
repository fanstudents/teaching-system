<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課後問卷 — 數位簡報室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: linear-gradient(165deg, #0d1117 0%, #161b28 40%, #1a1f35 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .survey-container {
            width: 100%;
            max-width: 540px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Loading ── */
        .survey-loading {
            text-align: center;
            padding: 60px 20px;
        }

        .survey-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Card ── */
        .survey-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px 28px;
            backdrop-filter: blur(20px);
        }

        .survey-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .survey-header .emoji {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .survey-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .survey-header p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* ── Questions ── */
        .survey-q {
            margin-bottom: 24px;
        }

        .survey-q-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .survey-stars {
            display: flex;
            gap: 6px;
        }

        .survey-star {
            font-size: 28px;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .survey-star:hover,
        .survey-star.active {
            color: #fbbf24;
            transform: scale(1.15);
        }

        .survey-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            font-size: 0.88rem;
            font-family: inherit;
            resize: vertical;
            min-height: 48px;
            transition: border-color 0.2s;
            outline: none;
        }

        .survey-textarea:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.06);
        }

        .survey-textarea::placeholder {
            color: #475569;
        }

        /* ── Submit ── */
        .survey-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .survey-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .survey-submit:not(:disabled):hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        /* ── Thank You ── */
        .thankyou-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .thankyou-section .emoji {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .thankyou-section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .thankyou-section p {
            font-size: 0.82rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .cta-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .cta-card:hover {
            filter: brightness(1.15);
        }

        .cta-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cta-icon .material-symbols-outlined {
            color: #fff;
            font-size: 20px;
        }

        .cta-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .cta-desc {
            font-size: 12px;
            color: #94a3b8;
        }

        .cta-arrow {
            margin-left: auto;
            font-size: 18px;
        }

        .farewell-box {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .email-notice {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.06);
            border-radius: 10px;
            border: 1px solid rgba(99, 102, 241, 0.12);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .email-notice .material-symbols-outlined {
            color: #818cf8;
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── Error ── */
        .survey-error {
            text-align: center;
            padding: 40px 20px;
        }

        .survey-error .material-symbols-outlined {
            font-size: 48px;
            color: #ef4444;
            margin-bottom: 12px;
        }

        .survey-error p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="survey-container" id="surveyRoot">
        <div class="survey-loading">
            <div class="spinner"></div>
            <p style="color:#94a3b8;">載入問卷中…</p>
        </div>
    </div>

    <script type="module">
        import { db } from './scripts/supabase.js';

        const params = new URLSearchParams(location.search);
        const sessionCode = params.get('session') || '';
        const studentEmail = params.get('student') || '';
        const root = document.getElementById('surveyRoot');

        if (!sessionCode) {
            root.innerHTML = `<div class="survey-card survey-error">
                <span class="material-symbols-outlined">error</span>
                <p>缺少 session 參數，無法載入問卷。</p>
            </div>`;
        } else {
            init();
        }

        async function init() {
            try {
                // 1. session → project_id
                const sessRows = await db.select('sessions', {
                    filter: { session_code: `eq.${sessionCode}` },
                    limit: 1,
                });
                const sess = (sessRows?.data || sessRows)?.[0];
                if (!sess?.project_id) throw new Error('找不到此 session');

                // 2. project → slides_data
                const projRows = await db.select('projects', {
                    filter: { id: `eq.${sess.project_id}` },
                    limit: 1,
                });
                const proj = (projRows?.data || projRows)?.[0];
                if (!proj) throw new Error('找不到專案');

                const slidesData = typeof proj.slides_data === 'string'
                    ? JSON.parse(proj.slides_data) : proj.slides_data || {};

                const surveyConfig = slidesData.surveyConfig || {};
                const thankYouConfig = slidesData.thankYouConfig || {};

                // 3. 檢查是否已填
                if (studentEmail) {
                    const existing = await db.select('submissions', {
                        filter: {
                            session_id: `eq.${sessionCode}`,
                            student_email: `eq.${studentEmail}`,
                            type: 'eq.survey',
                        },
                        limit: 1,
                    });
                    if ((existing?.data || existing)?.[0]) {
                        renderThankYou(thankYouConfig);
                        return;
                    }
                }

                // 4. 顯示問卷
                renderSurvey(surveyConfig, thankYouConfig);
            } catch (e) {
                console.error(e);
                root.innerHTML = `<div class="survey-card survey-error">
                    <span class="material-symbols-outlined">error</span>
                    <p>${e.message || '載入失敗'}</p>
                </div>`;
            }
        }

        function renderSurvey(surveyConfig, thankYouConfig) {
            const questions = surveyConfig.questions || [
                { id: 'q1', type: 'stars', text: '課程整體滿意度', max: 5 },
                { id: 'q2', type: 'stars', text: '講師教學表現', max: 5 },
                { id: 'q3', type: 'stars', text: '課程內容實用性', max: 5 },
                { id: 'q4', type: 'text', text: '這堂課最大的收穫是什麼？', placeholder: '請分享你印象最深刻的部分…' },
                { id: 'q5', type: 'text', text: '你覺得還想學哪些相關主題？', placeholder: '例如：AI 繪圖、自動化工具…' },
                { id: 'q6', type: 'text', text: '給講師的一句話或建議 💬', placeholder: '任何想說的話都可以！' },
            ];
            const title = surveyConfig.title || '📋 課程回饋問卷';

            root.innerHTML = `
                <div class="survey-card">
                    <div class="survey-header">
                        <div class="emoji">📋</div>
                        <h1>${title}</h1>
                        <p>你的回饋是我們進步的動力 ✨</p>
                    </div>
                    <div id="questionsArea">
                        ${questions.map((q, i) => renderQuestion(q, i)).join('')}
                    </div>
                    <button class="survey-submit" id="submitBtn" disabled>
                        <span class="material-symbols-outlined">send</span>
                        提交問卷
                    </button>
                </div>`;

            // Stars
            root.querySelectorAll('.survey-stars').forEach(starsEl => {
                starsEl.querySelectorAll('.survey-star').forEach(star => {
                    star.addEventListener('click', () => {
                        const val = parseInt(star.dataset.value);
                        starsEl.dataset.selected = val;
                        starsEl.querySelectorAll('.survey-star').forEach(s =>
                            s.classList.toggle('active', parseInt(s.dataset.value) <= val));
                        checkSubmit();
                    });
                });
            });
            root.querySelectorAll('.survey-textarea').forEach(ta => ta.addEventListener('input', checkSubmit));

            document.getElementById('submitBtn').addEventListener('click', async () => {
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 0.8s linear infinite;">progress_activity</span> 提交中…';

                const answers = {};
                questions.forEach(q => {
                    if (q.type === 'stars') {
                        const el = root.querySelector(`[data-qid="${q.id}"]`);
                        answers[q.id] = { question: q.text, type: 'stars', value: parseInt(el?.dataset.selected || '0') };
                    } else {
                        const ta = root.querySelector(`#survey_${q.id}`);
                        answers[q.id] = { question: q.text, type: 'text', value: ta?.value?.trim() || '' };
                    }
                });

                try {
                    await db.insert('submissions', {
                        session_id: sessionCode,
                        student_email: studentEmail,
                        student_name: studentEmail.split('@')[0] || '匿名',
                        assignment_title: title,
                        type: 'survey',
                        content: JSON.stringify(answers),
                        element_id: 'standalone_survey',
                        submitted_at: new Date().toISOString(),
                        state: { answers },
                    });
                } catch (e) { console.warn('Survey save error:', e); }

                renderThankYou(thankYouConfig);
            });

            function checkSubmit() {
                let ok = true;
                root.querySelectorAll('.survey-stars').forEach(el => {
                    if (parseInt(el.dataset.selected || '0') === 0) ok = false;
                });
                document.getElementById('submitBtn').disabled = !ok;
            }
        }

        function renderQuestion(q, i) {
            if (q.type === 'stars') {
                return `<div class="survey-q">
                    <div class="survey-q-label">${i + 1}. ${q.text}</div>
                    <div class="survey-stars" data-qid="${q.id}" data-selected="0">
                        ${Array.from({ length: q.max || 5 }, (_, j) =>
                    `<span class="survey-star" data-value="${j + 1}">★</span>`).join('')}
                    </div>
                </div>`;
            }
            return `<div class="survey-q">
                <div class="survey-q-label">${i + 1}. ${q.text}</div>
                <textarea class="survey-textarea" id="survey_${q.id}" placeholder="${q.placeholder || ''}" rows="2"></textarea>
            </div>`;
        }

        function renderThankYou(cfg) {
            const ctaCards = cfg.ctaCards || [
                { title: '數位簡報室・更多課程', desc: '探索更多數位工具與 AI 應用課程', url: 'https://tbr.digital', icon: 'school', color: '#6366f1' },
                { title: '企業顧問服務', desc: '內部培訓 ・ 諮詢 ・ 數位工具導入', url: 'https://tbr.digital/consulting', icon: 'handshake', color: '#eab308' },
                { title: '前往 Threads 分享心得', desc: '標記 @TBR.DIGITAL', url: 'https://www.threads.net/intent/post?text=' + encodeURIComponent('剛上完數位簡報室的課程！收穫滿滿 🎓✨ @TBR.DIGITAL'), icon: 'share', color: '#10b981' }
            ];
            const sectionTitle = cfg.sectionTitle || '✨ 修完這堂課，你還可以…';
            const farewell = cfg.farewell || '🙌 歡迎來找老師聊聊天、私下互動<br>或是開心地離開教室，回家注意安全！';
            const emailNotice = cfg.emailNotice || '我們會在課後兩天內，將這堂課的學習筆記整理寄到你的 Email，請務必留意課後信件 📬';

            root.innerHTML = `
                <div class="survey-card">
                    <div class="thankyou-section">
                        <div class="emoji">🎉</div>
                        <h2>感謝你的回饋！</h2>
                        <p>你的意見是我們進步的動力</p>
                    </div>
                    <div style="font-size:14px;font-weight:600;color:#cbd5e1;margin-bottom:12px;text-align:center;">${sectionTitle}</div>
                    ${ctaCards.map(c => {
                const bg = c.color || '#6366f1';
                return `<a href="${c.url || '#'}" target="_blank" class="cta-card" style="background:${bg}18;border:1px solid ${bg}40;">
                            <div class="cta-icon" style="background:linear-gradient(135deg,${bg},${bg}cc);">
                                <span class="material-symbols-outlined">${c.icon || 'link'}</span>
                            </div>
                            <div>
                                <div class="cta-title">${c.title}</div>
                                <div class="cta-desc">${c.desc || ''}</div>
                            </div>
                            <span class="material-symbols-outlined cta-arrow" style="color:${bg};">arrow_forward</span>
                        </a>`;
            }).join('')}
                    <div class="farewell-box">${farewell}</div>
                    <div class="email-notice">
                        <span class="material-symbols-outlined">mail</span>
                        <div>${emailNotice}</div>
                    </div>
                </div>`;
        }
    </script>
</body>

</html>
