<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — 數位簡報室</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="tbrlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Google Sans', 'Roboto', 'Noto Sans TC', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            -webkit-font-smoothing: antialiased;
            background: #0a0a0f;
            overflow: hidden;
        }

        /* ── Left Panel — Brand Side ── */
        .login-brand {
            flex: 1;
            background: linear-gradient(160deg, #0a0a1a 0%, #0f1029 40%, #161638 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .login-brand::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26,115,232,.12) 0%, transparent 70%);
            top: -100px; left: -150px;
            pointer-events: none;
        }

        .login-brand::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,.08) 0%, transparent 70%);
            bottom: -80px; right: -100px;
            pointer-events: none;
        }

        .brand-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .brand-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .brand-shape {
            position: absolute;
            border: 1px solid rgba(26,115,232,.08);
            border-radius: 4px;
            animation: floatShape 20s ease-in-out infinite;
        }
        .brand-shape:nth-child(1) { width:80px;height:80px;top:15%;left:10%;transform:rotate(45deg); }
        .brand-shape:nth-child(2) { width:120px;height:120px;top:60%;right:15%;border-radius:50%;border-color:rgba(139,92,246,.06);animation-delay:-7s;animation-duration:25s; }
        .brand-shape:nth-child(3) { width:60px;height:60px;bottom:20%;left:25%;transform:rotate(15deg);border-color:rgba(26,115,232,.05);animation-delay:-12s; }
        .brand-shape:nth-child(4) { width:40px;height:40px;top:30%;right:30%;border-radius:50%;border-color:rgba(168,85,247,.07);animation-delay:-4s;animation-duration:18s; }

        @keyframes floatShape {
            0%,100% { transform:translateY(0) rotate(0deg); opacity:.6; }
            25% { transform:translateY(-20px) rotate(5deg); opacity:1; }
            50% { transform:translateY(-10px) rotate(-3deg); opacity:.7; }
            75% { transform:translateY(-25px) rotate(8deg); opacity:.9; }
        }

        .brand-content { position:relative; z-index:2; max-width:480px; text-align:center; }
        .brand-icon {
            width:96px;height:96px;border-radius:24px;
            background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
            display:inline-flex;align-items:center;justify-content:center;
            margin-bottom:32px;backdrop-filter:blur(20px);
            box-shadow:0 8px 32px rgba(0,0,0,.3);overflow:hidden;
        }
        .brand-icon img { width:64px;height:64px;object-fit:contain;filter:brightness(1.15) drop-shadow(0 2px 12px rgba(26,115,232,.4)); }
        .brand-title { font-size:2.2rem;font-weight:800;letter-spacing:-.04em;line-height:1.2;background:linear-gradient(135deg,#d2e3fc,#a8c7fa 30%,#8ab4f8 60%,#4285f4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px; }
        .brand-subtitle { font-size:1rem;color:rgba(165,180,252,.5);line-height:1.7;font-weight:300;letter-spacing:-.01em; }
        .brand-features { display:flex;gap:32px;margin-top:56px;position:relative;z-index:2; }
        .brand-feature { display:flex;align-items:center;gap:10px;color:rgba(165,180,252,.35);font-size:.82rem;font-weight:400; }
        .brand-feature .material-symbols-outlined { font-size:18px;color:rgba(66,133,244,.4); }

        /* ── Right Panel — Form Side ── */
        .login-form-side {
            width:520px;min-width:520px;display:flex;flex-direction:column;
            justify-content:center;align-items:center;padding:60px;
            background:#ffffff;position:relative;
        }
        .login-form-side::before {
            content:'';position:absolute;top:0;left:0;right:0;height:3px;
            background:linear-gradient(90deg,#1a73e8,#4285f4,#8b5cf6);
        }
        .login-form-wrapper { width:100%;max-width:380px;animation:formFadeIn .5s ease-out; }

        @keyframes formFadeIn {
            from { opacity:0;transform:translateY(16px); }
            to { opacity:1;transform:translateY(0); }
        }

        .form-header { margin-bottom:32px; text-align:center; }
        .form-logo { width:48px;height:48px;object-fit:contain;margin-bottom:20px;border-radius:12px; }
        .form-header h1 { font-size:1.5rem;font-weight:700;color:#0f172a;letter-spacing:-.03em;margin-bottom:6px; }
        .form-header p { font-size:.88rem;color:#80868b;font-weight:400; }

        /* ── Role Tabs ── */
        .role-tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: #f1f5f9;
            border-radius: 14px;
            margin-bottom: 28px;
        }
        .role-tab {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 10px;
            font-size: .8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .role-tab .material-symbols-outlined { font-size: 16px; }
        .role-tab:hover { color: #334155; }
        .role-tab.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 2px 12px rgba(0,0,0,.04);
        }
        .role-tab.active .tab-dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: dotPulse 2s infinite;
        }
        .role-tab[data-role="instructor"] .tab-dot { background: #3b82f6; }
        .role-tab[data-role="affiliate"] .tab-dot { background: #10b981; }
        .role-tab[data-role="student"] .tab-dot { background: #f59e0b; }

        @keyframes dotPulse {
            0%,100% { opacity:1; }
            50% { opacity:.3; }
        }

        /* ── Role Panels ── */
        .role-panel { display: none; }
        .role-panel.active { display: block; animation: formFadeIn .3s ease-out; }

        .role-description {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: .82rem;
            color: #475569;
            line-height: 1.5;
        }
        .role-description .material-symbols-outlined { font-size: 20px; color: #94a3b8; flex-shrink: 0; }

        /* ── Google Button ── */
        .btn-google {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #dadce0;
            border-radius: 12px;
            background: #ffffff;
            font-size: .9rem;
            font-weight: 600;
            font-family: inherit;
            color: #3c4043;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #c6c9cc;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* ── Login Divider ── */
        .login-divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: #cbd5e1; font-size: .72rem;
            letter-spacing: .05em; text-transform: uppercase; font-weight: 500;
        }
        .login-divider::before, .login-divider::after {
            content: ''; flex: 1; height: 1px; background: #e2e8f0;
        }

        /* ── Email/Password Form ── */
        .login-form-group { margin-bottom: 20px; }
        .login-form-group label {
            display: block; font-size: .78rem; font-weight: 600;
            color: #1f1f1f; margin-bottom: 8px; letter-spacing: .02em;
        }
        .input-wrapper { position: relative; }
        .input-wrapper .material-symbols-outlined {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 20px; color: #80868b; transition: color .2s; pointer-events: none;
        }
        .input-wrapper input {
            width: 100%; padding: 13px 16px 13px 46px;
            border: 1.5px solid #dadce0; border-radius: 12px;
            font-size: .9rem; font-family: inherit; color: #0f172a;
            outline: none; transition: all .2s; background: #f8f9fa;
        }
        .input-wrapper input::placeholder { color: #80868b; }
        .input-wrapper input:focus {
            border-color: #1a73e8; background: #fff;
            box-shadow: 0 0 0 4px rgba(26,115,232,.08);
        }
        .input-wrapper input:focus ~ .material-symbols-outlined { color: #1a73e8; }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #80868b;
            padding: 4px; display: flex; align-items: center; transition: color .15s;
        }
        .password-toggle:hover { color: #444746; }
        .password-toggle .material-symbols-outlined { font-size: 20px; position: static; transform: none; }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #1a73e8);
            border: none; border-radius: 12px; color: #fff;
            font-size: .92rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all .25s; letter-spacing: -.01em;
            position: relative; overflow: hidden;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(26,115,232,.4); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }
        .btn-login-content { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .6s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        /* ── Error ── */
        .login-error {
            background: #fce8e6; border: 1px solid rgba(217,48,37,.15);
            border-left: 3px solid #d93025; color: #c5221f;
            padding: 12px 16px; border-radius: 10px; font-size: .82rem;
            margin-bottom: 16px; display: none; align-items: center; gap: 10px; line-height: 1.5;
        }
        .login-error .material-symbols-outlined { font-size: 18px; flex-shrink: 0; }
        .login-error.show { display: flex; animation: errorSlide .3s ease-out; }
        @keyframes errorSlide { from { opacity:0;transform:translateY(-8px); } }

        /* ── Footer ── */
        .login-footer { text-align: center; margin-top: 32px; color: #80868b; font-size: .78rem; line-height: 1.6; }
        .login-footer a { color: #1a73e8; text-decoration: none; font-weight: 500; }
        .login-footer a:hover { text-decoration: underline; }
        .login-bottom-brand {
            position: absolute; bottom: 32px; left: 0; right: 0;
            text-align: center; font-size: .72rem; color: #cbd5e1; letter-spacing: .02em;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .login-brand { display: none; }
            .login-form-side { width: 100%; min-width: unset; background: linear-gradient(180deg, #f8f9fa, #fff 30%); }
        }
        @media (max-width: 480px) {
            .login-form-side { padding: 40px 24px; }
            .form-header h1 { font-size: 1.3rem; }
            .role-tab { font-size: .72rem; padding: 8px 4px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
        }
    </style>
</head>

<body>
    <!-- Brand Panel -->

            <div class="role-panel active" id="panel-instructor">

                <form id="loginForm">

                    <button type="submit" class="btn-login" id="loginBtn">

            <!-- ═══ Affiliate Panel ═══ -->
            <div class="role-panel" id="panel-affiliate">

                </div>
                <button class="btn-google" id="btnGoogleStudent" onclick="googleLogin('student')">
                    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

    <script type="module">
        import { auth, db, getUserProfile } from './scripts/supabase.js';

        // ── Role switching ──
        const roleConfig = {
            instructor: {
                title: '講師登入',
                desc: '管理課程 · 編輯簡報 · 系統設定',
                brandTitle: '教學管理中心',
                brandSub: '一站式課程管理平台<br>從簡報設計到互動教學，一氣呵成',
                features: [
                    { icon: 'edit_note', text: '簡報編輯' },
                    { icon: 'monitoring', text: '數據分析' },
                    { icon: 'smart_toy', text: 'AI 助教' }
                ]
            },
            affiliate: {
                title: '推廣夥伴登入',
                desc: '查看佣金 · 推廣數據 · 收益分析',
                brandTitle: '推廣夥伴計畫',
                brandSub: '分享好課程，賺取推廣收益<br>即時追蹤佣金與推廣成效',
                features: [
                    { icon: 'trending_up', text: '收益追蹤' },
                    { icon: 'link', text: '專屬連結' },
                    { icon: 'payments', text: '佣金提領' }
                ]
            },
            student: {
                title: '學員登入',
                desc: '查看課程 · 學習進度 · 作業回饋',
                brandTitle: 'AI 學習平台',
                brandSub: '沉浸式互動學習體驗<br>掌握 AI 時代的核心技能',
                features: [
                    { icon: 'play_circle', text: '課程回放' },
                    { icon: 'task_alt', text: '作業系統' },
                    { icon: 'emoji_events', text: '學習成就' }
                ]
            }
        };

        window.switchRole = function(role) {
            const cfg = roleConfig[role];
            // Tab states
            document.querySelectorAll('.role-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.role === role);
            });
            document.querySelectorAll('.role-panel').forEach(p => {
                p.classList.toggle('active', p.id === `panel-${role}`);
            });
            document.getElementById('loginError').classList.remove('show');
            // Right panel header
            document.querySelector('.form-header h1').textContent = cfg.title;
            document.querySelector('.form-header p').textContent = cfg.desc;
            // Left panel brand content
            document.getElementById('brandTitle').textContent = cfg.brandTitle;
            document.getElementById('brandSubtitle').innerHTML = cfg.brandSub;
            document.getElementById('brandFeatures').innerHTML = cfg.features.map(f =>
                `<div class="brand-feature"><span class="material-symbols-outlined">${f.icon}</span><span>${f.text}</span></div>`
            ).join('');
        };

        // Check URL param for pre-selected role
        const urlRole = new URLSearchParams(location.search).get('role');
        if (urlRole && ['instructor', 'affiliate', 'student'].includes(urlRole)) {
            switchRole(urlRole);
        }

        // ── Google Login ──
        window.googleLogin = function(role) {
            // Store intended role before redirect
            localStorage.setItem('_login_role', role);
            const redirectUrl = `${location.origin}/login.html?callback=1&role=${role}`;
            auth.signInWithGoogle(redirectUrl);
        };

        // ── Handle OAuth callback ──
        if (location.hash.includes('access_token') || new URLSearchParams(location.search).get('callback')) {
            const user = await auth.handleOAuthCallback();
            if (user) {
                const role = localStorage.getItem('_login_role') || 'student';
                localStorage.removeItem('_login_role');
                const email = user.email;

                if (role === 'affiliate') {
                    // Check affiliates table
                    const { data: aff } = await db.from('affiliates')
                        .select('*')
                        .eq('email', email)
                        .eq('status', 'approved')
                        .single();

                    if (aff) {
                        location.replace('affiliate-dashboard.html');
                    } else {
                        showError('此帳號尚未加入推廣計畫，請先完成申請。');
                        await auth.signOut();
                    }
                } else if (role === 'student') {
                    // Students — all Google accounts OK, redirect to student area
                    location.replace('student.html');
                } else {
                    // Instructor via Google (e.g. service@tbr.digital)
                    const profile = await getUserProfile();
                    if (profile?.role === 'super_admin' || profile?.role === 'admin' || profile?.role === 'instructor') {
                        location.replace(profile.role === 'super_admin' ? 'admin-dashboard.html' : 'manage.html');
                    } else {
                        showError('此帳號沒有講師權限，請使用帳號密碼登入或聯繫管理員。');
                        await auth.signOut();
                    }
                }
            }
        }

        // ── Check existing session ──
        const session = await auth.getSession();
        if (session && !location.hash && !new URLSearchParams(location.search).get('callback')) {
            const profile = await getUserProfile();
            const defaultRedirect = profile?.role === 'super_admin' ? 'admin-dashboard.html' : 'manage.html';
            const redirect = new URLSearchParams(location.search).get('redirect') || defaultRedirect;
            location.replace(redirect);
        }

        // ── Password toggle ──
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('loginPassword');
        toggleBtn.addEventListener('click', () => {
            const is = passwordInput.type === 'password';
            passwordInput.type = is ? 'text' : 'password';
            toggleBtn.querySelector('.material-symbols-outlined').textContent = is ? 'visibility' : 'visibility_off';
        });

        // ── Email/Password form submit ──
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            errorEl.classList.remove('show');
            btn.disabled = true;
            btn.classList.add('loading');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await auth.signIn(email, password);

            if (error) {
                showError(error.message || '帳號或密碼錯誤');
                btn.disabled = false;
                btn.classList.remove('loading');
                return;
            }

            const profile = await getUserProfile();
            if (profile?.role) localStorage.setItem('_user_role', profile.role);
            const defaultRedirect = profile?.role === 'super_admin' ? 'admin-dashboard.html' : 'manage.html';
            const redirect = new URLSearchParams(location.search).get('redirect') || defaultRedirect;
            location.replace(redirect);
        });

        function showError(msg) {
            document.getElementById('loginErrorText').textContent = msg;
            document.getElementById('loginError').classList.add('show');
        }
    </script>
</body>

</html>
