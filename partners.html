    <script type="module">
        import { db } from './scripts/supabase.js';

        let affiliates = [];
        let instructors = [];
        let affCourses = [];
        let instrCourseIds = []; // temp state for course id tags

        // ── Teachify Coupon API ──
        const TEACHIFY_API = 'https://teachify.io/admin/graphql';
        const TEACHIFY_KEY = 'vsXiCQXFlNs95GjiRHW4Y3mwc9L6_oj6VdRiTj-3ymE';
        let teachifyCoupons = null; // cached

        async function fetchTeachifyCoupons() {
            if (teachifyCoupons) return teachifyCoupons;
            try {
                const res = await fetch(TEACHIFY_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Teachify-API-Key': TEACHIFY_KEY },
                    body: JSON.stringify({ query: `{ coupons(perPage: 200) { nodes { id name code amount couponType active state appliedCount } } }` })
                });
                const json = await res.json();
                teachifyCoupons = json?.data?.coupons?.nodes || [];
                return teachifyCoupons;
            } catch (e) {
                console.error('[Teachify Coupon]', e);
                return [];
            }
        }

        async function validateCouponOnTeachify(code) {
            const statusEl = document.getElementById('couponStatus');
            if (!code) { statusEl.innerHTML = ''; return; }
            statusEl.innerHTML = '<span style="color:#94a3b8;">驗證中…</span>';
            teachifyCoupons = null; // always fetch fresh
            const coupons = await fetchTeachifyCoupons();
            const match = coupons.find(c => c.code.toUpperCase() === code.toUpperCase());
            if (match) {

                statusEl.innerHTML = `<span style="color:${stateColor};font-weight:600;">✓ Teachify 已建立</span> — ${match.name} (${typeLabel}，${stateText}，已使用 ${match.appliedCount} 次)`;

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            return lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((h, i) => obj[h] = vals[i] || '');
                return obj;
            });
        }

                        account_holder: r.account_holder || '',
                        bank_account: r.bank_account || '',
                        course_ids: r.course_ids ? r.course_ids.split(';').map(s => s.trim()).filter(Boolean) : [],
                        notes: r.notes || ''
                    }));
                    for (const rec of records) {
                        await db.insert('instructors', rec);
                    }
                    await loadInstructors();
                }
                showToast(`已匯入 ${importRows.length} 筆資料`);
                closeModal('importOverlay');
            } catch (e) {
                showToast('匯入失敗：' + e.message);
            }
            btn.disabled = false;
            btn.textContent = '確認匯入';
        });

        // ── Init ──
        // Hash-based tab switching
        function switchToHash() {
            const hash = location.hash.replace('#', '');
            if (['affiliates', 'instructors', 'courses', 'referrals'].includes(hash)) {
                document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                document.querySelector(`.main-tab[data-tab="${hash}"]`)?.classList.add('active');
                document.getElementById(`tab-${hash}`)?.classList.add('active');
            }
        }
        switchToHash();
        window.addEventListener('hashchange', switchToHash);

        // Copy affiliate public URL
        const affUrlEl = document.getElementById('affPublicUrl');
        const fullUrl = new URL('affiliate-register.html', location.href).href;
        affUrlEl.textContent = fullUrl;
        document.getElementById('btnCopyAffUrl').addEventListener('click', () => {
            navigator.clipboard.writeText(fullUrl).then(() => showToast('連結已複製'));
        });

        // ── Affiliate Courses CRUD ──
        async function loadCourses() {
            const { data } = await db.select('affiliate_courses', { order: 'sort_order.asc' });
            affCourses = data || [];
            renderCourses();
        }

        function renderCourses() {
            const search = document.getElementById('courseSearch').value.toLowerCase();
            const platformFilter = document.getElementById('coursePlatformFilter').value;

            let filtered = affCourses;
            if (search) {
                filtered = filtered.filter(c => (c.name || '').toLowerCase().includes(search));
            }
            if (platformFilter) {
                filtered = filtered.filter(c => c.platform === platformFilter);
            }

            const platformLabel = { tbr: '數位簡報室', hahow: 'Hahow' };
            const tbody = document.getElementById('courseBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;padding:40px;">尚無課程</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td style="font-size:0.78rem;color:#999;">${c.sort_order}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span class="material-symbols-outlined" style="font-size:16px;color:#999;">${c.icon || 'school'}</span>
                            <strong>${c.name}</strong>
                        </div>
                        <div style="font-size:0.72rem;color:#999;margin-top:2px;">${c.url}</div>
                    </td>
                    <td><span class="card-code" style="font-size:0.72rem;">${platformLabel[c.platform] || c.platform}</span></td>
                    <td><span class="status-badge ${c.is_active ? 'paid' : ''}">${c.is_active ? '啟用' : '停用'}</span></td>
                    <td>
                        <button class="btn btn-sm" onclick="openCourseEdit('${c.id}')" title="編輯">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        window.openCourseEdit = function(id) {
            const c = affCourses.find(x => x.id === id);
            if (!c) return;
            document.getElementById('courseModalTitle').textContent = '編輯課程';
            document.getElementById('courseEditId').value = id;
            document.getElementById('courseName').value = c.name || '';
            document.getElementById('courseUrl').value = c.url || '';
            document.getElementById('coursePlatform').value = c.platform || 'tbr';
            document.getElementById('courseSortOrder').value = c.sort_order || 0;
            document.getElementById('courseIcon').value = c.icon || 'school';
            document.getElementById('courseIsActive').value = String(c.is_active !== false);
            document.getElementById('courseDelete').classList.remove('hidden');
            document.getElementById('courseOverlay').classList.add('active');
        };

        document.getElementById('btnAddCourse').addEventListener('click', () => {
            document.getElementById('courseModalTitle').textContent = '新增推廣課程';
            document.getElementById('courseEditId').value = '';
            document.getElementById('courseName').value = '';
            document.getElementById('courseUrl').value = '';
            document.getElementById('coursePlatform').value = 'tbr';
            document.getElementById('courseSortOrder').value = affCourses.length + 1;
            document.getElementById('courseIcon').value = 'school';
            document.getElementById('courseIsActive').value = 'true';
            document.getElementById('courseDelete').classList.add('hidden');
            document.getElementById('courseOverlay').classList.add('active');
        });

        document.getElementById('courseSave').addEventListener('click', async () => {
            const editId = document.getElementById('courseEditId').value;
            const name = document.getElementById('courseName').value.trim();
            const url = document.getElementById('courseUrl').value.trim();
            if (!name || !url) { showToast('請填寫課程名稱和連結'); return; }

            const data = {
                name, url,
                platform: document.getElementById('coursePlatform').value,
                sort_order: parseInt(document.getElementById('courseSortOrder').value) || 0,
                icon: document.getElementById('courseIcon').value.trim() || 'school',
                is_active: document.getElementById('courseIsActive').value === 'true'
            };

            try {
                if (editId) {
                    await db.update('affiliate_courses', data, { id: `eq.${editId}` });
                    showToast('已更新');
                } else {
                    await db.insert('affiliate_courses', data);
                    showToast('課程已新增');
                }
                await loadCourses();
                closeModal('courseOverlay');
            } catch (e) { showToast('儲存失敗：' + e.message); }
        });

        document.getElementById('courseDelete').addEventListener('click', async () => {
            const id = document.getElementById('courseEditId').value;
            if (!confirm('確定刪除此課程？')) return;
            try {
                await db.delete('affiliate_courses', { id: `eq.${id}` });
                affCourses = affCourses.filter(x => x.id !== id);
                renderCourses();
                closeModal('courseOverlay');
                showToast('已刪除');
            } catch (e) { showToast('刪除失敗'); }
        });

        document.getElementById('courseSearch').addEventListener('input', () => renderCourses());
        document.getElementById('coursePlatformFilter').addEventListener('change', () => renderCourses());
        document.getElementById('btnRefreshCourses').addEventListener('click', () => loadCourses());

        loadAffiliates();
        loadInstructors();
        loadCourses();
        loadReferrals();

        // ── Referrals CRUD ──
        let referrals = [];

        async function loadReferrals() {
            const { data } = await db.select('affiliate_referrals', { order: 'created_at.desc' });
            referrals = data || [];
            renderReferrals();
        }

        const refStatusMap = {
            pending: { label: '待處理', color: '#f59e0b', bg: 'rgba(245,158,11,0.08)' },
            contacted: { label: '已聯繫', color: '#3b82f6', bg: 'rgba(59,130,246,0.08)' },
            closed: { label: '已成交', color: '#10b981', bg: 'rgba(16,185,129,0.08)' },
            rejected: { label: '未成交', color: '#ef4444', bg: 'rgba(239,68,68,0.08)' }
        };

        function renderReferrals() {
            const search = document.getElementById('refSearch').value.toLowerCase();
            const typeFilter = document.getElementById('refTypeFilter').value;
            const statusFilter = document.getElementById('refStatusFilter').value;

            let filtered = referrals.filter(r => {
                if (search && !(r.client_name || '').toLowerCase().includes(search) && !(r.affiliate_name || '').toLowerCase().includes(search)) return false;
                if (typeFilter && r.referral_type !== typeFilter) return false;
                if (statusFilter && r.status !== statusFilter) return false;
                return true;
            });

            const body = document.getElementById('refBody');
            if (filtered.length === 0) {
                body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:40px;">無資料</td></tr>';
                return;
            }

            body.innerHTML = filtered.map(r => {
                const s = refStatusMap[r.status] || refStatusMap.pending;
                const date = r.created_at ? new Date(r.created_at).toLocaleDateString('zh-TW') : '-';
                return `<tr onclick="openRefDetail('${r.id}')" style="cursor:pointer;">
                    <td>${r.affiliate_name || '-'}<br><span style="font-size:0.7rem;color:#94a3b8;">${r.affiliate_email || ''}</span></td>
                    <td>${r.referral_type || '-'}</td>
                    <td style="font-weight:600;">${r.client_name || '-'}</td>
                    <td style="font-size:0.82rem;">${r.contact || '-'}</td>
                    <td><span style="padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span></td>
                    <td style="font-size:0.82rem;color:#94a3b8;">${date}</td>
                    <td><button class="btn" style="padding:4px 10px;font-size:0.72rem;" onclick="event.stopPropagation();openRefDetail('${r.id}')">查看</button></td>
                </tr>`;
            }).join('');
        }

        window.openRefDetail = function(id) {
            const r = referrals.find(x => x.id === id);
            if (!r) return;
            document.getElementById('refDetailId').value = id;
            document.getElementById('refDetailAffiliate').value = `${r.affiliate_name || ''} (${r.affiliate_email || ''})`;
            document.getElementById('refDetailType').value = r.referral_type || '';
            document.getElementById('refDetailClient').value = r.client_name || '';
            document.getElementById('refDetailContact').value = r.contact || '';
            document.getElementById('refDetailNotes').textContent = r.notes || '—';
            document.getElementById('refDetailTime').value = r.created_at
                ? new Date(r.created_at).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                : '';
            document.getElementById('refDetailAdminNotes').value = r.admin_notes || '';
            document.getElementById('refDetailStatus').value = r.status || 'pending';
            document.getElementById('refDetailOverlay').classList.add('active');
        };

        document.getElementById('refDetailSave').addEventListener('click', async () => {
            const id = document.getElementById('refDetailId').value;
            const status = document.getElementById('refDetailStatus').value;
            const admin_notes = document.getElementById('refDetailAdminNotes').value.trim();
            try {
                await db.update('affiliate_referrals', { status, admin_notes }, { id: `eq.${id}` });
                const r = referrals.find(x => x.id === id);
                if (r) { r.status = status; r.admin_notes = admin_notes; }
                renderReferrals();
                closeModal('refDetailOverlay');
                showToast('已更新');
            } catch (e) { showToast('更新失敗'); }
        });

        document.getElementById('refDetailDelete').addEventListener('click', async () => {
            const id = document.getElementById('refDetailId').value;
            if (!confirm('確定刪除這筆引薦記錄？')) return;
            try {
                await db.delete('affiliate_referrals', { id: `eq.${id}` });
                referrals = referrals.filter(x => x.id !== id);
                renderReferrals();
                closeModal('refDetailOverlay');
                showToast('已刪除');
            } catch (e) { showToast('刪除失敗'); }
        });

        document.getElementById('refSearch').addEventListener('input', () => renderReferrals());
        document.getElementById('refTypeFilter').addEventListener('change', () => renderReferrals());
        document.getElementById('refStatusFilter').addEventListener('change', () => renderReferrals());
    </script>
</body>

</html>
