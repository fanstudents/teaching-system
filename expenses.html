<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>費用支出 — 數位簡報室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; background: #f5f6fa; color: #1e293b; }
        .page-header { background: #fff; border-bottom: 1px solid #e8ecf1; padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
        .page-header h1 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .page-header p { font-size: 0.76rem; color: #94a3b8; margin-top: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

        /* Controls */
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
        .controls select { padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.82rem; font-family: inherit; background: #fff; }
        .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-save { background: linear-gradient(135deg, #10b981, #34d399); color: #fff; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,.3); }
        .btn-sync { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
        .btn-sync:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.3); }
        .btn-sync:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-add { background: #eff6ff; color: #3b82f6; border: 1px dashed #93c5fd; }
        .btn-add:hover { background: #dbeafe; }
        .btn-sm { padding: 5px 12px; font-size: 0.76rem; border-radius: 6px; }
        .auto-saved { font-size: 0.72rem; color: #94a3b8; margin-left: auto; display: flex; align-items: center; gap: 3px; }

        /* Summary cards */
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .summary-card { background: #fff; border-radius: 12px; padding: 16px 18px; border: 1px solid #e8ecf1; position: relative; overflow: hidden; }
        .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .summary-card.total::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .summary-card.lec::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .summary-card.hahow::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .summary-card.personnel::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .sc-label { font-size: 0.72rem; color: #94a3b8; margin-bottom: 3px; }
        .sc-value { font-size: 1.3rem; font-weight: 700; }

        /* Tabs */
        .tab-bar { display: flex; border-bottom: 2px solid #f0f1f3; margin-bottom: 18px; gap: 0; }
        .tab-btn { padding: 10px 20px; font-size: 0.84rem; font-weight: 600; border: none; background: none; cursor: pointer; color: #94a3b8; position: relative; font-family: inherit; transition: color .15s; display: flex; align-items: center; gap: 6px; }
        .tab-btn:hover { color: #475569; }
        .tab-btn.active { color: #6366f1; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #6366f1; border-radius: 2px 2px 0 0; }
        .tab-badge { font-size: 0.62rem; padding: 1px 6px; border-radius: 10px; background: #f1f5f9; color: #64748b; font-weight: 700; }
        .tab-btn.active .tab-badge { background: #eff6ff; color: #6366f1; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Table */
        .expense-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .expense-table thead { background: #f8fafc; }
        .expense-table th { padding: 10px 12px; text-align: left; font-weight: 600; color: #64748b; font-size: 0.74rem; border-bottom: 1px solid #e8ecf1; white-space: nowrap; }
        .expense-table td { padding: 10px 12px; border-bottom: 1px solid #f0f1f3; vertical-align: middle; }
        .expense-table tr:hover { background: #fafbfc; }
        .expense-table input, .expense-table select { padding: 5px 8px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 0.8rem; font-family: inherit; }
        .expense-table input[type="number"] { width: 110px; text-align: right; font-family: 'Inter', monospace; }
        .expense-table input[type="text"] { width: 100%; min-width: 80px; }
        .expense-table select { min-width: 100px; }
        .expense-table .amount-cell { font-weight: 700; color: #ef4444; font-family: 'Inter', monospace; }

        /* Status badge */
        .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-badge.paid { background: #d1fae5; color: #059669; }

        /* Delete button */
        .btn-del { background: none; color: #cbd5e1; border: none; padding: 4px; cursor: pointer; font-size: 0; line-height: 1; }
        .btn-del:hover { color: #ef4444; }

        /* Preview button */
        .btn-preview { background: none; color: #94a3b8; border: none; padding: 4px; cursor: pointer; font-size: 0; line-height: 1; }
        .btn-preview:hover { color: #3b82f6; }

        /* Email modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 14px; width: 560px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
        .modal-header { padding: 18px 24px; border-bottom: 1px solid #e8ecf1; display: flex; align-items: center; justify-content: space-between; }
        .modal-header h3 { font-size: 0.92rem; font-weight: 700; }
        .modal-body { padding: 20px 24px; }
        .modal-body pre { background: #f8fafc; border: 1px solid #e8ecf1; border-radius: 8px; padding: 16px; font-size: 0.8rem; line-height: 1.7; white-space: pre-wrap; font-family: 'Noto Sans TC', sans-serif; }
        .modal-footer { padding: 14px 24px; border-top: 1px solid #e8ecf1; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-copy { background: #6366f1; color: #fff; }
        .btn-copy:hover { background: #4f46e5; }
        .btn-close { background: #f1f5f9; color: #64748b; }
        .btn-close:hover { background: #e2e8f0; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 0.82rem; z-index: 999; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Section */
        .section { background: #fff; border-radius: 12px; border: 1px solid #e8ecf1; overflow: hidden; }

        /* Responsive */
        @media (max-width: 768px) {
            .summary-bar { grid-template-columns: repeat(2, 1fr); }
            .expense-table { font-size: 0.76rem; }
        }
    </style>
</head>
<body>
    <script src="components/nav.js"></script>

    <div class="page-header">
        <h1><span class="material-symbols-outlined">payments</span> 費用支出</h1>
        <p>每月合作夥伴費用管理 — 講師費、平台分潤、專案人事費</p>
    </div>

    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <select id="monthSelect"></select>
            <button class="btn btn-sync" id="btnSync" onclick="syncFromBudget()">
                <span class="material-symbols-outlined" style="font-size:16px;">sync</span> 同步成本表
            </button>
            <button class="btn btn-save" onclick="saveExpenses()">
                <span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存
            </button>
            <span class="auto-saved" id="autoSaved"></span>
        </div>

        <!-- Summary -->
        <div class="summary-bar">
            <div class="summary-card total"><div class="sc-label">本月總支出</div><div class="sc-value" id="totalAmount">NT$ 0</div></div>
            <div class="summary-card lec"><div class="sc-label">🎓 講師費</div><div class="sc-value" id="lecTotal">NT$ 0</div></div>
            <div class="summary-card hahow"><div class="sc-label">🎬 Hahow 分潤</div><div class="sc-value" id="hahowTotal">NT$ 0</div></div>
            <div class="summary-card personnel"><div class="sc-label">👥 專案人事費</div><div class="sc-value" id="personnelTotal">NT$ 0</div></div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('lecturer')">🎓 講師費 <span class="tab-badge" id="lecCount">0</span></button>
            <button class="tab-btn" onclick="switchTab('hahow')">🎬 Hahow 分潤 <span class="tab-badge" id="hahowCount">0</span></button>
            <button class="tab-btn" onclick="switchTab('personnel')">👥 專案人事費 <span class="tab-badge" id="personnelCount">0</span></button>
        </div>

        <!-- Lecturer Tab -->
        <div class="tab-panel active" id="panel-lecturer">
            <div class="section">
                <div style="overflow-x:auto;">
                    <table class="expense-table">
                        <thead>
                            <tr>
                                <th>收款人</th>
                                <th>關聯專案/課程</th>
                                <th>費用類型</th>
                                <th style="text-align:right;">金額</th>
                                <th>收款方式</th>
                                <th>狀態</th>
                                <th>備註</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="lecturerBody"></tbody>
                    </table>
                </div>
                <div style="padding:12px 16px;">
                    <button class="btn btn-add btn-sm" onclick="addExpense('lecturer')">
                        <span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增講師費
                    </button>
                </div>
            </div>
        </div>

        <!-- Hahow Tab -->
        <div class="tab-panel" id="panel-hahow">
            <div class="section">
                <div style="overflow-x:auto;">
                    <table class="expense-table">
                        <thead>
                            <tr>
                                <th>收款人</th>
                                <th>課程名稱</th>
                                <th>費用類型</th>
                                <th style="text-align:right;">實收金額</th>
                                <th style="text-align:right;">分潤金額</th>
                                <th>收款方式</th>
                                <th>狀態</th>
                                <th>備註</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="hahowBody"></tbody>
                    </table>
                </div>
                <div style="padding:12px 16px;">
                    <button class="btn btn-add btn-sm" onclick="addExpense('hahow')">
                        <span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增 Hahow 分潤
                    </button>
                </div>
            </div>
        </div>

        <!-- Personnel Tab -->
        <div class="tab-panel" id="panel-personnel">
            <div class="section">
                <div style="overflow-x:auto;">
                    <table class="expense-table">
                        <thead>
                            <tr>
                                <th>收款人</th>
                                <th>關聯專案</th>
                                <th>費用類型</th>
                                <th style="text-align:right;">金額</th>
                                <th>收款方式</th>
                                <th>狀態</th>
                                <th>備註</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="personnelBody"></tbody>
                    </table>
                </div>
                <div style="padding:12px 16px;">
                    <button class="btn btn-add btn-sm" onclick="addExpense('personnel')">
                        <span class="material-symbols-outlined" style="font-size:14px;">add</span> 新增人事費
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Email Preview Modal -->
    <div class="modal-overlay" id="emailModal">
        <div class="modal">
            <div class="modal-header">
                <h3><span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle;">mail</span> 付款通知信預覽</h3>
                <button class="btn btn-close btn-sm" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="emailContent"></pre>
            </div>
            <div class="modal-footer">
                <button class="btn btn-copy btn-sm" onclick="copyEmail()">
                    <span class="material-symbols-outlined" style="font-size:14px;">content_copy</span> 複製內容
                </button>
                <button class="btn btn-close btn-sm" onclick="closeModal()">關閉</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import db from './scripts/supabase.js';
        window._db = db;
    </script>
    <script>
    // ── Config ──
    const STORE_KEY = 'tbr_expenses';
    const TABS = ['lecturer', 'hahow', 'personnel'];
    const FEE_TYPES = {
        lecturer: ['鐘點費', '銷售分潤', '課程開發費', '其他'],
        hahow: ['銷售分潤', '課程開發費', '其他'],
        personnel: ['專案執行費', '助教費', '推廣費', '行政費', '其他']
    };
    const PAY_METHODS = ['公司匯款', '個人匯款'];

    let expenses = { lecturer: [], hahow: [], personnel: [] };
    let partners = []; // from user_profiles
    let budgetProducts = []; // synced from cost_budgets
    let nextId = 1;

    // ── Month selector ──
    function initMonths() {
        var sel = document.getElementById('monthSelect');
        var now = new Date();
        for (var i = -2; i <= 3; i++) {
            var d = new Date(now.getFullYear(), now.getMonth() + i, 1);
            var val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            var opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            if (i === 0) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.addEventListener('change', function() { loadMonth(sel.value); });
    }

    // ── Tab switching ──
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(function(b, i) {
            b.classList.toggle('active', TABS[i] === tab);
        });
        document.querySelectorAll('.tab-panel').forEach(function(p, i) {
            p.classList.toggle('active', TABS[i] === tab);
        });
    };

    // ── CRUD ──
    window.addExpense = function(tab) {
        expenses[tab].push({
            id: nextId++,
            payee: '',
            project: '',
            feeType: FEE_TYPES[tab][0],
            amount: 0,
            revenue: 0, // for hahow
            payMethod: PAY_METHODS[0],
            status: 'pending',
            note: '',
            email: ''
        });
        renderTab(tab);
        recalculate();
    };

    window.removeExpense = function(tab, id) {
        expenses[tab] = expenses[tab].filter(function(e) { return e.id !== id; });
        renderTab(tab);
        recalculate();
    };

    window.updateExpense = function(tab, id, field, value) {
        var item = expenses[tab].find(function(e) { return e.id === id; });
        if (!item) return;
        if (field === 'amount' || field === 'revenue') {
            item[field] = parseFloat(value) || 0;
        } else {
            item[field] = value;
        }
        recalculate();
    };

    window.toggleStatus = function(tab, id) {
        var item = expenses[tab].find(function(e) { return e.id === id; });
        if (!item) return;
        item.status = item.status === 'pending' ? 'paid' : 'pending';
        renderTab(tab);
    };

    // ── Render ──
    function renderTab(tab) {
        var body = document.getElementById(tab + 'Body');
        var list = expenses[tab];
        document.getElementById(tab + 'Count').textContent = list.length;

        if (!list.length) {
            body.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:#94a3b8;font-size:.8rem;">尚無項目</td></tr>';
            return;
        }

        var projectOptions = budgetProducts.map(function(p) {
            return '<option value="' + (p.name || '').replace(/"/g, '&quot;') + '">' + (p.name || '未命名') + '</option>';
        }).join('');

        var partnerOptions = partners.map(function(p) {
            return '<option value="' + (p.name || '').replace(/"/g, '&quot;') + '">' + (p.name || '') + '</option>';
        }).join('');

        body.innerHTML = list.map(function(e) {
            var feeOpts = (FEE_TYPES[tab] || []).map(function(f) {
                return '<option value="' + f + '"' + (e.feeType === f ? ' selected' : '') + '>' + f + '</option>';
            }).join('');

            var payOpts = PAY_METHODS.map(function(m) {
                return '<option value="' + m + '"' + (e.payMethod === m ? ' selected' : '') + '>' + m + '</option>';
            }).join('');

            var statusClass = e.status === 'paid' ? 'paid' : 'pending';
            var statusText = e.status === 'paid' ? '已付款' : '待付款';

            var cols = '';
            // Payee
            cols += '<td><input type="text" value="' + (e.payee || '') + '" placeholder="姓名" list="partnerList" oninput="updateExpense(\'' + tab + '\',' + e.id + ',\'payee\',this.value)"></td>';

            // Project / Course
            cols += '<td><input type="text" value="' + (e.project || '') + '" placeholder="專案名稱" list="projectList" oninput="updateExpense(\'' + tab + '\',' + e.id + ',\'project\',this.value)"></td>';

            // Fee type
            cols += '<td><select onchange="updateExpense(\'' + tab + '\',' + e.id + ',\'feeType\',this.value)">' + feeOpts + '</select></td>';

            // Hahow has revenue + amount, others just amount
            if (tab === 'hahow') {
                cols += '<td><input type="number" value="' + (e.revenue || '') + '" placeholder="0" oninput="updateExpense(\'' + tab + '\',' + e.id + ',\'revenue\',this.value)"></td>';
            }
            cols += '<td><input type="number" class="amount-cell" value="' + (e.amount || '') + '" placeholder="0" oninput="updateExpense(\'' + tab + '\',' + e.id + ',\'amount\',this.value)"></td>';

            // Pay method
            cols += '<td><select onchange="updateExpense(\'' + tab + '\',' + e.id + ',\'payMethod\',this.value)">' + payOpts + '</select></td>';

            // Status
            cols += '<td><button class="status-badge ' + statusClass + '" onclick="toggleStatus(\'' + tab + '\',' + e.id + ')">' + statusText + '</button></td>';

            // Note
            cols += '<td><input type="text" value="' + (e.note || '') + '" placeholder="備註" style="width:80px;" oninput="updateExpense(\'' + tab + '\',' + e.id + ',\'note\',this.value)"></td>';

            // Actions
            cols += '<td style="white-space:nowrap;">' +
                '<button class="btn-preview" onclick="previewEmail(\'' + tab + '\',' + e.id + ')" title="預覽信件"><span class="material-symbols-outlined" style="font-size:16px;">mail</span></button>' +
                '<button class="btn-del" onclick="removeExpense(\'' + tab + '\',' + e.id + ')" title="刪除"><span class="material-symbols-outlined" style="font-size:16px;">close</span></button>' +
            '</td>';

            return '<tr>' + cols + '</tr>';
        }).join('');
    }

    function renderAll() {
        TABS.forEach(function(t) { renderTab(t); });
        recalculate();
    }

    function recalculate() {
        var totals = { lecturer: 0, hahow: 0, personnel: 0 };
        TABS.forEach(function(t) {
            expenses[t].forEach(function(e) { totals[t] += (e.amount || 0); });
        });
        var grand = totals.lecturer + totals.hahow + totals.personnel;
        document.getElementById('totalAmount').textContent = 'NT$ ' + grand.toLocaleString();
        document.getElementById('lecTotal').textContent = 'NT$ ' + totals.lecturer.toLocaleString();
        document.getElementById('hahowTotal').textContent = 'NT$ ' + totals.hahow.toLocaleString();
        document.getElementById('personnelTotal').textContent = 'NT$ ' + totals.personnel.toLocaleString();
    }

    // ── Datalists ──
    function buildDataLists() {
        var existing = document.getElementById('partnerList');
        if (existing) existing.remove();
        existing = document.getElementById('projectList');
        if (existing) existing.remove();

        var dl1 = document.createElement('datalist');
        dl1.id = 'partnerList';
        partners.forEach(function(p) {
            var opt = document.createElement('option');
            opt.value = p.name || '';
            dl1.appendChild(opt);
        });
        document.body.appendChild(dl1);

        var dl2 = document.createElement('datalist');
        dl2.id = 'projectList';
        budgetProducts.forEach(function(p) {
            var opt = document.createElement('option');
            opt.value = p.name || '';
            dl2.appendChild(opt);
        });
        document.body.appendChild(dl2);
    }

    // ── Save / Load ──
    window.saveExpenses = function() {
        var month = document.getElementById('monthSelect').value;
        var data = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        data[month] = { expenses: expenses, updatedAt: new Date().toISOString() };
        localStorage.setItem(STORE_KEY, JSON.stringify(data));

        // Also push to cost_budgets JSONB
        if (window._db) {
            window._db.select('cost_budgets', { filter: { month: 'eq.' + month }, limit: 1 }).then(function(res) {
                if (res.data && res.data.length > 0) {
                    var existing = res.data[0].data || {};
                    existing.expenses = expenses;
                    window._db.update('cost_budgets', { data: existing }, { month: 'eq.' + month }).catch(function(err) {
                        console.warn('[expenses save to supabase]', err);
                    });
                }
            }).catch(function() {});
        }

        document.getElementById('autoSaved').innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> ' + new Date().toLocaleTimeString('zh-TW') + ' 已儲存';
        showToast('已儲存');
    };

    function loadMonth(month) {
        // Try localStorage first
        var data = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        var saved = data[month];
        if (saved && saved.expenses) {
            expenses = saved.expenses;
            // fix IDs
            TABS.forEach(function(t) {
                (expenses[t] || []).forEach(function(e) { if (!e.id) e.id = nextId++; else if (e.id >= nextId) nextId = e.id + 1; });
            });
        } else {
            expenses = { lecturer: [], hahow: [], personnel: [] };
        }
        renderAll();
    }

    // ── Sync from cost_budgets ──
    window.syncFromBudget = async function() {
        var month = document.getElementById('monthSelect').value;
        var btn = document.getElementById('btnSync');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">hourglass_empty</span> 同步中...';

        try {
            // Fetch cost_budgets and user_profiles in parallel
            var db = window._db;
            if (!db) throw new Error('Supabase 未初始化');

            var results = await Promise.all([
                db.select('cost_budgets', { filter: { month: 'eq.' + month }, limit: 1 }),
                db.select('user_profiles', { select: 'id,name,email,role,payment_method', order: 'name.asc', limit: 500 }).catch(function() { return { data: [] }; })
            ]);

            var budgetData = (results[0].data && results[0].data.length > 0) ? results[0].data[0].data : null;
            partners = (results[1].data || []).filter(function(p) { return p.name; });
            buildDataLists();

            if (budgetData && budgetData.products) {
                // Flatten all products into a list with source info
                budgetProducts = [];
                var allProducts = budgetData.products;
                ['b2b', 'b2c'].forEach(function(group) {
                    (allProducts[group] || []).forEach(function(p) {
                        budgetProducts.push({
                            name: p.name || '未命名',
                            group: group,
                            lecturerFee: p.lecturerFee || 0,
                            lecturerType: p.lecturerType || 'fixed',
                            lecturerPercent: p.lecturerPercent || 0,
                            revenue: p.revenue || 0,
                            assistant: p.assistant || 0,
                            personnel: p.personnel || 0,
                            sessions: p.sessions || []
                        });
                    });
                });
                // biz groups
                ['marketing', 'dev'].forEach(function(group) {
                    (allProducts[group] || []).forEach(function(p) {
                        budgetProducts.push({
                            name: p.name || '未命名',
                            group: group,
                            personnel: p.personnel || 0
                        });
                    });
                });
                buildDataLists();

                // Load saved expenses from budget JSONB
                if (budgetData.expenses) {
                    // Merge: keep existing entries, don't overwrite
                    TABS.forEach(function(t) {
                        if (budgetData.expenses[t] && budgetData.expenses[t].length > 0 && (!expenses[t] || expenses[t].length === 0)) {
                            expenses[t] = budgetData.expenses[t].map(function(e) { e.id = nextId++; return e; });
                        }
                    });
                }
            }

            renderAll();
            showToast('已同步 ' + budgetProducts.length + ' 個專案/課程、' + partners.length + ' 位夥伴');
        } catch (err) {
            console.error('[sync]', err);
            showToast('同步失敗: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">sync</span> 同步成本表';
        }
    };

    // ── Email preview ──
    window.previewEmail = function(tab, id) {
        var item = expenses[tab].find(function(e) { return e.id === id; });
        if (!item) return;

        var month = document.getElementById('monthSelect').value;
        var feeLabel = item.feeType || '費用';
        var content =
            item.payee + ' 您好，\n\n' +
            '以下為您 ' + month + ' 的費用明細：\n\n' +
            '━━━━━━━━━━━━━━━━━━\n' +
            '📋 專案/課程：' + (item.project || '—') + '\n' +
            '💼 費用類型：' + feeLabel + '\n' +
            '💰 應付金額：NT$ ' + (item.amount || 0).toLocaleString() + '\n' +
            '🏦 付款方式：' + (item.payMethod || '—') + '\n' +
            '━━━━━━━━━━━━━━━━━━\n\n' +
            '如有疑問請回覆此信件，謝謝！\n\n' +
            '數位簡報室 TBR Digital';

        document.getElementById('emailContent').textContent = content;
        document.getElementById('emailModal').classList.add('open');
    };

    window.closeModal = function() {
        document.getElementById('emailModal').classList.remove('open');
    };

    window.copyEmail = function() {
        var text = document.getElementById('emailContent').textContent;
        navigator.clipboard.writeText(text).then(function() {
            showToast('已複製到剪貼簿');
        }).catch(function() {
            // Fallback
            var ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('已複製到剪貼簿');
        });
    };

    // ── Toast ──
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    // ── Init ──
    initMonths();
    loadMonth(document.getElementById('monthSelect').value);
    // Auto sync on load
    setTimeout(function() {
        if (window._db) syncFromBudget();
    }, 600);
    </script>
</body>
</html>
