<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營運費用 | 教學系統</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <style>
        :root { --accent: #4f46e5; --accent-light: #eef2ff; --text: #1e293b; --text-secondary: #64748b; --text-muted: #94a3b8; --border: #e2e8f0; --bg: #f8fafc; --card: #fff; --positive: #059669; --negative: #dc2626; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .page-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
        .page-header h1 { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .page-header h1 .material-symbols-outlined { color: var(--text-secondary); }
        .page-header p { font-size: 0.76rem; color: var(--text-muted); margin-top: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
        .controls select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.82rem; font-family: inherit; background: var(--card); }
        .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.25); }
        .auto-saved { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 3px; }

        /* Summary */
        .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
        .summary-card { background: var(--card); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); }
        .sc-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 3px; }
        .sc-value { font-size: 1.3rem; font-weight: 700; color: var(--negative); }

        /* 2-column grid */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

        /* Section */
        .section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .section-header { padding: 12px 18px; border-bottom: 1px solid #f0f1f3; display: flex; align-items: center; gap: 8px; }
        .section-header h3 { font-size: 0.86rem; font-weight: 600; }
        .section-body { padding: 10px 14px; }

        /* Tool rows */
        .tool-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; padding: 7px 10px; border-radius: 8px; transition: background .15s; }
        .tool-row:hover { background: var(--bg); }
        .tool-logo { width: 22px; height: 22px; border-radius: 5px; object-fit: contain; flex-shrink: 0; }
        .tool-logo-fallback { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .tool-name { flex: 1; font-size: 0.8rem; font-weight: 500; }
        .tool-input { width: 100px; padding: 5px 8px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; }
        .tool-input:focus { outline: none; border-color: var(--accent); }
        .cost-subtotal { font-size: 0.8rem; font-weight: 700; color: var(--negative); text-align: right; padding: 8px 10px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }

        /* Personnel */
        .personnel-row { display: grid; grid-template-columns: 1fr 100px 100px 32px; gap: 6px; align-items: center; padding: 6px 10px; border-radius: 8px; margin-bottom: 4px; transition: background .15s; }
        .personnel-row:hover { background: var(--bg); }
        .personnel-header { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; padding: 4px 10px; }
        .p-input { width: 100%; padding: 5px 8px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.8rem; font-family: inherit; }
        .p-input:focus { outline: none; border-color: var(--accent); }
        .p-input-num { text-align: right; font-family: 'Inter', monospace; }
        .btn-add { background: var(--bg); color: var(--text-secondary); border: 1px dashed var(--border); padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-add:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
        .btn-del { background: none; color: var(--text-muted); border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-del:hover { color: var(--negative); }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: .82rem; transform: translateY(100px); opacity: 0; transition: all .3s; z-index: 999; }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .summary-bar { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="admin-main">
    <div class="page-header">
        <h1><span class="material-symbols-outlined">account_balance</span> 營運費用</h1>
        <p>系統訂閱、平臺服務與人事費用的月度管理</p>
    </div>
    <div class="container">
        <div class="controls">
            <select id="monthSelect"></select>
            <button class="btn btn-save" id="btnSave"><span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存</button>
            <span class="auto-saved" id="autoSaved"></span>
        </div>

        <div class="summary-bar">
            <div class="summary-card"><div class="sc-label">系統費用</div><div class="sc-value" id="systemTotal">NT$ 0</div></div>
            <div class="summary-card"><div class="sc-label">平臺費用</div><div class="sc-value" id="platformTotal">NT$ 0</div></div>
            <div class="summary-card"><div class="sc-label">人事費用</div><div class="sc-value" id="personnelTotal">NT$ 0</div></div>
        </div>

        <!-- 2-column: System + Platform -->
        <div class="two-col" style="margin-bottom:18px;">
            <div class="section">
                <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">smart_toy</span><h3>系統費用</h3></div>
                <div class="section-body" id="systemTools"></div>
            </div>
            <div class="section">
                <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">dns</span><h3>平臺費用</h3></div>
                <div class="section-body" id="platformTools"></div>
            </div>
        </div>

        <!-- Personnel (full-width) -->
        <div class="section">
            <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">group</span><h3>人事費用</h3></div>
            <div class="section-body">
                <div class="personnel-row personnel-header">
                    <span>姓名 / 角色</span>
                    <span style="text-align:right;">費用類型</span>
                    <span style="text-align:right;">金額</span>
                    <span></span>
                </div>
                <div id="personnelList"></div>
                <button class="btn-add" onclick="window.addPersonnel()" style="margin-top:6px;">
                    <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">add</span> 新增人員
                </button>
                <div class="cost-subtotal" style="margin-top:10px;"><span>人事費用小計</span><span id="personnel_subtotal">NT$ 0</span></div>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { db } from './scripts/supabase.js';

const STORE_KEY = 'op_expenses';
const monthSelect = document.getElementById('monthSelect');

// Tool definitions with real logos
const SYSTEM_TOOLS = [
    { id: 'tool_google', name: 'Google Workspace', logo: 'https://www.gstatic.com/images/branding/product/2x/hh_google_apps_icon_dp.png' },
    { id: 'tool_chatgpt', name: 'ChatGPT', logo: 'assets/tool-logos/chatgpt.svg' },
    { id: 'tool_claude', name: 'Claude', logo: 'assets/tool-logos/claude.png' },
    { id: 'tool_canva', name: 'Canva', logo: 'assets/tool-logos/canva.svg' },
    { id: 'tool_notion', name: 'Notion', logo: 'assets/tool-logos/notion.png' },
    { id: 'tool_gamma', name: 'Gamma', logo: 'assets/tool-logos/gamma.ico' },
    { id: 'tool_manus', name: 'Manus', fallback: { color: '#e74c3c', letter: 'M' } },
    { id: 'tool_lovable', name: 'Lovable', logo: 'assets/tool-logos/lovable.png' },
    { id: 'tool_antigravity', name: 'Antigravity', fallback: { color: '#1e293b', letter: 'A' } },
];

const PLATFORM_TOOLS = [
    { id: 'plat_teachify', name: 'Teachify', fallback: { color: '#6366f1', letter: 'T' } },
    { id: 'plat_kit', name: 'Kit (ConvertKit)', fallback: { color: '#f59e0b', letter: 'K' } },
    { id: 'plat_zeabur', name: 'Zeabur', fallback: { color: '#4f46e5', letter: 'Z' } },
    { id: 'plat_supabase', name: 'Supabase', fallback: { color: '#3ecf8e', letter: 'S' } },
    { id: 'plat_make', name: 'Make', logo: 'assets/tool-logos/make.svg' },
];

let personnelData = [];

// ── Month Selector ──
function initMonths() {
    const now = new Date();
    for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = `${d.getFullYear()} 年 ${d.getMonth()+1} 月`;
        const opt = document.createElement('option');
        opt.value = val; opt.textContent = label;
        monthSelect.appendChild(opt);
    }
    monthSelect.addEventListener('change', loadData);
}

// ── Render Tool Rows ──
function renderToolSection(containerId, tools) {
    const container = document.getElementById(containerId);
    container.innerHTML = tools.map(t => {
        const icon = t.logo
            ? `<img class="tool-logo" src="${t.logo}" alt="${t.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="tool-logo-fallback" style="display:none;background:${t.fallback?.color||'#94a3b8'};">${t.fallback?.letter||t.name[0]}</div>`
            : `<div class="tool-logo-fallback" style="background:${t.fallback.color};">${t.fallback.letter}</div>`;
        return `<div class="tool-row">${icon}<div class="tool-name">${t.name}</div><input type="number" class="tool-input" id="${t.id}" placeholder="0" oninput="window.recalculate()"></div>`;
    }).join('') + `<div class="cost-subtotal"><span>小計</span><span id="${containerId}_subtotal">NT$ 0</span></div>`;
}

// ── Personnel ──
function renderPersonnel() {
    const list = document.getElementById('personnelList');
    list.innerHTML = personnelData.map((p, i) =>
        `<div class="personnel-row">
            <input type="text" class="p-input" value="${p.name || ''}" placeholder="姓名 / 角色" oninput="window.updatePersonnel(${i},'name',this.value)">
            <select class="p-input" onchange="window.updatePersonnel(${i},'type',this.value)" style="font-size:.76rem;">
                <option value="講師費" ${p.type==='講師費'?'selected':''}>講師費</option>
                <option value="助教費" ${p.type==='助教費'?'selected':''}>助教費</option>
                <option value="專案執行" ${p.type==='專案執行'?'selected':''}>專案執行</option>
                <option value="兼職人事" ${p.type==='兼職人事'?'selected':''}>兼職人事</option>
                <option value="推廣分潤" ${p.type==='推廣分潤'?'selected':''}>推廣分潤</option>
                <option value="其他" ${p.type==='其他'?'selected':''}>其他</option>
            </select>
            <input type="number" class="p-input p-input-num" value="${p.amount || ''}" placeholder="0" oninput="window.updatePersonnel(${i},'amount',this.value)">
            <button class="btn-del" onclick="window.removePersonnel(${i})"><span class="material-symbols-outlined" style="font-size:15px;">close</span></button>
        </div>`
    ).join('');
    recalculate();
}

window.addPersonnel = function() {
    personnelData.push({ name: '', type: '講師費', amount: 0 });
    renderPersonnel();
};
window.updatePersonnel = function(i, field, value) {
    personnelData[i][field] = field === 'amount' ? (parseFloat(value) || 0) : value;
    recalculate();
};
window.removePersonnel = function(i) {
    personnelData.splice(i, 1);
    renderPersonnel();
};

// ── Recalculate ──
function recalculate() {
    const val = id => parseFloat(document.getElementById(id)?.value) || 0;
    const systemCost = SYSTEM_TOOLS.reduce((s, t) => s + val(t.id), 0);
    const platformCost = PLATFORM_TOOLS.reduce((s, t) => s + val(t.id), 0);
    const personnelCost = personnelData.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);

    document.getElementById('systemTools_subtotal').textContent = `NT$ ${systemCost.toLocaleString()}`;
    document.getElementById('platformTools_subtotal').textContent = `NT$ ${platformCost.toLocaleString()}`;
    document.getElementById('personnel_subtotal').textContent = `NT$ ${personnelCost.toLocaleString()}`;

    document.getElementById('systemTotal').textContent = `NT$ ${systemCost.toLocaleString()}`;
    document.getElementById('platformTotal').textContent = `NT$ ${platformCost.toLocaleString()}`;
    document.getElementById('personnelTotal').textContent = `NT$ ${personnelCost.toLocaleString()}`;
}
window.recalculate = recalculate;

// ── Load / Save ──
async function loadData() {
    const month = monthSelect.value;
    let saved = null;
    try {
        const result = await db.select('cost_budgets', { filter: { month: `eq.${month}` }, limit: 1 });
        if (result.data?.[0]?.data?.opExpenses) saved = result.data[0].data.opExpenses;
    } catch (e) { console.warn('[load]', e); }

    if (!saved) {
        const local = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        saved = local[month] || null;
    }

    [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
        const el = document.getElementById(t.id);
        if (el) el.value = saved?.tools?.[t.id] || '';
    });
    personnelData = saved?.personnel || [];
    renderPersonnel();
    recalculate();
}

async function saveAll() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;animation:spin .7s linear infinite;">progress_activity</span> 儲存中…';

    const month = monthSelect.value;
    const toolsData = {};
    [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
        toolsData[t.id] = parseFloat(document.getElementById(t.id)?.value) || 0;
    });
    const payload = { tools: toolsData, personnel: personnelData };

    try {
        const existing = await db.select('cost_budgets', { filter: { month: `eq.${month}` }, limit: 1 });
        let existingData = existing.data?.[0]?.data || {};
        existingData.opExpenses = payload;
        const { error } = await db.insert('cost_budgets', { month, data: existingData, updated_at: new Date().toISOString() }, { onConflict: 'month' });
        if (error) throw new Error(error.message || JSON.stringify(error));

        const all = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        all[month] = payload;
        localStorage.setItem(STORE_KEY, JSON.stringify(all));
        showToast('已儲存至雲端 ✓');
        document.getElementById('autoSaved').innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;color:var(--positive);">cloud_done</span> ${new Date().toLocaleTimeString('zh-TW')} 已儲存`;
    } catch (err) {
        console.error('[save]', err);
        const all = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
        all[month] = payload;
        localStorage.setItem(STORE_KEY, JSON.stringify(all));
        showToast('雲端儲存失敗，已存到本地 ⚠️');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存';
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

renderToolSection('systemTools', SYSTEM_TOOLS);
renderToolSection('platformTools', PLATFORM_TOOLS);
initMonths();
loadData();
document.getElementById('btnSave').addEventListener('click', saveAll);
</script>
<script src="components/nav.js"></script>
</body>
</html>
