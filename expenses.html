<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營運費用 | 教學系統</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <style>
        :root {
            --accent: #6366f1; --accent-light: #eef2ff; --accent-glow: rgba(99,102,241,.12);
            --text: #1e293b; --text-secondary: #475569; --text-muted: #94a3b8;
            --border: #e2e8f0; --border-light: #f1f5f9;
            --bg: #f1f5f9; --card: #ffffff;
            --positive: #10b981; --negative: #ef4444;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
            --radius: 14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        .page-header {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a5b4fc 100%);
            padding: 24px 32px; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(99,102,241,.2);
        }
        .page-header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; color: #fff; }
        .page-header h1 .material-symbols-outlined { color: rgba(255,255,255,.8); }
        .page-header p { font-size: 0.76rem; color: rgba(255,255,255,.7); margin-top: 3px; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 24px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .controls select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.82rem; font-family: inherit; background: var(--card); box-shadow: var(--shadow-sm); }
        .btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 20px; border: none; border-radius: 10px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-save { background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.3); }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.35); }
        .auto-saved { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 3px; }
        .carry-hint { font-size: .72rem; color: var(--accent); background: var(--accent-light); padding: 8px 16px; border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(99,102,241,.15); }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
        .summary-card { background: var(--card); border-radius: var(--radius); padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .sc-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .sc-value { font-size: 1.2rem; font-weight: 700; color: var(--negative); }
        .sc-value.total { color: var(--text); }
        .section { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        .section-header { padding: 14px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 8px; background: linear-gradient(to bottom, #fafbfd, var(--card)); }
        .section-header h3 { font-size: 0.88rem; font-weight: 700; }
        .section-body { padding: 6px 0; }
        .tool-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .tool-table thead th { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border); }
        .tool-table thead th:first-child { text-align: left; width: 36%; }
        .tool-table thead th:not(:first-child) { width: 16%; }
        .tool-table tbody td { padding: 6px 12px; vertical-align: middle; text-align: right; }
        .tool-table tbody td:first-child { text-align: left; }
        .tool-table tbody tr { transition: all .15s; }
        .tool-table tbody tr:hover { background: var(--accent-glow); }
        .tool-cell { display: flex; align-items: center; gap: 8px; }
        .tool-logo { width: 22px; height: 22px; border-radius: 5px; object-fit: contain; flex-shrink: 0; }
        .tool-logo-fallback { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .tool-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; }
        .tool-input { width: 100%; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.8rem; font-family: 'Inter', monospace; text-align: right; transition: border-color .15s, box-shadow .15s; }
        .tool-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .row-total { font-size: 0.78rem; font-weight: 600; color: var(--negative); }
        .cost-subtotal { font-size: 0.82rem; font-weight: 700; color: var(--negative); text-align: right; padding: 10px 14px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; }
        .personnel-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .personnel-table thead th { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .personnel-table thead th:nth-child(2) { width: 100px; }
        .personnel-table thead th:nth-child(3) { width: 110px; text-align: right; }
        .personnel-table thead th:last-child { width: 36px; }
        .personnel-table tbody td { padding: 5px 12px; vertical-align: middle; }
        .personnel-table tbody tr { transition: all .15s; }
        .personnel-table tbody tr:hover { background: var(--accent-glow); }
        .p-input { width: 100%; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.8rem; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
        .p-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .p-input-num { text-align: right; font-family: 'Inter', monospace; }
        .btn-add { background: var(--card); color: var(--text-secondary); border: 1.5px dashed var(--border); padding: 7px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; margin: 10px 12px; transition: all .15s; }
        .btn-add:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
        .btn-del { background: none; color: var(--text-muted); border: none; padding: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .15s; }
        .btn-del:hover { color: var(--negative); }
        .toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 12px 22px; border-radius: 12px; font-size: .82rem; transform: translateY(100px); opacity: 0; transition: all .3s; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
        .toast.show { transform: translateY(0); opacity: 1; }
        @media (max-width: 700px) { .summary-bar { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="admin-main">
    <div class="page-header">
        <h1><span class="material-symbols-outlined">account_balance</span> 營運費用</h1>
        <p>系統訂閱、平臺服務與人事費用的月度管理</p>
    </div>
    <div class="container">
        <div class="controls">
            <select id="monthSelect"></select>
            <button class="btn btn-save" id="btnSave"><span class="material-symbols-outlined" style="font-size:16px;">save</span> 儲存</button>
            <span class="auto-saved" id="autoSaved"></span>
        </div>
        <div class="carry-hint" id="carryHint" style="display:none;">
            <span class="material-symbols-outlined" style="font-size:15px;">info</span>
            基本月費已從上月帶入，額外費用和一次性費用每月獨立填寫
        </div>

        <div class="summary-bar">
            <div class="summary-card"><div class="sc-label">基本月費</div><div class="sc-value" id="monthlyTotal">NT$ 0</div></div>
            <div class="summary-card"><div class="sc-label">額外費用</div><div class="sc-value" id="extraTotal">NT$ 0</div></div>
            <div class="summary-card"><div class="sc-label">一次性費用</div><div class="sc-value" id="onetimeTotal">NT$ 0</div></div>
            <div class="summary-card"><div class="sc-label">本月合計</div><div class="sc-value total" id="grandTotal">NT$ 0</div></div>
        </div>

        <!-- System Tools -->
        <div class="section">
            <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">smart_toy</span><h3>系統費用</h3></div>
            <div class="section-body" id="systemTools"></div>
        </div>

        <!-- Platform -->
        <div class="section">
            <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">dns</span><h3>平臺費用</h3></div>
            <div class="section-body" id="platformTools"></div>
        </div>

        <!-- Personnel -->
        <div class="section">
            <div class="section-header"><span class="material-symbols-outlined" style="font-size:18px;">group</span><h3>人事費用</h3></div>
            <div class="section-body" style="padding:6px 0;">
                <table class="personnel-table">
                    <thead><tr><th>姓名 / 角色</th><th>費用類型</th><th style="text-align:right;">金額</th><th></th></tr></thead>
                    <tbody id="personnelList"></tbody>
                </table>
                <button class="btn-add" onclick="window.addPersonnel()">
                    <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">add</span> 新增人員
                </button>
                <div class="cost-subtotal"><span>人事費用小計</span><span id="personnel_subtotal">NT$ 0</span></div>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { db } from './scripts/supabase.js';

const SUPABASE_URL = 'https://wsaknnhjgiqmkendeyrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzYWtubmhqZ2lxbWtlbmRleXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTI4MTIsImV4cCI6MjA4NzY4ODgxMn0.1j-4D9Kw0vqhVcTWgU7ABTJ_mO6aN4IB72Ojof8Yfko';
const monthSelect = document.getElementById('monthSelect');

const SYSTEM_TOOLS = [
    { id: 'tool_google', name: 'Google Workspace', logo: 'https://www.gstatic.com/images/branding/product/2x/hh_google_apps_icon_dp.png' },
    { id: 'tool_chatgpt', name: 'ChatGPT', logo: 'assets/tool-logos/chatgpt.svg' },
    { id: 'tool_claude', name: 'Claude', logo: 'assets/tool-logos/claude.png' },
    { id: 'tool_canva', name: 'Canva', logo: 'assets/tool-logos/canva.svg' },
    { id: 'tool_notion', name: 'Notion', logo: 'assets/tool-logos/notion.png' },
    { id: 'tool_gamma', name: 'Gamma', logo: 'assets/tool-logos/gamma.ico' },
    { id: 'tool_manus', name: 'Manus', fallback: { color: '#e74c3c', letter: 'M' } },
    { id: 'tool_lovable', name: 'Lovable', logo: 'assets/tool-logos/lovable.png' },
    { id: 'tool_antigravity', name: 'Antigravity', fallback: { color: '#1e293b', letter: 'A' } },
];

const PLATFORM_TOOLS = [
    { id: 'plat_teachify', name: 'Teachify', fallback: { color: '#6366f1', letter: 'T' } },
    { id: 'plat_kit', name: 'Kit (ConvertKit)', fallback: { color: '#f59e0b', letter: 'K' } },
    { id: 'plat_zeabur', name: 'Zeabur', fallback: { color: '#4f46e5', letter: 'Z' } },
    { id: 'plat_supabase', name: 'Supabase', fallback: { color: '#3ecf8e', letter: 'S' } },
    { id: 'plat_make', name: 'Make', logo: 'assets/tool-logos/make.svg' },
];

let personnelData = [];

// ── Month Selector ──
function initMonths() {
    const now = new Date();
    for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = `${d.getFullYear()} 年 ${d.getMonth()+1} 月`;
        const opt = document.createElement('option');
        opt.value = val; opt.textContent = label;
        monthSelect.appendChild(opt);
    }
    monthSelect.addEventListener('change', loadData);
}

// ── Render Tool Table ──
function renderToolSection(containerId, tools) {
    const container = document.getElementById(containerId);
    const rows = tools.map(t => {
        const icon = t.logo
            ? `<img class="tool-logo" src="${t.logo}" alt="${t.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="tool-logo-fallback" style="display:none;background:${t.fallback?.color||'#94a3b8'};">${t.fallback?.letter||t.name[0]}</div>`
            : `<div class="tool-logo-fallback" style="background:${t.fallback.color};">${t.fallback.letter}</div>`;
        return `<tr>
            <td><div class="tool-cell">${icon}<span class="tool-name">${t.name}</span></div></td>
            <td><input type="number" class="tool-input" id="${t.id}_monthly" placeholder="0" oninput="window.recalculate()"></td>
            <td><input type="number" class="tool-input" id="${t.id}_extra" placeholder="0" oninput="window.recalculate()"></td>
            <td><input type="number" class="tool-input" id="${t.id}_onetime" placeholder="0" oninput="window.recalculate()"></td>
            <td class="row-total" id="${t.id}_total">0</td>
        </tr>`;
    }).join('');

    container.innerHTML = `<table class="tool-table">
        <thead><tr><th>工具</th><th>基本月費</th><th>額外費用</th><th>一次性</th><th>小計</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>
    <div class="cost-subtotal"><span>小計</span><span id="${containerId}_subtotal">NT$ 0</span></div>`;
}

// ── Personnel ──
function renderPersonnel() {
    const list = document.getElementById('personnelList');
    list.innerHTML = personnelData.map((p, i) =>
        `<tr>
            <td><input type="text" class="p-input" value="${p.name || ''}" placeholder="姓名 / 角色" oninput="window.updatePersonnel(${i},'name',this.value)"></td>
            <td><select class="p-input" onchange="window.updatePersonnel(${i},'type',this.value)" style="font-size:.74rem;">
                <option value="講師費" ${p.type==='講師費'?'selected':''}>講師費</option>
                <option value="助教費" ${p.type==='助教費'?'selected':''}>助教費</option>
                <option value="專案執行" ${p.type==='專案執行'?'selected':''}>專案執行</option>
                <option value="兼職人事" ${p.type==='兼職人事'?'selected':''}>兼職人事</option>
                <option value="推廣分潤" ${p.type==='推廣分潤'?'selected':''}>推廣分潤</option>
                <option value="其他" ${p.type==='其他'?'selected':''}>其他</option>
            </select></td>
            <td><input type="number" class="p-input p-input-num" value="${p.amount || ''}" placeholder="0" oninput="window.updatePersonnel(${i},'amount',this.value)"></td>
            <td><button class="btn-del" onclick="window.removePersonnel(${i})"><span class="material-symbols-outlined" style="font-size:15px;">close</span></button></td>
        </tr>`
    ).join('');
    recalculate();
}

window.addPersonnel = function() { personnelData.push({ name: '', type: '講師費', amount: 0 }); renderPersonnel(); };
window.updatePersonnel = function(i, field, value) { personnelData[i][field] = field === 'amount' ? (parseFloat(value) || 0) : value; recalculate(); };
window.removePersonnel = function(i) { personnelData.splice(i, 1); renderPersonnel(); };

// ── Recalculate ──
function recalculate() {
    const val = id => parseFloat(document.getElementById(id)?.value) || 0;
    let totalMonthly = 0, totalExtra = 0, totalOnetime = 0;

    [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
        const m = val(t.id + '_monthly');
        const e = val(t.id + '_extra');
        const o = val(t.id + '_onetime');
        totalMonthly += m; totalExtra += e; totalOnetime += o;
        const el = document.getElementById(t.id + '_total');
        if (el) el.textContent = (m+e+o) > 0 ? (m+e+o).toLocaleString() : '0';
    });

    const calcSection = tools => tools.reduce((s,t) => s + val(t.id+'_monthly') + val(t.id+'_extra') + val(t.id+'_onetime'), 0);
    document.getElementById('systemTools_subtotal').textContent = 'NT$ ' + calcSection(SYSTEM_TOOLS).toLocaleString();
    document.getElementById('platformTools_subtotal').textContent = 'NT$ ' + calcSection(PLATFORM_TOOLS).toLocaleString();

    const personnelCost = personnelData.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
    document.getElementById('personnel_subtotal').textContent = 'NT$ ' + personnelCost.toLocaleString();

    document.getElementById('monthlyTotal').textContent = 'NT$ ' + totalMonthly.toLocaleString();
    document.getElementById('extraTotal').textContent = 'NT$ ' + totalExtra.toLocaleString();
    document.getElementById('onetimeTotal').textContent = 'NT$ ' + totalOnetime.toLocaleString();
    document.getElementById('grandTotal').textContent = 'NT$ ' + (totalMonthly + totalExtra + totalOnetime + personnelCost).toLocaleString();
}
window.recalculate = recalculate;

// ── Load / Save (anon key for RLS) ──
const hdr = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
const base = SUPABASE_URL + '/rest/v1';

// Get previous month string
function prevMonth(m) {
    const [y, mo] = m.split('-').map(Number);
    const d = new Date(y, mo - 2, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function fetchMonthData(month) {
    try {
        const res = await fetch(base + '/cost_budgets?month=eq.' + month + '&limit=1', { headers: hdr });
        const rows = await res.json();
        return (rows && rows.length > 0) ? rows[0] : null;
    } catch { return null; }
}

async function loadData() {
    const month = monthSelect.value;
    const row = await fetchMonthData(month);
    let saved = row?.data?.opExpenses || null;
    let carried = false;

    // If no data for this month, carry over 基本月費 from previous month
    if (!saved) {
        const prev = await fetchMonthData(prevMonth(month));
        const prevSaved = prev?.data?.opExpenses;
        if (prevSaved?.tools) {
            saved = { tools: {}, personnel: prevSaved.personnel || [] };
            // Only carry monthly fees, not extra/onetime
            [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
                saved.tools[t.id + '_monthly'] = prevSaved.tools[t.id + '_monthly'] || prevSaved.tools[t.id] || 0;
            });
            carried = true;
        }
    }

    // Backward compat: old format { tool_id: value } → monthly
    if (saved?.tools && saved.tools.tool_google !== undefined && saved.tools.tool_google_monthly === undefined) {
        [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
            if (saved.tools[t.id] !== undefined) {
                saved.tools[t.id + '_monthly'] = saved.tools[t.id];
            }
        });
    }

    // Populate inputs
    [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
        ['monthly', 'extra', 'onetime'].forEach(suffix => {
            const el = document.getElementById(t.id + '_' + suffix);
            if (el) el.value = saved?.tools?.[t.id + '_' + suffix] || '';
        });
    });
    personnelData = saved?.personnel || [];
    renderPersonnel();
    recalculate();

    document.getElementById('carryHint').style.display = carried ? 'flex' : 'none';
}

async function saveAll() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = '儲存中…';
    const month = monthSelect.value;

    const toolsData = {};
    [...SYSTEM_TOOLS, ...PLATFORM_TOOLS].forEach(t => {
        ['monthly', 'extra', 'onetime'].forEach(suffix => {
            toolsData[t.id + '_' + suffix] = parseFloat(document.getElementById(t.id + '_' + suffix)?.value) || 0;
        });
    });
    const payload = { tools: toolsData, personnel: personnelData };

    try {
        const existing = await fetchMonthData(month);
        let res;
        if (existing) {
            const merged = { ...existing.data, opExpenses: payload };
            res = await fetch(base + '/cost_budgets?month=eq.' + month, {
                method: 'PATCH', headers: { ...hdr, 'Prefer': 'return=representation' },
                body: JSON.stringify({ data: merged, updated_at: new Date().toISOString() })
            });
        } else {
            res = await fetch(base + '/cost_budgets', {
                method: 'POST', headers: { ...hdr, 'Prefer': 'return=representation' },
                body: JSON.stringify([{ month, data: { opExpenses: payload }, updated_at: new Date().toISOString() }])
            });
        }
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + res.status); }
        showToast('已儲存至雲端 ✓');
        document.getElementById('autoSaved').innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;color:var(--positive);">cloud_done</span> ' + new Date().toLocaleTimeString('zh-TW') + ' 已儲存';
        document.getElementById('carryHint').style.display = 'none';
    } catch (err) {
        console.error('[save]', err);
        showToast('儲存失敗: ' + (err.message || '').substring(0, 40));
    } finally {
        btn.disabled = false;
        btn.textContent = '儲存';
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

renderToolSection('systemTools', SYSTEM_TOOLS);
renderToolSection('platformTools', PLATFORM_TOOLS);
initMonths();
loadData();
document.getElementById('btnSave').addEventListener('click', saveAll);
