<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Noto Sans TC', sans-serif">
<style>
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes drawLine { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes progressFill { from { width: 0; } to { width: 100%; } }

  .title { animation: slideUp 0.6s ease-out both; }
  .title-line { animation: drawLine 0.6s ease-out 0.3s both; stroke-dasharray: 200; }
  .row-1 { animation: slideRight 0.45s ease-out 0.4s both; }
  .row-2 { animation: slideRight 0.45s ease-out 0.55s both; }
  .row-3 { animation: slideRight 0.45s ease-out 0.7s both; }
  .row-4 { animation: slideRight 0.45s ease-out 0.85s both; }
  .row-5 { animation: slideRight 0.45s ease-out 1.0s both; }
  .footer { animation: fadeIn 0.4s ease-out 1.3s both; }

  .step-card { cursor: pointer; }
  .step-card .card-bg { transition: opacity 0.25s; opacity: 0; }
  .step-card:hover .card-bg { opacity: 1; }
  .step-card:hover .step-kw { fill: #0f4f2f; }
  .step-card:hover .step-desc { fill: #1e293b; }
  .step-card:hover .step-tool { opacity: 1; }
  .step-kw { transition: fill 0.2s; }
  .step-desc { transition: fill 0.2s; }
  .step-tool { transition: opacity 0.2s; opacity: 0.6; }

  .dot { cursor: pointer; transition: r 0.2s, filter 0.2s; }
  .dot:hover { r: 20; filter: drop-shadow(0 0 10px rgba(22,163,74,0.45)); }

  .num { animation: scaleIn 0.35s ease-out both; }
  .num-1 { animation-delay: 0.4s; transform-origin: 98px 143px; }
  .num-2 { animation-delay: 0.55s; transform-origin: 98px 218px; }
  .num-3 { animation-delay: 0.7s; transform-origin: 98px 293px; }
  .num-4 { animation-delay: 0.85s; transform-origin: 98px 368px; }
  .num-5 { animation-delay: 1.0s; transform-origin: 98px 443px; }

  /* 進度條動畫 */
  .progress-track { animation: fadeIn 0.3s ease-out 1.2s both; }
  .progress-fill { animation: progressFill 1s ease-out 1.3s both; }
</style>

<!-- 背景 -->
<rect width="960" height="540" fill="#ffffff" rx="16"/>

<!-- 頂部色帶 -->
<rect x="0" y="0" width="960" height="5" rx="2.5" fill="url(#topG)"/>
<defs>
  <linearGradient id="topG" x1="0" y1="0" x2="960" y2="0">
    <stop offset="0%" stop-color="#16a34a"/>
    <stop offset="50%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#4ade80"/>
  </linearGradient>
  <linearGradient id="progG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#16a34a"/>
    <stop offset="100%" stop-color="#4ade80"/>
  </linearGradient>
</defs>

<!-- 標題 -->
<text class="title" x="80" y="68" font-size="28" font-weight="800" fill="#1e293b">AI 簡報的最佳工作流</text>
<line class="title-line" x1="80" y1="82" x2="300" y2="82" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
<text class="title" x="880" y="68" text-anchor="end" font-size="13" font-weight="500" fill="#94a3b8" style="animation-delay:0.3s;">5 步驟高效產出專業簡報</text>

<!-- ═══ Step 1 ═══ -->
<g class="row-1 step-card">
  <rect class="card-bg" x="65" y="105" width="830" height="70" rx="12" fill="#f0fdf4"/>
  <circle class="dot num num-1" cx="98" cy="140" r="16" fill="#16a34a"/>
  <text x="98" y="146" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">1</text>
  <text class="step-kw" x="130" y="135" font-size="18" font-weight="800" fill="#16a34a">AI 產大綱</text>
  <text x="272" y="135" font-size="15" fill="#94a3b8">→</text>
  <text class="step-desc" x="300" y="135" font-size="16" font-weight="500" fill="#475569">用 Claude / ChatGPT 整理簡報結構</text>
  <text class="step-tool" x="300" y="158" font-size="12" font-weight="600" fill="#94a3b8">🛠️ Claude · ChatGPT · Gemini</text>
  <rect class="step-tool" x="790" y="123" width="72" height="28" rx="8" fill="rgba(22,163,74,0.08)"/>
  <text class="step-tool" x="826" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">結構化</text>
</g>

<!-- ═══ Step 2 ═══ -->
<g class="row-2 step-card">
  <rect class="card-bg" x="65" y="180" width="830" height="70" rx="12" fill="#f0fdf4"/>
  <circle class="dot num num-2" cx="98" cy="215" r="16" fill="#22c55e"/>
  <text x="98" y="221" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">2</text>
  <text class="step-kw" x="130" y="210" font-size="18" font-weight="800" fill="#16a34a">AI 生成初版</text>
  <text x="302" y="210" font-size="15" fill="#94a3b8">→</text>
  <text class="step-desc" x="330" y="210" font-size="16" font-weight="500" fill="#475569">用 Gamma 快速產出視覺化簡報</text>
  <text class="step-tool" x="330" y="233" font-size="12" font-weight="600" fill="#94a3b8">🛠️ Gamma · Beautiful.ai · Tome</text>
  <rect class="step-tool" x="790" y="198" width="72" height="28" rx="8" fill="rgba(22,163,74,0.08)"/>
  <text class="step-tool" x="826" y="217" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">視覺化</text>
</g>

<!-- ═══ Step 3 ═══ -->
<g class="row-3 step-card">
  <rect class="card-bg" x="65" y="255" width="830" height="70" rx="12" fill="#f0fdf4"/>
  <circle class="dot num num-3" cx="98" cy="290" r="16" fill="#4ade80"/>
  <text x="98" y="296" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">3</text>
  <text class="step-kw" x="130" y="285" font-size="18" font-weight="800" fill="#16a34a">人工優化</text>
  <text x="272" y="285" font-size="15" fill="#94a3b8">→</text>
  <text class="step-desc" x="300" y="285" font-size="16" font-weight="500" fill="#475569">品牌色、公司 Logo、關鍵數據校正</text>
  <text class="step-tool" x="300" y="308" font-size="12" font-weight="600" fill="#94a3b8">👤 人工介入確保品牌一致性</text>
  <rect class="step-tool" x="790" y="273" width="72" height="28" rx="8" fill="rgba(234,179,8,0.08)"/>
  <text class="step-tool" x="826" y="292" text-anchor="middle" font-size="12" font-weight="700" fill="#ca8a04">品牌化</text>
</g>

<!-- ═══ Step 4 ═══ -->
<g class="row-4 step-card">
  <rect class="card-bg" x="65" y="330" width="830" height="70" rx="12" fill="#f0fdf4"/>
  <circle class="dot num num-4" cx="98" cy="365" r="16" fill="#86efac"/>
  <text x="98" y="371" text-anchor="middle" font-size="13" font-weight="800" fill="#166534">4</text>
  <text class="step-kw" x="130" y="360" font-size="18" font-weight="800" fill="#16a34a">設計加分</text>
  <text x="272" y="360" font-size="15" fill="#94a3b8">→</text>
  <text class="step-desc" x="300" y="360" font-size="16" font-weight="500" fill="#475569">用更好的圖片模型產生高質感圖片</text>
  <text class="step-tool" x="300" y="383" font-size="12" font-weight="600" fill="#94a3b8">🛠️ Midjourney · DALL-E · Ideogram</text>
  <rect class="step-tool" x="790" y="348" width="72" height="28" rx="8" fill="rgba(22,163,74,0.08)"/>
  <text class="step-tool" x="826" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">質感</text>
</g>

<!-- ═══ Step 5 ═══ -->
<g class="row-5 step-card">
  <rect class="card-bg" x="65" y="405" width="830" height="70" rx="12" fill="#f0fdf4"/>
  <circle class="dot num num-5" cx="98" cy="440" r="16" fill="#bbf7d0"/>
  <text x="98" y="446" text-anchor="middle" font-size="13" font-weight="800" fill="#166534">5</text>
  <text class="step-kw" x="130" y="435" font-size="18" font-weight="800" fill="#16a34a">最終檢查</text>
  <text x="290" y="435" font-size="15" fill="#94a3b8">→</text>
  <text class="step-desc" x="318" y="435" font-size="16" font-weight="500" fill="#475569">AI 校稿 + 人工確認</text>
  <text class="step-tool" x="318" y="458" font-size="12" font-weight="600" fill="#94a3b8">🛠️ AI 檢查錯字 · 人工最終審核</text>
  <rect class="step-tool" x="790" y="423" width="72" height="28" rx="8" fill="rgba(99,102,241,0.08)"/>
  <text class="step-tool" x="826" y="442" text-anchor="middle" font-size="12" font-weight="700" fill="#6366f1">交付</text>
</g>

<!-- 底部進度條 -->
<g class="footer">
  <rect class="progress-track" x="80" y="498" width="800" height="6" rx="3" fill="#f1f5f9"/>
  <rect class="progress-fill" x="80" y="498" width="800" height="6" rx="3" fill="url(#progG)"/>
  <text x="480" y="528" text-anchor="middle" font-size="13" font-weight="500" fill="#94a3b8">AI 輔助 × 人工把關 = 專業級簡報 🎯</text>
</g>
</svg>
