<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Noto Sans TC', sans-serif">
<defs>
  <style>
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }

    .title { animation: slideUp 0.5s ease both; }
    .subtitle { animation: slideUp 0.5s ease 0.12s both; }
    .row-1 { animation: slideRight 0.45s ease 0.25s both; }
    .row-2 { animation: slideRight 0.45s ease 0.35s both; }
    .row-3 { animation: slideRight 0.45s ease 0.45s both; }
    .row-4 { animation: slideRight 0.45s ease 0.55s both; }
    .row-5 { animation: slideRight 0.45s ease 0.65s both; }
    .row-6 { animation: slideRight 0.45s ease 0.75s both; }
    .auto-bar { animation: fadeIn 0.5s ease 0.85s both; }
    .source { animation: fadeIn 0.4s ease 1.0s both; }

    .mode-card { cursor: pointer; }
    .mode-card .card-bg { transition: fill 0.2s, stroke 0.2s, filter 0.2s; }
    .mode-card:hover .card-bg { fill: #f0f4ff; stroke: #a5b4fc; filter: drop-shadow(0 3px 8px rgba(99,102,241,0.1)); }
  </style>

  <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#fafbff"/>
    <stop offset="100%" stop-color="#f0f4ff"/>
  </linearGradient>

  <linearGradient id="autoGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="20%" stop-color="#06b6d4"/>
    <stop offset="40%" stop-color="#0ea5e9"/>
    <stop offset="60%" stop-color="#22c55e"/>
    <stop offset="80%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#94a3b8"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="960" height="540" fill="url(#bgGrad)"/>

<!-- Title -->
<g class="title">
  <text x="480" y="38" text-anchor="middle" font-size="27" font-weight="800" fill="#1e293b">Vibe Coding 資料連接模式</text>
</g>
<g class="subtitle">
  <text x="480" y="60" text-anchor="middle" font-size="13" font-weight="500" fill="#94a3b8">六種方式將外部資料接進你的應用 — 從全自動到手動</text>
</g>

<!-- Automation level bar (left) -->
<g class="auto-bar">
  <rect x="48" y="82" width="8" height="410" rx="4" fill="url(#autoGrad)" opacity="0.55"/>
  <text x="52" y="77" text-anchor="middle" font-size="10" font-weight="700" fill="#6366f1">⚡ 自動</text>
  <text x="52" y="506" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">✋ 手動</text>
</g>

<!-- ── 1. API 串接 ── -->
<g class="row-1 mode-card">
  <rect class="card-bg" x="80" y="78" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="111" r="16" fill="#6366f1"/>
  <text x="114" y="117" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">1</text>
  <rect x="142" y="93" width="36" height="36" rx="9" fill="#eef2ff"/>
  <text x="160" y="117" text-anchor="middle" font-size="18">🔌</text>
  <text x="192" y="105" font-size="16" font-weight="800" fill="#1e293b">API 串接</text>
  <text x="192" y="125" font-size="12" fill="#64748b">請 AI 讀取 API 文件，提供授權金鑰，自動完成資料拉取</text>
  <!-- n8n / Make 附註 -->
  <rect x="610" y="95" width="148" height="20" rx="10" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="684" y="109" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">含 n8n、Make 等平台</text>
  <rect x="764" y="95" width="56" height="20" rx="10" fill="#eef2ff"/>
  <text x="792" y="109" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">全自動</text>
  <rect x="764" y="119" width="56" height="20" rx="10" fill="#f0fdf4"/>
  <text x="792" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">即時</text>
  <title>API 串接：將 API 文件和授權提供給 AI，自動串接第三方服務。n8n、Make 等視覺化自動化平台也屬於此類</title>
</g>

<!-- ── 2. MCP 協定 ── -->
<g class="row-2 mode-card">
  <rect class="card-bg" x="80" y="150" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="183" r="16" fill="#06b6d4"/>
  <text x="114" y="189" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">2</text>
  <rect x="142" y="165" width="36" height="36" rx="9" fill="#ecfeff"/>
  <text x="160" y="189" text-anchor="middle" font-size="18">🔗</text>
  <text x="192" y="177" font-size="16" font-weight="800" fill="#1e293b">MCP 協定連接</text>
  <text x="192" y="197" font-size="12" fill="#64748b">服務支援 MCP（Model Context Protocol），AI 可直接連通索取結構化資料</text>
  <rect x="764" y="167" width="64" height="20" rx="10" fill="#ecfeff"/>
  <text x="796" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#0891b2">直接連通</text>
  <rect x="764" y="191" width="64" height="20" rx="10" fill="#f0fdf4"/>
  <text x="796" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">標準化</text>
  <title>MCP 連接：服務若支援 Model Context Protocol，AI 可透過標準協定直接存取資料</title>
</g>

<!-- ── 3. 資料庫直連 ── -->
<g class="row-3 mode-card">
  <rect class="card-bg" x="80" y="222" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="255" r="16" fill="#0ea5e9"/>
  <text x="114" y="261" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">3</text>
  <rect x="142" y="237" width="36" height="36" rx="9" fill="#e0f2fe"/>
  <text x="160" y="261" text-anchor="middle" font-size="18">🗄️</text>
  <text x="192" y="249" font-size="16" font-weight="800" fill="#1e293b">資料庫直連</text>
  <text x="192" y="269" font-size="12" fill="#64748b">直接連接 PostgreSQL、MySQL 等資料庫，AI 透過 SQL 查詢即時讀寫資料</text>
  <rect x="764" y="239" width="64" height="20" rx="10" fill="#e0f2fe"/>
  <text x="796" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">即時讀寫</text>
  <rect x="764" y="263" width="64" height="20" rx="10" fill="#e0f2fe"/>
  <text x="796" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">高效能</text>
  <title>資料庫直連：提供資料庫連線資訊，AI 直接用 SQL 查詢與寫入，適合大量結構化資料</title>
</g>

<!-- ── 4. 爬蟲 ── -->
<g class="row-4 mode-card">
  <rect class="card-bg" x="80" y="294" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="327" r="16" fill="#22c55e"/>
  <text x="114" y="333" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">4</text>
  <rect x="142" y="309" width="36" height="36" rx="9" fill="#f0fdf4"/>
  <text x="160" y="333" text-anchor="middle" font-size="18">🕷️</text>
  <text x="192" y="321" font-size="16" font-weight="800" fill="#1e293b">公開資料爬蟲</text>
  <text x="192" y="341" font-size="12" fill="#64748b">針對公開網頁資料，讓 AI 撰寫爬蟲自動擷取、解析並匯入系統</text>
  <rect x="764" y="311" width="64" height="20" rx="10" fill="#f0fdf4"/>
  <text x="796" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">自動擷取</text>
  <rect x="764" y="335" width="64" height="20" rx="10" fill="#fef3c7"/>
  <text x="796" y="349" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">需維護</text>
  <title>爬蟲：AI 自動撰寫爬蟲程式，從公開網頁擷取資料並結構化匯入</title>
</g>

<!-- ── 5. Excel ── -->
<g class="row-5 mode-card">
  <rect class="card-bg" x="80" y="366" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="399" r="16" fill="#f59e0b"/>
  <text x="114" y="405" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">5</text>
  <rect x="142" y="381" width="36" height="36" rx="9" fill="#fef3c7"/>
  <text x="160" y="405" text-anchor="middle" font-size="18">📊</text>
  <text x="192" y="393" font-size="16" font-weight="800" fill="#1e293b">上傳 Excel / CSV</text>
  <text x="192" y="413" font-size="12" fill="#64748b">將既有的試算表檔案上傳，AI 自動解析欄位並匯入資料庫</text>
  <rect x="764" y="383" width="64" height="20" rx="10" fill="#fef3c7"/>
  <text x="796" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">半自動</text>
  <rect x="764" y="407" width="64" height="20" rx="10" fill="#fef3c7"/>
  <text x="796" y="421" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">批次</text>
  <title>Excel 上傳：將現有的 Excel 或 CSV 檔案上傳，AI 解析並寫入資料庫</title>
</g>

<!-- ── 6. 手動輸入 ── -->
<g class="row-6 mode-card">
  <rect class="card-bg" x="80" y="438" width="840" height="66" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <circle cx="114" cy="471" r="16" fill="#94a3b8"/>
  <text x="114" y="477" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">6</text>
  <rect x="142" y="453" width="36" height="36" rx="9" fill="#f1f5f9"/>
  <text x="160" y="477" text-anchor="middle" font-size="18">⌨️</text>
  <text x="192" y="465" font-size="16" font-weight="800" fill="#1e293b">手動輸入</text>
  <text x="192" y="485" font-size="12" fill="#64748b">在介面上直接 key 入資料，適合少量、一次性或需要人工判斷的內容</text>
  <rect x="764" y="455" width="64" height="20" rx="10" fill="#f1f5f9"/>
  <text x="796" y="469" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">手動</text>
  <rect x="764" y="479" width="64" height="20" rx="10" fill="#f1f5f9"/>
  <text x="796" y="493" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">最彈性</text>
  <title>手動輸入：在應用介面上直接輸入資料，最彈性但最耗人力</title>
</g>

<!-- Source -->
<g class="source">
  <text x="480" y="528" text-anchor="middle" font-size="10" fill="#cbd5e1">數位簡報室 — Vibe Coding 資料連接模式（2026）</text>
</g>

</svg>
