<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif">
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- 舊曲線填充 -->
    <linearGradient id="oldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.05"/>
    </linearGradient>
    <!-- 新曲線填充 -->
    <linearGradient id="newFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08"/>
    </linearGradient>
    <!-- 新曲線邊線漸層 -->
    <linearGradient id="newStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- 光暈 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSmall">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="540" fill="url(#bgGrad)" rx="16"/>

  <!-- 網格線 -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="120" y1="100" x2="120" y2="420"/>
    <line x1="270" y1="100" x2="270" y2="420"/>
    <line x1="420" y1="100" x2="420" y2="420"/>
    <line x1="570" y1="100" x2="570" y2="420"/>
    <line x1="720" y1="100" x2="720" y2="420"/>
    <line x1="870" y1="100" x2="870" y2="420"/>
    <line x1="120" y1="180" x2="870" y2="180"/>
    <line x1="120" y1="260" x2="870" y2="260"/>
    <line x1="120" y1="340" x2="870" y2="340"/>
  </g>

  <!-- X 軸 -->
  <line x1="120" y1="420" x2="870" y2="420" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- X 軸刻度 -->
  <g fill="rgba(255,255,255,0.35)" font-size="12" text-anchor="middle">
    <text x="195" y="445">20</text>
    <text x="345" y="445">40</text>
    <text x="420" y="445" font-weight="600" fill="rgba(255,255,255,0.5)">50</text>
    <text x="495" y="445">60</text>
    <text x="570" y="445" font-weight="600" fill="rgba(255,255,255,0.5)">70</text>
    <text x="720" y="445">90</text>
    <text x="795" y="445">100</text>
  </g>
  <text x="495" y="475" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="middle" letter-spacing="2">能力分數</text>

  <!-- ═══ 舊曲線（50 分為中心）═══ -->
  <!-- 鐘型曲線 mean=420(50分), σ≈120px -->
  <path d="M120,420 C180,418 230,400 280,370 C310,350 350,290 380,220 C395,180 410,155 420,145
           C430,155 445,180 460,220 C490,290 530,350 560,370 C610,400 660,418 720,420 Z"
        fill="url(#oldFill)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s" fill="freeze"/>
  </path>
  <path d="M120,420 C180,418 230,400 280,370 C310,350 350,290 380,220 C395,180 410,155 420,145
           C430,155 445,180 460,220 C490,290 530,350 560,370 C610,400 660,418 720,420"
        fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.7" dur="1s" begin="0.5s" fill="freeze"/>
  </path>

  <!-- 50 分標記線 -->
  <line x1="420" y1="145" x2="420" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.6s" begin="1.2s" fill="freeze"/>
  </line>
  <!-- 50 分標籤 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
    <rect x="392" y="118" width="56" height="24" rx="6" fill="rgba(148,163,184,0.2)" stroke="rgba(148,163,184,0.3)" stroke-width="1"/>
    <text x="420" y="135" fill="#94a3b8" font-size="13" font-weight="700" text-anchor="middle">50 分</text>
  </g>

  <!-- ═══ 新曲線（70 分為中心，動畫滑入）═══ -->
  <!-- 鐘型曲線 mean=570(70分), σ≈100px (更集中) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="2.5s" fill="freeze"/>

    <path d="M270,420 C330,418 380,395 420,365 C450,340 490,275 520,205 C535,170 555,150 570,140
             C585,150 605,170 620,205 C650,275 690,340 720,365 C760,395 810,418 870,420 Z"
          fill="url(#newFill)"/>
    <path d="M270,420 C330,418 380,395 420,365 C450,340 490,275 520,205 C535,170 555,150 570,140
             C585,150 605,170 620,205 C650,275 690,340 720,365 C760,395 810,418 870,420"
          fill="none" stroke="url(#newStroke)" stroke-width="3" stroke-linecap="round" filter="url(#glowSmall)"/>

    <!-- 70 分標記線 -->
    <line x1="570" y1="140" x2="570" y2="420" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>

    <!-- 70 分標籤 -->
    <rect x="542" y="108" width="56" height="24" rx="6" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
    <text x="570" y="125" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">70 分</text>
  </g>

  <!-- ═══ 箭頭動畫：50→70 ═══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="3.8s" fill="freeze"/>
    <!-- 箭頭線 -->
    <line x1="430" y1="90" x2="555" y2="90" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 箭頭頭 -->
    <polygon points="560,90 550,83 550,97" fill="#fbbf24"/>
    <!-- +20 標籤 -->
    <rect x="470" y="70" width="48" height="20" rx="10" fill="#fbbf24"/>
    <text x="494" y="84" fill="#0f172a" font-size="11" font-weight="800" text-anchor="middle">+20</text>
  </g>

  <!-- ═══ 標題 ═══ -->
  <text x="495" y="45" fill="#fff" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="0.5" opacity="0">
    AI 時代：平均水準的全面提升
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- ═══ 圖例 ═══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="4.5s" fill="freeze"/>

    <!-- Before -->
    <rect x="140" y="490" width="16" height="3" rx="1.5" fill="#94a3b8" opacity="0.7"/>
    <text x="164" y="496" fill="rgba(255,255,255,0.45)" font-size="12">AI 前 — 人類平均 50 分</text>

    <!-- After -->
    <rect x="460" y="490" width="16" height="3" rx="1.5" fill="url(#newStroke)"/>
    <text x="484" y="496" fill="rgba(255,255,255,0.45)" font-size="12">AI 後 — 人類平均 70 分</text>

    <!-- 洞察 -->
    <text x="797" y="496" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="end">全民能力基線上移</text>
  </g>

  <!-- ═══ 右側說明卡片 ═══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="5s" fill="freeze"/>
    <rect x="740" y="160" width="195" height="150" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <text x="760" y="188" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="1">關鍵洞察</text>
    <line x1="760" y1="198" x2="915" y2="198" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="760" y="220" fill="rgba(255,255,255,0.7)" font-size="11.5">
      <tspan x="760" dy="0">🔺 AI 讓每個人都能產出</tspan>
      <tspan x="770" dy="18">更高品質的工作成果</tspan>
      <tspan x="760" dy="24">📉 低於 70 分的產出</tspan>
      <tspan x="770" dy="18">將逐漸被淘汰</tspan>
      <tspan x="760" dy="24">⚡ 競爭門檻永久提升</tspan>
    </text>
  </g>
</svg>
