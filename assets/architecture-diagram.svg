      <rect x="62" y="164" width="100" height="24" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="112" y="180" text-anchor="middle" fill="#94a3b8">post-class.html</text>
      <rect x="168" y="164" width="100" height="24" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
