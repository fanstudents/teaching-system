    <rect x="300" y="492" width="180" height="36" rx="8" fill="#1c1917" stroke="#57534e" stroke-width="1"/>
    <text x="390" y="515" text-anchor="middle" fill="#fbbf24" font-weight="500">Email 發信服務</text>

    <rect x="520" y="492" width="180" height="36" rx="8" fill="#1c1917" stroke="#57534e" stroke-width="1"/>
    <text x="610" y="515" text-anchor="middle" fill="#fbbf24" font-weight="500">AI / LLM API</text>

    <rect x="740" y="492" width="180" height="36" rx="8" fill="#1c1917" stroke="#57534e" stroke-width="1"/>
    <text x="830" y="515" text-anchor="middle" fill="#fbbf24" font-weight="500">CDN / 靜態部署</text>
  </g>
