    <text x="580" y="384" text-anchor="middle" fill="#64748b" font-size="9">圖片上傳</text>
    <text x="580" y="400" text-anchor="middle" fill="#64748b" font-size="9">作業附件</text>
    <text x="580" y="416" text-anchor="middle" fill="#64748b" font-size="9">靜態資源</text>
  </g>

