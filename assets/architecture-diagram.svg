  <line x1="550" y1="438" x2="550" y2="456" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <g filter="url(#s)" font-size="10">
    <rect x="80" y="492" width="180" height="36" rx="8" fill="#1c1917" stroke="#57534e" stroke-width="1"/>
