      <rect x="254" y="370" width="64" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="286" y="383" text-anchor="middle" fill="#94a3b8">submissions</text>
      <rect x="62" y="394" width="60" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="92" y="407" text-anchor="middle" fill="#94a3b8">survey_*</text>
      <rect x="126" y="394" width="60" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="156" y="407" text-anchor="middle" fill="#94a3b8">checklist_*</text>
      <rect x="190" y="394" width="60" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="220" y="407" text-anchor="middle" fill="#94a3b8">exam_*</text>
      <rect x="254" y="394" width="64" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="286" y="407" text-anchor="middle" fill="#94a3b8">email_drafts</text>
    </g>
  </g>

