<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Noto Sans TC', sans-serif">
<style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes drawCircle { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }

  .bg { animation: fadeIn 0.3s ease-out both; }
  .avatar-ring { animation: drawCircle 1s ease-out 0.3s both; stroke-dasharray: 500; }
  .avatar-fill { animation: scaleIn 0.5s ease-out 0.5s both; transform-origin: 120px 160px; }
  .name { animation: slideUp 0.5s ease-out 0.3s both; }
  .title-text { animation: slideUp 0.5s ease-out 0.5s both; }
  .divider { animation: fadeIn 0.4s ease-out 0.6s both; }
  .platform { animation: slideRight 0.4s ease-out 0.7s both; }
  .client-grid { animation: fadeIn 0.5s ease-out 0.8s both; }
  .photo-area { animation: slideUp 0.4s ease-out 1.0s both; }

  .client-tag { cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
  .client-tag:hover { opacity: 1 !important; }
  .client-tag:hover rect { filter: brightness(0.95); }
  .client-tag:hover text { fill: #1e293b !important; }
  .platform-badge { cursor: pointer; transition: filter 0.2s; }
  .platform-badge:hover { filter: brightness(1.1) drop-shadow(0 2px 6px rgba(0,0,0,0.12)); }
  .photo-card { cursor: pointer; transition: filter 0.2s, transform 0.15s; }
  .photo-card:hover { filter: brightness(1.05) drop-shadow(0 3px 10px rgba(0,0,0,0.15)); }
</style>

<!-- 背景 -->
<rect class="bg" width="960" height="540" rx="16" fill="#ffffff"/>

<!-- 左側深色區塊 -->
<rect class="bg" x="0" y="0" width="240" height="540" rx="16" fill="#0f172a"/>
<rect class="bg" x="16" y="0" width="224" height="540" fill="#0f172a"/>

<!-- 頭像區域 -->
<circle class="avatar-ring" cx="120" cy="160" r="72" fill="none" stroke="#6366f1" stroke-width="3"/>
<circle class="avatar-fill" cx="120" cy="160" r="68" fill="#1e293b"/>
<text x="120" y="150" text-anchor="middle" font-size="42" fill="#e2e8f0" style="animation: scaleIn 0.5s ease-out 0.6s both;">🧑‍💼</text>
<text x="120" y="185" text-anchor="middle" font-size="11" fill="#64748b" style="animation: fadeIn 0.4s ease-out 0.7s both;">SPEAKER</text>

<!-- 左側資訊 -->
<text class="name" x="120" y="265" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">樊松蒲</text>
<text class="name" x="120" y="292" text-anchor="middle" font-size="16" font-weight="600" fill="#a5b4fc" style="animation-delay:0.4s;">Dennis</text>

<line class="divider" x1="50" y1="310" x2="190" y2="310" stroke="#334155" stroke-width="1"/>

<text class="title-text" x="120" y="340" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">數位簡報室 創辦人</text>
<text class="title-text" x="120" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" style="animation-delay:0.55s;">AI 內訓講師</text>

<!-- 左側活動圖示 -->
<g class="photo-area">
  <rect x="30" y="395" width="85" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="72" y="432" text-anchor="middle" font-size="24">🎤</text>
  <rect x="125" y="395" width="85" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="167" y="432" text-anchor="middle" font-size="24">👥</text>
  <text x="120" y="485" text-anchor="middle" font-size="11" fill="#64748b">企業培訓 ∙ 實戰工作坊</text>
</g>

<!-- ═══ 右側內容 ═══ -->

<!-- 合作平台 -->
<g class="platform">
  <text x="280" y="50" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="2">合作平台</text>
  
  <g class="platform-badge">
    <rect x="780" y="28" width="110" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="835" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">hahow</text>
  </g>
  <g class="platform-badge">
    <rect x="780" y="68" width="110" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="835" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">PressPlay</text>
  </g>
  <g class="platform-badge">
    <rect x="780" y="108" width="110" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="835" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">104 人力</text>
  </g>
</g>

<!-- 授課 / 合作單位標題 -->
<text class="platform" x="280" y="90" font-size="22" font-weight="800" fill="#1e293b">授課與合作單位</text>
<line class="divider" x1="280" y1="102" x2="740" y2="102" stroke="#e2e8f0" stroke-width="1"/>

<!-- 客戶清單 Grid -->
<g class="client-grid">
  <!-- Row 1 -->
  <g class="client-tag"><rect x="280" y="118" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">臺灣科技大學</text></g>
  <g class="client-tag"><rect x="430" y="118" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Volvo</text></g>
  <g class="client-tag"><rect x="580" y="118" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="650" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">光彩旅遊</text></g>

  <!-- Row 2 -->
  <g class="client-tag"><rect x="280" y="160" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">萬能科技大學</text></g>
  <g class="client-tag"><rect x="430" y="160" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">新娘物語</text></g>
  <g class="client-tag"><rect x="580" y="160" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="650" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">聖研保養品</text></g>

  <!-- Row 3 -->
  <g class="client-tag"><rect x="280" y="202" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">精英電腦</text></g>
  <g class="client-tag"><rect x="430" y="202" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">寵物公園</text></g>
  <g class="client-tag"><rect x="580" y="202" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="650" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">森料理</text></g>

  <!-- Row 4 -->
  <g class="client-tag"><rect x="280" y="244" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">中國台灣旅行社</text></g>
  <g class="client-tag"><rect x="430" y="244" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">台灣導遊協會</text></g>
  <g class="client-tag"><rect x="580" y="244" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="650" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">這味泰泰</text></g>

  <!-- Row 5 -->
  <g class="client-tag"><rect x="280" y="286" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="308" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">元本旅遊</text></g>
  <g class="client-tag"><rect x="430" y="286" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="308" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">智谷網路</text></g>
  <g class="client-tag"><rect x="580" y="286" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="650" y="308" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">PChome</text></g>

  <!-- Row 6 -->
  <g class="client-tag"><rect x="280" y="328" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">邁思旅行社</text></g>
  <g class="client-tag"><rect x="430" y="328" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Welly SEO</text></g>
