  <text x="510" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">場次授課</text>

  <rect x="600" y="425" width="140" height="52" rx="10" fill="rgba(34,197,94,0.06)" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="448" text-anchor="middle" font-size="22" font-weight="800" fill="#22c55e">3000+</text>
  <text x="670" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">學員人數</text>
</g>

<!-- 底部裝飾 -->
<rect x="280" y="500" width="610" height="4" rx="2" fill="url(#gradBottom)" style="animation: fadeIn 0.4s ease-out 1.4s both;"/>
<defs>
  <linearGradient id="gradBottom" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="50%" stop-color="#a855f7"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
</defs>

<text x="585" y="525" text-anchor="middle" font-size="12" font-weight="500" fill="#cbd5e1" style="animation: fadeIn 0.4s ease-out 1.5s both;">從簡報設計到 AI 落地，陪你的團隊一起進化</text>
</svg>
