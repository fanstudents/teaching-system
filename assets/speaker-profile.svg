  <!-- Row 7 -->
  <g class="client-tag"><rect x="280" y="370" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="350" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">時代基金會</text></g>
  <g class="client-tag"><rect x="430" y="370" width="140" height="34" rx="8" fill="#f1f5f9"/><text x="500" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">沃恩長照機構</text></g>
</g>

<!-- 底部統計 -->
<g style="animation: slideUp 0.4s ease-out 1.2s both;">
  <rect x="280" y="425" width="140" height="52" rx="10" fill="rgba(99,102,241,0.06)" stroke="#c7d2fe" stroke-width="1"/>
  <text x="350" y="448" text-anchor="middle" font-size="22" font-weight="800" fill="#6366f1">20+</text>
  <text x="350" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">合作單位</text>

  <rect x="440" y="425" width="140" height="52" rx="10" fill="rgba(168,85,247,0.06)" stroke="#ddd6fe" stroke-width="1"/>
