<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開課單位管理 — 教學系統</title>
    <meta name="description" content="開課單位管理介面，管理合作單位與 LINE 官方帳號設定">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/admin-layout.css">
    <link rel="stylesheet" href="styles/organizations-page.css">
</head>

<body>
    <div class="admin-main">
        <div class="admin-header">
            <div class="admin-header-title">開課單位</div>
            <div class="admin-header-actions">
                <button class="btn btn-dark" id="addOrgBtn">
                    <span class="material-symbols-outlined">add</span>
                    新增單位
                </button>
            </div>
        </div>

        <div class="container">
            <div id="orgList" class="org-list">
                <div class="empty-state">
                    <span class="material-symbols-outlined">apartment</span>
                    <p>尚未建立任何開課單位</p>
                </div>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal-overlay" id="orgModal">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="orgModalTitle">新增開課單位</h3>
                    <button class="modal-close" id="orgModalClose">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">單位名稱 *</label>
                        <input type="text" class="form-input" id="orgName" placeholder="例：台北科技大學">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡 Email</label>
                        <input type="email" class="form-input" id="orgEmail" placeholder="contact@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Logo URL</label>
                        <input type="url" class="form-input" id="orgLogo" placeholder="https://...">
                    </div>

                    <div class="form-section-title">LINE 官方帳號設定</div>
                    <div class="form-group">
                        <label class="form-label">Channel ID</label>
                        <input type="text" class="form-input" id="orgLineChannelId" placeholder="Channel ID">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Channel Secret</label>
                        <input type="text" class="form-input" id="orgLineSecret" placeholder="Channel Secret">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Channel Access Token</label>
                        <input type="text" class="form-input" id="orgLineToken" placeholder="Access Token">
                        <p class="form-hint">用於 LINE Messaging API 推播通知</p>
                    </div>

                    <div class="form-error" id="orgFormError"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn" id="orgModalCancel">取消</button>
                    <button class="btn btn-dark" id="orgModalSubmit">新增</button>
                </div>
            </div>
        </div>

        <!-- Confirm Dialog -->
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <p id="confirmMessage">確定要刪除此開課單位？</p>
                <div class="confirm-actions">
                    <button class="btn" id="confirmCancel">取消</button>
                    <button class="btn btn-danger" id="confirmOk">刪除</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div><!-- /admin-main -->

    <script type="module">
        import { db } from './scripts/supabase.js';

        let organizations = [];
        let projectsByOrg = {};  // orgId → [project, ...]
        let editingOrgId = null;

        // ── Init ──
        async function init() {
            await loadData();
            render();
            bindEvents();
        }

        async function loadData() {
            const [orgRes, projRes] = await Promise.all([
                db.select('organizations', { order: 'created_at.desc' }),
                db.select('projects', { select: 'id,name,organization_id,join_code' })
            ]);
            organizations = orgRes.data || [];
            const projects = projRes.data || [];
            projectsByOrg = {};
            for (const p of projects) {
                if (p.organization_id) {
                    if (!projectsByOrg[p.organization_id]) projectsByOrg[p.organization_id] = [];
                    projectsByOrg[p.organization_id].push(p);
                }
            }
        }

        // ── Render ──
        function render() {
            const list = document.getElementById('orgList');
            if (organizations.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">apartment</span>
                        <p>尚未建立任何開課單位</p>
                    </div>`;
                return;
            }

            list.innerHTML = organizations.map(org => {
                const projects = projectsByOrg[org.id] || [];
                const initial = (org.name || '?')[0];
                const hasLine = org.line_channel_id || org.line_channel_secret || org.line_channel_access_token;

                const projectsHTML = projects.length > 0
                    ? projects.map(p => `
                        <div class="org-project-item">
                            <span class="material-symbols-outlined">slideshow</span>
                            ${escapeHtml(p.name)}
                            ${p.join_code ? `<span style="margin-left:auto;font-family:monospace;font-size:0.7rem;color:#bbb">${p.join_code}</span>` : ''}
                        </div>`).join('')
                    : '<div class="org-no-projects">尚無關聯專案</div>';

                const lineHTML = hasLine ? `
                    <div class="org-detail-section">
                        <h4>LINE 官方帳號</h4>
                        <div class="org-line-info">
                            <div class="line-item">
                                <span class="line-label">Channel ID</span>
                                <span class="line-value ${org.line_channel_id ? '' : 'empty'}">${org.line_channel_id || '未設定'}</span>
                            </div>
                            <div class="line-item">
                                <span class="line-label">Channel Secret</span>
                                <span class="line-value ${org.line_channel_secret ? '' : 'empty'}">${org.line_channel_secret ? '••••••' : '未設定'}</span>
                            </div>
                            <div class="line-item" style="grid-column:span 2">
                                <span class="line-label">Access Token</span>
                                <span class="line-value ${org.line_channel_access_token ? '' : 'empty'}">${org.line_channel_access_token ? '••••••••••' : '未設定'}</span>
                            </div>
                        </div>
                    </div>` : '';

                return `
                    <div class="org-card" data-org-id="${org.id}">
                        <div class="org-card-main">
                            <span class="material-symbols-outlined org-expand-icon">chevron_right</span>
                            <div class="org-logo">
                                ${org.logo_url ? `<img src="${escapeHtml(org.logo_url)}" alt="">` : initial}
                            </div>
                            <div class="org-info">
                                <div class="org-name">${escapeHtml(org.name)}</div>
                                <div class="org-meta">
                                    ${org.contact_email ? `<span><span class="material-symbols-outlined">mail</span>${escapeHtml(org.contact_email)}</span>` : ''}
                                    <span><span class="material-symbols-outlined">folder</span>${projects.length} 專案</span>
                                    ${hasLine ? '<span><span class="material-symbols-outlined">chat</span>LINE</span>' : ''}
                                </div>
                            </div>
                            <div class="org-actions">
                                <button class="btn btn-sm" data-action="edit" data-org-id="${org.id}" title="編輯">
                                    <span class="material-symbols-outlined">edit</span>
                                </button>
                                <button class="btn btn-sm btn-danger" data-action="delete" data-org-id="${org.id}" title="刪除">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </div>
                        </div>
                        <div class="org-detail">
                            <div class="org-detail-inner">
                                ${lineHTML}
                                <div class="org-detail-section">
                                    <h4>關聯專案 (${projects.length})</h4>
                                    <div class="org-projects-list">${projectsHTML}</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');

            // Bind card events
            list.querySelectorAll('.org-card').forEach(card => {
                card.querySelector('.org-card-main').addEventListener('click', (e) => {
                    if (e.target.closest('[data-action]')) return;
                    card.classList.toggle('expanded');
                });

                card.querySelector('[data-action="edit"]')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditModal(e.currentTarget.dataset.orgId);
                });

                card.querySelector('[data-action="delete"]')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    confirmDelete(e.currentTarget.dataset.orgId);
                });
            });
        }

        // ── Modal ──
        function openAddModal() {
            editingOrgId = null;
            document.getElementById('orgModalTitle').textContent = '新增開課單位';
            document.getElementById('orgModalSubmit').textContent = '新增';
            document.getElementById('orgName').value = '';
            document.getElementById('orgEmail').value = '';
            document.getElementById('orgLogo').value = '';
            document.getElementById('orgLineChannelId').value = '';
            document.getElementById('orgLineSecret').value = '';
            document.getElementById('orgLineToken').value = '';
            document.getElementById('orgFormError').style.display = 'none';
            document.getElementById('orgModal').classList.add('active');
        }

        function openEditModal(orgId) {
            const org = organizations.find(o => o.id === orgId);
            if (!org) return;
            editingOrgId = orgId;
            document.getElementById('orgModalTitle').textContent = '編輯開課單位';
            document.getElementById('orgModalSubmit').textContent = '儲存';
            document.getElementById('orgName').value = org.name || '';
            document.getElementById('orgEmail').value = org.contact_email || '';
            document.getElementById('orgLogo').value = org.logo_url || '';
            document.getElementById('orgLineChannelId').value = org.line_channel_id || '';
            document.getElementById('orgLineSecret').value = org.line_channel_secret || '';
            document.getElementById('orgLineToken').value = org.line_channel_access_token || '';
            document.getElementById('orgFormError').style.display = 'none';
            document.getElementById('orgModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orgModal').classList.remove('active');
            editingOrgId = null;
        }

        async function submitModal() {
            const name = document.getElementById('orgName').value.trim();
            const errorEl = document.getElementById('orgFormError');

            if (!name) {
                errorEl.textContent = '請填寫單位名稱';
                errorEl.style.display = 'block';
                return;
            }

            const payload = {
                name,
                contact_email: document.getElementById('orgEmail').value.trim(),
                logo_url: document.getElementById('orgLogo').value.trim(),
                line_channel_id: document.getElementById('orgLineChannelId').value.trim(),
                line_channel_secret: document.getElementById('orgLineSecret').value.trim(),
                line_channel_access_token: document.getElementById('orgLineToken').value.trim(),
                updated_at: new Date().toISOString()
            };

            document.getElementById('orgModalSubmit').disabled = true;

            try {
                if (editingOrgId) {
                    await db.update('organizations', payload, { id: `eq.${editingOrgId}` });
                    showToast('已更新開課單位');
                } else {
                    await db.insert('organizations', payload);
                    showToast('已新增開課單位');
                }
                closeModal();
                await loadData();
                render();
            } catch (err) {
                errorEl.textContent = '操作失敗：' + err.message;
                errorEl.style.display = 'block';
            } finally {
                document.getElementById('orgModalSubmit').disabled = false;
            }
        }

        // ── Delete ──
        let pendingDeleteId = null;

        function confirmDelete(orgId) {
            const org = organizations.find(o => o.id === orgId);
            const projects = projectsByOrg[orgId] || [];
            pendingDeleteId = orgId;

            const msg = projects.length > 0
                ? `確定要刪除「${org?.name}」？旗下 ${projects.length} 個專案的開課單位將被清除。`
                : `確定要刪除「${org?.name}」？`;

            document.getElementById('confirmMessage').textContent = msg;
            document.getElementById('confirmOverlay').classList.add('active');
        }

        async function executeDelete() {
            if (!pendingDeleteId) return;
            try {
                // Clear organization_id from related projects
                const projects = projectsByOrg[pendingDeleteId] || [];
                for (const p of projects) {
                    await db.update('projects', { organization_id: null, organization: '' }, { id: `eq.${p.id}` });
                }
                await db.delete('organizations', { id: `eq.${pendingDeleteId}` });
                showToast('已刪除開課單位');
                await loadData();
                render();
            } catch (err) {
                showToast('刪除失敗：' + err.message);
            } finally {
                pendingDeleteId = null;
                document.getElementById('confirmOverlay').classList.remove('active');
            }
        }

        // ── Events ──
        function bindEvents() {
            document.getElementById('addOrgBtn').addEventListener('click', openAddModal);
            document.getElementById('orgModalClose').addEventListener('click', closeModal);
            document.getElementById('orgModalCancel').addEventListener('click', closeModal);
            document.getElementById('orgModalSubmit').addEventListener('click', submitModal);
            document.getElementById('orgModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });
            document.getElementById('confirmCancel').addEventListener('click', () => {
                document.getElementById('confirmOverlay').classList.remove('active');
                pendingDeleteId = null;
            });
            document.getElementById('confirmOk').addEventListener('click', executeDelete);
        }

        // ── Utils ──
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        init();
    </script>
    <script src="components/nav.js"></script>
</body>

</html>
